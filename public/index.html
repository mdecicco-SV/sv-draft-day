  };
  window.rfRankClear = (e) => { if (e) e.stopPropagation(); resFit.rkLo = 1; resFit.rkHi = 0; rfSave(); renderRfControls(); renderRfGrid(); };
  window.rfBoardAddAll = (e) => { if (e) e.stopPropagation();
    const list = rfBoardFiltered().slice().sort((a,b)=>(a.rank||9999)-(b.rank||9999)).slice(0, 100);
    list.forEach(c => resFit.boardOn.add(normName(c.name)));
    resFit.boardSide = true; rfSave(); renderRfControls(); renderRfGrid();
  };
  window.rfBoardClearAll = (e) => { if (e) e.stopPropagation();
    resFit.boardOn.clear(); rfSave(); renderRfControls(); renderRfGrid();
  };
  // Position dropdown (POS_TREE tokens — parity with Best Available / Player Research)
  window.rfPosOpen = (e) => { if (e) e.stopPropagation(); rfPosMenu = !rfPosMenu; renderRfControls(); };
  window.rfPosTok = (t, e) => { if (e) e.stopPropagation();
    resFit.pos.has(t) ? resFit.pos.delete(t) : resFit.pos.add(t); rfSave(); renderRfControls(); renderRfGrid(); };
  window.rfPosGrp = (g, e) => { if (e) e.stopPropagation();
    const toks = POS_TREE[g], all = toks.every(t=>resFit.pos.has(t));
    toks.forEach(t => all ? resFit.pos.delete(t) : resFit.pos.add(t)); rfSave(); renderRfControls(); renderRfGrid(); };
  window.rfPosClear = (e) => { if (e) e.stopPropagation(); resFit.pos.clear(); rfSave(); renderRfControls(); renderRfGrid(); };
  // Outlook tiles: click toggles that question in/out of the selection; the merged vector
  // (rfMergeSel) is the average of every selected outlook's vec. Empty/all-four = Overall.
  window.rfTileToggle = (k) => {
    resFit.custom = false;
    resFit.sel.has(k) ? resFit.sel.delete(k) : resFit.sel.add(k);
    resFit.weights = rfMergeSel(resFit.sel);
    rfSave(); renderRfControls(); renderRfGrid();
  };
  window.rfToggleFt = () => { resFit.ftOpen = !resFit.ftOpen; rfSave(); renderRfControls(); };
  window.rfHidden = () => { resFit.hidden = !resFit.hidden; rfSave(); renderResFit(); };
  window.rfGrade = (v) => { resFit.gradeMin = +v; const l=$("rfGradeLab"); if(l) l.textContent=v; rfSave(); renderRfGrid(); };
  window.rfTeam = (t) => { resFit.teamsOff.has(t) ? resFit.teamsOff.delete(t) : resFit.teamsOff.add(t); rfSave(); renderResFit(); };
  window.rfDiv = (n) => { const ts=RF_DIV[n], allOff=ts.every(t=>resFit.teamsOff.has(t));
    ts.forEach(t=>{ if(allOff) resFit.teamsOff.delete(t); else resFit.teamsOff.add(t); }); rfSave(); renderResFit(); };
  window.rfTeamsAll = () => { resFit.teamsOff.clear(); rfSave(); renderResFit(); };
  window.rfToggleT = () => { resFit.tOpen = !resFit.tOpen; rfSave(); renderRfControls(); };
  // Dragging any slider detaches into a Custom blend — no preset re-detection.
  window.rfWeight = (k,v) => {
    resFit.weights[k] = +v;
    resFit.custom = true;
    rfSave(); rfWeightLabels();
    const nm = $("rfWName"); if (nm) nm.textContent = rfLabel();
    // chips need re-highlight (Custom may appear) without wiping the slider mid-drag —
    // re-render controls only when the outlook name changed class-wise is overkill; the
    // grid re-blends now and chips catch up on the next controls render (pointerup).
    renderRfGrid();
  };
  window.rfWeightDone = () => renderRfControls();   // pointerup/change → sync chip highlights
  // Click a player column header → sort teams by his fit (desc → asc → back to org-rank default)
  window.rfSortCol = (key) => {
    if (resFit.sortCol !== key) { resFit.sortCol = key; resFit.sortDir = "desc"; }
    else if (resFit.sortDir === "desc") { resFit.sortDir = "asc"; }
    else { resFit.sortCol = null; resFit.sortDir = "desc"; }
    rfSave(); renderRfGrid();
  };

  // ---- fit card: player × team deep dive across every lens ----
  // Current org Top-30 at the player's position group (prospects.json is rank-ordered)
  const t30AtSpot = (team, g, lim=4) =>
    ((DATA.prospects && DATA.prospects[team]) || []).filter(p => posGroupsOf(p.pos).has(g)).slice(0, lim);
  window.openFitCard = (key, team) => { fitSel = { key, team }; fitTile = "reach"; renderFitCard(); };   // open on Q1's evidence
  window.closeFitCard = () => { fitSel = null; const bd=$("fitCard"); if(bd){ bd.classList.remove("on"); bd.innerHTML=""; } };
  // ================= FIT CARD — "four questions first" (redesigned 7/10) =================
  // The four directional grades ARE the card: heat tiles up top with one-line evidence,
  // a receipts drawer that swaps to the tapped question, then logistics + context-only
  // intel strips. The blended badge tracks the grid's ACTIVE OUTLOOK. fitTile = session
  // tile selection (null = default drawer: comps · regime · system).
  let fitTile = null;
  window.fitTileSel = (k) => { fitTile = fitTile === k ? null : k; renderFitCard(); };
  function renderFitCard() {
    const bd = $("fitCard"); if (!bd || !fitSel) return;
    const state = currentState; if (!state) return;
    const comp = DATA.compByName.get(fitSel.key) || DATA.composite.find(c=>normName(c.name)===fitSel.key);
    if (!comp) { closeFitCard(); return; }
    const t = fitSel.team, key = fitSel.key;
    const teamName = (state.pools.find(p=>p.team===t)||{}).teamName || "";
    const f = fit(comp, t, key, state);
    const blended = rfCellVal(f);
    const D = f.dir || {};
    const land = tcNextLanding(state, t, comp) || teamNextPick(state, t);
    const pool = state.poolsMap[t];
    const bonus = land ? negBonus(comp, land.slot, land.overall) : null;
    const g = comp.posGroup || posGroupOf(comp.pos);
    const pct = (x) => x==null ? "—" : Math.round(x*100)+"%";
    const cal = calibOf(comp);
    const pv = playerValue(comp);
    const rg = D.reach && D.reach.d ? D.reach.d.rg : null;
    const dd = D.reach && D.reach.d ? D.reach.d.best : null;

    // ---- four tiles: grade + one-line evidence (each carries its data window) ----
    const ddCrit = dd ? dfSliceCrit(dd, comp, rg) : "";
    const ddPicks = dd && dd.picks ? [...dd.picks].sort((a,b) => (b.reached_mlb?1:0)-(a.reached_mlb?1:0) || b.year-a.year) : [];
    const ddTitle = ddPicks.length ? ddPicks.slice(0,12).map(p=>`${p.name} '${dfYY(p.year)} #${p.overall}${p.reached_mlb?" ✓MLB":""}`).join(", ") + (dd.n>12?` +${dd.n-12} more`:"") : "";
    const tiles = [
      ["reach", "GET TO BIGS", D.reach, dd ? `${dd.mlb} of ${dd.n} like him made it — ${ddCrit}` : "no regime sample", ddTitle],
      ["develop", "DEVELOP BEST", D.develop, f.war && f.war.known && f.war.pos
        ? `${f.war.pos.woe>0?"+":""}${f.war.pos.woe.toFixed(2)} WOE/pick (${g}, '18+)` : "WAR lookback n/a"],
      ["speed", "FASTEST PATH", D.speed, D.speed && D.speed.known
        ? `${D.speed.med} yr ${D.speed.med===D.speed.lg?"= lg":D.speed.med<D.speed.lg?"< lg "+D.speed.lg:"> lg "+D.speed.lg} (${D.speed.lvl}, '18+)` : "no debut sample"],
      ["value", "MLB VALUE", D.earn, D.earn && D.earn.roi && D.earn.roi.known
        ? `${D.earn.roi.roi.toFixed(1)}× vs ${D.earn.roi.lg?D.earn.roi.lg.toFixed(1):"—"}× lg ('18+)` : "no bonus data"],
    ];
    const tileHtml = tiles.map(([k, lbl, d, ev, tt]) => {
      const v = d && d.known !== false ? Math.round(100 * d.v) : null;
      return `<button class="fc2-tile${fitTile===k?' sel':''}" style="background:${v!=null?rfHeat(v):"var(--card)"}"${tt?` title="${_esc(tt)}"`:""} onclick="fitTileSel('${k}')">
        <span class="fc2-tk">${lbl}</span><span class="fc2-tv">${v!=null?v:"—"}</span><span class="fc2-tev">${ev}</span></button>`;
    }).join("");

    // ---- evidence drawer per question: the actual picks in the lens, plainly — the
    // room draws its own inference. Names click through to the draft-history card.
    const kv = (k, v) => `<div class="tc-kv"><span class="k">${k}</span><span class="v">${v}</span></div>`;
    const woeFmt = (c) => `<span class="vsv ${c.woe>=0.12?'over':c.woe<=-0.12?'under':'even'}">${c.woe>0?"+":""}${c.woe.toFixed(2)}</span>`;
    const warRow = (lbl, c) => c ? kv(lbl, `${c.warSum} WAR vs ${c.expSum} exp over ${c.n} · ${woeFmt(c)}/pick`) : "";
    const rgLine = rg ? `Regime: ${_esc(rg.gm||"current FO")}${rg.borrowed?` — history via ${rg.source} '${String(rg.start).slice(2)}–'${String(rg.end).slice(2)}`:` since '${String(rg.start).slice(2)}`}` : null;
    const evTable = (heads, rows) => rows.length ? `<div class="fc2-evwrap"><table class="fc2-ev"><thead><tr>${heads.map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody>${rows.join("")}</tbody></table></div>` : "";
    const evName = (name, year, overall) => `<span${histAttr({year, overall})}>${_esc(name)}</span>`;
    let drawer = "";
    if (fitTile === "reach") {
      // high level via the tracker row (year|overall → mlbid → hilevel.json); draftdb's
      // own reached_mlb backstops picks the tracker doesn't carry. Sorted MLB down.
      const histBy = new Map(DATA.slotHistory.map(r => [r.year + "|" + r.overall, r]));
      const hiOf = (p) => { const r = histBy.get(p.year + "|" + p.overall);
        return (r && hiLvlOf(r)) || (p.reached_mlb ? "MLB" : null); };
      const byHi = (dd ? dd.picks.map(p => ({ p, hi: hiOf(p) })) : [])
        .sort((a, b) => (HI_RANK[b.hi] || 0) - (HI_RANK[a.hi] || 0) || b.p.year - a.p.year);
      drawer = (dd ? kv(`${dd.n} like him — ${ddCrit}`, `${dd.mlb} reached MLB (${pct(dd.rate)})${D.reach.d.lgRate!=null?` vs ${pct(D.reach.d.lgRate)} league`:""}`) : "")
        + ((DATA.orgs[t]||{}).dev && DATA.orgs[t].dev.mlbDebut!=null ? kv("Org MLB-debut rate (all-time)", `${pct(DATA.orgs[t].dev.mlbDebut)}${DATA.lgDebut?` vs ${Math.round(DATA.lgDebut.avg)}% lg`:""}`) : "")
        + evTable(["Yr","Pick","Player","Hi Level"], byHi.map(({p, hi})=>`<tr>
            <td>'${dfYY(p.year)}</td><td>#${p.overall}</td><td>${evName(p.name, p.year, p.overall)}</td>
            <td>${hi==="MLB"?'<span class="vsv over">MLB</span>':hi?hi:'<span class="fc2-dim">—</span>'}</td></tr>`))
        + (rgLine ? `<div class="fc-note">${rgLine}</div>` : "");
    } else if (fitTile === "develop") {
      const wc = warComps(t, comp, 8);
      drawer = (f.war && f.war.known ? warRow(`${g} picks ('18+)`, f.war.pos) + (f.war.band?warRow(`Picks ${f.war.band.key} ('18+)`, f.war.band):"") + (f.war.lvl?warRow(`${f.war.lvl.key} picks ('18+)`, f.war.lvl):"") : "")
        + (f.war && f.war.expAt!=null ? kv(`Expected at ≈#${comp.rank}`, `${f.war.expAt} career WAR <span class="sub">(league mean, his band, '18+)</span>`) : "")
        + evTable(["Yr","Pick","Player","WAR"], wc.map(p=>`<tr>
            <td>'${String(p.y).slice(2)}</td><td>#${p.ov}</td><td>${evName(p.n, p.y, p.ov)}</td>
            <td>${p.aw!=null?`${p.aw} <span class="fc2-dim">aWAR</span>`:p.w!=null?`${p.w} <span class="fc2-dim">WAR</span>`:'<span class="fc2-dim">—</span>'}</td></tr>`));
    } else if (fitTile === "speed") {
      // names come from the CURRENT org Top-30 (prospects.json, curated weekly) — farmdepth.json
      // is an April snapshot and still lists traded/graduated players; it only scores the factor.
      const spot = t30AtSpot(t, g);
      const farmLine = spot.length ? `<div class="fc-note"><b>In their system at his spot (current T30):</b> ${spot.map(p=>`${_esc(p.name)} <span class="sub">T30 #${p.rank} · ${_esc(p.pos)}${p.level?` · ${_esc(p.level)}`:""}</span>`).join(" · ")}</div>` : "";
      // warhist picks carry no debut year — list debuted picks at his level (nonzero bWAR or an aWAR record), newest first
      const Wo = DATA.warhist && DATA.warhist.orgs && DATA.warhist.orgs[t];
      const lvlW = comp.level === "HS" ? "HS" : "College";
      const deb = Wo ? Wo.picks.filter(p=>p.lvl===lvlW && (p.aw!=null || (p.w!=null && p.w!==0))).sort((a,b)=>b.y-a.y).slice(0,8) : [];
      drawer = (D.speed && D.speed.known ? kv(`Median yrs to debut (${D.speed.lvl})`, `${D.speed.med} vs ${D.speed.lg} league <span class="sub">(n=${D.speed.n}, '18+ classes)</span>`) : `<div class="fc-note">No mature debut sample for his level.</div>`)
        + evTable(["Yr","Pick","Player","WAR"], deb.map(p=>`<tr>
            <td>'${dfYY(p.y)}</td><td>#${p.ov}</td><td>${evName(p.n, p.y, p.ov)}</td>
            <td>${p.aw!=null?`${p.aw} <span class="fc2-dim">aWAR</span>`:`${p.w} <span class="fc2-dim">WAR</span>`}</td></tr>`))
        + farmLine;
    } else if (fitTile === "value") {
      const hero = [];
      if (pv) hero.push(`<div class="fc2-hero-row"><b>${pv.surplus!=null?fmtM(pv.surplus):"—"} surplus</b>
        <span class="fc2-dim">FV${pv.fv} ${pv.kind==="pit"?"arm":"bat"} valuation vs ~${pv.cost?fmtM(pv.cost):"—"} to sign${pv.ratio?` · ${Math.round(pv.ratio)}× his price`:""}</span></div>`);
      if (D.earn && D.earn.roi && D.earn.roi.known) hero.push(`<div class="fc2-hero-row"><b>${D.earn.roi.roi.toFixed(1)}× draft ROI</b>
        <span class="fc2-dim">${fmtM(D.earn.roi.cost)} in → ${fmtM(D.earn.roi.val)} out ('18+) · lg ${D.earn.roi.lg.toFixed(1)}×</span></div>`);
      drawer = (hero.length ? `<div class="fc2-hero">${hero.join("")}</div>` : "")
        + (D.earn && D.earn.spend && D.earn.spend.known ? kv("Over-slot habit", `${D.earn.spend.avgPct>0?"+":""}${D.earn.spend.avgPct}% vs slot <span class="sub">(${D.earn.spend.n} picks, regime)</span>`) : "")
        + `<div class="fc-note">Surplus = FG Jul-'26 valuation for his FV bucket vs our est. bonus. ROI = '18+ bonuses in vs career WAR × $8.5M out, credited to the drafting org.</div>`;
    } else {
      const ps = orgPosSystem(t), B = leagueBaselines();
      const sysLine = ps && ps[g]!=null ? `System: ${Math.round(ps[g]*ps.n)} ${g} in their Top-30 (lg ~${(B.sys[g]*ps.n).toFixed(1)})` : null;
      // count + names both from the CURRENT T30 — farmdepth.json (April snapshot) only scores
      // the Fine-tune Farm-depth factor, which no outlook preset uses
      const spotAll = t30AtSpot(t, g, 30), spotN = spotAll.slice(0, 3);
      const depthLine = spotAll.length ? `${spotAll.length} in their current T30 at his spot${spotN.length?": "+spotN.map(p=>`${_esc(p.name)} #${p.rank}`).join(", "):""}${spotAll.length>3?" +"+(spotAll.length-3):""}` : `no one in their current T30 at his spot`;
      drawer = (rgLine ? `<div class="fc-note">${rgLine} (${dfPicks(t).length} picks counted)</div>` : "")
        + ((sysLine||depthLine) ? `<div class="fc-note">${[sysLine,depthLine].filter(Boolean).join(" · ")}</div>` : "")
        + `<div class="fc-note fc2-hint">▸ tap a tile for that question's evidence</div>`;
    }

    // ---- strips: pick economics + context-only intel (dot + latest raw note) ----
    const fits = pool && bonus!=null ? pool.room >= bonus : null;
    const logistics = `<div class="fc2-strip"><span class="fc2-sk">PICK ECONOMICS</span>
      ${land?`pick <b>#${land.overall}</b> · slot <b>${land.slot?fmtM(land.slot):"—"}</b>`:"no pick left in range"}
      · room <b>${pool?fmtM(pool.room):"—"}</b> · est to sign <b>${bonus!=null?fmtM(bonus):"—"}</b>
      ${fits==null?"":fits?`<span class="tg lvl-jc">fits</span>`:`<span class="tg under">short</span>`}
      <span class="fc2-dim">— sharpens as slots commit</span></div>`;
    const tiRecs = DATA.intel.filter(r => teamAlias(r.team)===t && normName(r.player)===key)
                             .sort((a,b)=>(b.date||"").localeCompare(a.date||""));
    const msgRec = tiRecs.find(r => (r.note || r.full_text));
    const rawMsg = msgRec ? (msgRec.note || msgRec.full_text || "").trim() : "";
    const msgShort = rawMsg.length > 220 ? rawMsg.slice(0,220) + "…" : rawMsg;
    const msgSrc = msgRec ? (msgRec.is_manual ? "manual" : msgRec.channel ? "#"+msgRec.channel : "Slack") : "";
    const intel = `<div class="fc2-strip"><span class="fc2-sk">INTEL <span class="fc2-dim">(context only — never graded)</span></span>
      ${tiRecs.length
        ? `<span class="fc-dot" style="background:${intelColorHex(key,t)}"></span>${msgShort
            ? `<span class="fc2-raw">“${_esc(msgShort)}”</span><span class="fc2-dim">— ${msgRec.date||""}${msgSrc?` · ${msgSrc}`:""}</span>`
            : `<span class="fc2-dim">color logged, no note text${tiRecs[0].date?` · ${tiRecs[0].date}`:""}</span>`}`
        : "none logged for this org"}</div>`;

    // ---- header ----
    const rt = rankTrendOf(comp), rc = rt ? rtConsensus(rt) : null, ra = rt ? rtArrow(rt) : null;
    // FV provenance: projection.json = SV NCAA model; fv.json = graded feed (FG/SVM per fvMeta)
    const fvMeta = fvMetaOf(comp);
    const fvProv = cal.fv==null ? null : cal.src==="NCAA model" ? "SV NCAA model · Jul '26"
      : fvMeta && fvMeta.source==="FG" ? "FG grade" : fvMeta && fvMeta.source==="SVM" ? "SVM grade" : "FV feed";
    const calLine = [
      cal.calib01!=null?`caliber <b>${Math.round(100*cal.calib01)}</b>`:null,
      cal.fv!=null?`<span title="20-80 scouting scale; NCAA-model output for college players">FV ${(+cal.fv).toFixed(1)}${cal.tier?` · ${_esc(String(cal.tier))}`:""}${fvProv?` <span class="fc2-dim">(${fvProv})</span>`:""}</span>`:null,
      rc!=null?`board #${Math.round(rc*10)/10} <span class="${ra.cls}">${ra.ch}</span>`:null,
    ].filter(Boolean).join(" · ");

    bd.innerHTML = `<div class="tc-card fc-card fc2">
      <div class="tc-top">
        <span class="tc-ttl">${_esc(comp.name)}</span>
        <span class="fc-sub">${comp.pos} · ${comp.level||"—"} · #${comp.rank}${DATA.clients.has(key)?" · SV":""}</span>
        <span class="fc-arrow">→</span>
        ${teamLogo(t,22)}<span class="tc-abbr">${t}</span><span class="fc-sub">${teamName?_esc(teamName)+" · ":""}org #${(DATA.orgs[t]||{}).orgRank!=null?Math.round(DATA.orgs[t].orgRank):"—"}</span>
        <span class="fc2-badge" style="background:${rfHeat(blended)}" title="${rfLabel()} blend">${blended}<small>${rfLabel()}</small></span>
        <button class="tc-x" onclick="closeFitCard()">✕</button>
      </div>
      ${calLine?`<div class="fc2-cal">${calLine}</div>`:""}
      <div class="fc2-tiles">${tileHtml}</div>
      <div class="fc2-drawer">${drawer}</div>
      ${logistics}${intel}
      <div class="fc2-legend">Windows: regime = ${rg ? `${rg.borrowed?`${rg.source} '${dfYY(rg.start)}–'${dfYY(rg.end)}`:`since '${dfYY(rg.start)}`}${rg.gm?` under ${_esc(rg.gm)}`:""}` : "current FO"} (drafts) · '18+ = 2018–25 classes (WAR history) · farm = current system</div>
    </div>`;
    bd.classList.add("on");
  }
  // ---------- Ask the data — freeform LLM query over the whole draft-day system ----------
  // Packs a compact snapshot (draft status, pools, client book, slot-history aggregates —
  // never the raw ~2,500 tracker rows) and POSTs it with the question to /api/ask.
  let askBusy = false;
  // Each section opens with a bracketed source tag ([POOLS], [CLIENTS], …) — the model is
  // instructed to answer only from these and cite the tag after every figure. The question
  // steers extra slices: pick numbers pull that slot's full 2018-25 history, team mentions
  // pull the team's pool/picks/regime dossier.
  function packAskContext(state, question) {
    const q = question || "";
    const L = [];
    if (state) {
      const oc = state.onClock;
      L.push(`[DRAFT-STATUS] ${state.year} — picks made ${state.madeCount} of ${state.picks.length}. ${oc?`On the clock: pick #${oc.overall} (R${oc.round}) ${oc.teamName||oc.team}, slot ${fmtM(oc.slot)}.`:"Draft complete."}`);
      const made = state.picks.filter(p=>p.isDrafted).slice(-10);
      if (made.length) L.push(`[PICKS-RECENT] ` + made.map(p=>`#${p.overall} ${p.team} ${p.player}${p.slot>0?` (slot ${fmtM(p.slot)})`:""}`).join("; "));
      const up = state.picks.filter(p=>!p.isDrafted).slice(0,10);
      if (up.length) L.push(`[PICKS-NEXT] ` + up.map(p=>`#${p.overall} ${p.team} slot ${fmtM(p.slot)}`).join("; "));
      if (state.pools?.length) L.push(`[POOLS] team: pool / spent / room / over-under\n` +
        state.pools.map(p=>`${p.team}: ${fmtM(p.pool)} / ${fmtM(p.poolCharge)} / ${fmtM(p.room)} / ${p.overUnder>0?"+":""}${fmtM(p.overUnder)}`).join("; "));
    }
    const clients = DATA.clientList.filter(c=>c.comp);
    if (clients.length) {
      L.push(`[CLIENTS] SV clients (rank · pos · level · age · est. market · floor · status · top interest)`);
      for (const c of clients) {
        const comp = c.comp;
        const pk = state && state.picks.find(p=>p.isDrafted && normName(p.player)===c.key);
        const teams = [...new Set(DATA.intel.filter(r=>normName(r.player)===c.key).map(r=>teamAlias(r.team)))]
          .map(t=>({t, s:teamInterest(c.key,t)})).sort((a,b)=>b.s-a.s).slice(0,3).map(x=>x.t);
        L.push(`${c.name}: #${comp.rank} ${comp.pos} ${comp.level} age ${comp.age||"?"} · mkt ${fmtM(demandFor(comp))} · floor ${fmtM(signFloor(comp))}` +
          ` · ${pk?`DRAFTED #${pk.overall} ${pk.team}${pk.bonus!=null?` bonus ${fmtM(pk.bonus)}`:""}`:"on board"}${teams.length?` · interest: ${teams.join(", ")}`:""}`);
      }
    }
    if (DATA.slotHistory.length) {
      const lt = DATA.leagueTend;
      L.push(`[SLOT-AGG 2018-25] ${DATA.slotHistory.length} signings.${lt?` League avg: ${lt.avgP?.toFixed(0)}% pitchers, ${lt.avgHS?.toFixed(0)}% HS.`:""}`);
      const rows = researchRows();
      const anyOn = research.pos.size||research.cls.size||research.lvl.size||research.money.size||research.round.size
        || research.ageLo>16||research.ageHi<25||research.bnLo>0||research.bnHi<BN_MAX;
      if (anyOn && rows.length) {
        L.push(`[RESEARCH-ROWS] current Research lenses match ${rows.length} signings; top 30:\n` +
          rows.slice(0,30).map(r=>`'${String(r.year).slice(2)} #${r.overall} ${r.first?r.first[0]+".":""}${r.last} ${posDisp(r)} ${r.level} ${teamAbbrevOf(r.team)} ${r.bonus!=null?fmtM(r.bonus):"unsigned"}${r.diff!=null?` (${r.diff>0?"+":""}${fmtM(r.diff)} vs slot)`:""}`).join("; "));
      }
    }
    // Pick numbers in the question ("pick 5", "#43", "this pick/slot") → that slot's full history.
    const nums = [];
    const re = /(?:\bpick\s*#?|#|\boverall\s+#?)(\d{1,3})\b/gi;
    let m; while ((m = re.exec(q))) { const n = +m[1]; if (n>=1 && n<=650 && !nums.includes(n)) nums.push(n); }
    if (state && state.onClock && /\bthis (pick|slot)\b/i.test(q) && !nums.includes(state.onClock.overall)) nums.unshift(state.onClock.overall);
    for (const n of nums.slice(0,3)) {
      const rows = DATA.slotHistory.filter(r=>r.overall===n);
      if (rows.length) L.push(`[PICK-#${n} HISTORY 2018-25]\n` + rows.map(r=>
        `${r.year} · ${r.first} ${r.last} · ${posDisp(r)} · ${r.level} · ${teamAbbrevOf(r.team)} · ${r.bonus!=null?fmtM(r.bonus):"unsigned"} · slot ${r.slot!=null?fmtM(r.slot):"—"} · ${r.diff!=null?sgn$(r.diff):"—"}`).join("\n"));
    }
    // Team mentions (abbr exact-case, or team name/nickname) → pool + next picks + regime.
    if (state && state.pools?.length) {
      const rxEsc = s => s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      const hits = state.pools.filter(p => {
        if (new RegExp(`\\b${p.team}\\b`).test(q)) return true;   // abbr stays case-sensitive ("min" ≠ MIN)
        const w = (p.teamName||"").split(" ");
        return [p.teamName, w.slice(-2).join(" "), w[w.length-1]].filter(s=>s && s.length>=4)
          .some(s => new RegExp(`\\b${rxEsc(s)}\\b`, "i").test(q));
      });
      for (const p of hits.slice(0,2)) {
        const up3 = state.picks.filter(k=>k.team===p.team && !k.isDrafted).slice(0,3);
        const rg = (DATA.regime && DATA.regime[p.team]) ? dfRegime(p.team) : null;
        L.push(`[TEAM ${p.team}] ${p.teamName||""}\n` +
          `Pool ${fmtM(p.pool)} / spent ${fmtM(p.poolCharge)} / room ${fmtM(p.room)} / over-under ${p.overUnder>0?"+":""}${fmtM(p.overUnder)}` +
          (up3.length ? `\nNext picks: ${up3.map(k=>`#${k.overall} (R${k.round}) slot ${fmtM(k.slot)}`).join("; ")}` : `\nNo picks left.`) +
          (rg && rg.gm ? `\nRegime: GM ${rg.gm}, drafts since ${rg.start}${rg.borrowed?` (history via ${rg.source} through ${rg.end})`:""}` : ""));
      }
    }
    return L.join("\n");
  }
  window.askDraft = async () => {
    const q = ($("askQ").value || "").trim(), out = $("askOut");
    if (!q || askBusy) return;
    askBusy = true; $("askBtn").disabled = true;
    out.innerHTML = `<div class="ask-q">${_esc(q)}</div><span style="color:var(--muted)">thinking…</span>`;
    try {
      const r = await fetch("/api/ask", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question: q, context: packAskContext(currentState, q) }),
      });
      const data = await r.json();
      if (!r.ok || data.error) throw new Error(data.error || `HTTP ${r.status}`);
      // post-escape: mute the [SECTION-TAG] citations (uppercase/digits/#/- only — no markup risk)
      const ans = _esc(data.answer).replace(/\[([A-Z0-9#\- ]{2,40})\]/g, '<span class="ask-tag">[$1]</span>');
      out.innerHTML = `<div class="ask-q">${_esc(q)}</div>${ans}`;
    } catch (e) {
      out.innerHTML = `<div class="ask-q">${_esc(q)}</div><span class="ask-err">${_esc(String(e.message||e))}</span> <button class="ctl" style="padding:2px 8px;font-size:11px" onclick="askDraft()">retry</button>`;
    } finally { askBusy = false; $("askBtn").disabled = false; }
  };

  // Panel 4 — Top 30 Organizational Prospects (Org Review's MLB.com T30 bake). Player
  // mode: prospects at the selected player's position group get the highlight — the
  // depth he'd be walking into with this org.
  function renderTcProspects(team, sel) {
    let h = `<div class="tc-panel" data-q="prospects"><h4><span class="n">4</span> Top 30 Org Prospects</h4>`;
    h += `<div class="tc-sub">Composite · MLB.com + Baseball America</div>`;
    const rows = (DATA.prospects && DATA.prospects[teamAlias(team)]) || [];
    if (!rows.length) return h + `<div class="placeholder">No prospect list for ${team}.</div></div>`;
    const selGrp = sel && sel.c.comp ? (sel.c.comp.posGroup || posGroupOf(sel.c.comp.pos)) : null;
    h += `<table class="tc-upc"><thead><tr><th>#</th><th>Player</th><th>Pos</th><th>Lvl</th><th>Age</th></tr></thead><tbody>`;
    h += rows.slice(0,30).map(r=>{
      const match = selGrp && posGroupsOf(r.pos).has(selGrp);
      const nm = tcInitialName(r.name);
      return `<tr${match?' style="background:#fff5f6"':''}>
        <td style="color:var(--muted)">${r.rank}</td>
        <td class="pl" title="${r.name}">${r.t100?`<span class="plwrap"><span class="pln">${nm}</span><span class="t100b" title="Top 100 — ${[r.t100.mlb?"MLB.com #"+r.t100.mlb:"",r.t100.ba?"BA #"+r.t100.ba:""].filter(Boolean).join(" · ")}">T100</span></span>`:nm}</td>
        <td style="${match?'color:var(--red);font-weight:800':'color:var(--muted)'}">${r.pos||"—"}</td>
        <td style="color:var(--muted)">${r.level||"—"}</td>
        <td>${r.age!=null?r.age:"—"}</td></tr>`;
    }).join("");
    h += `</tbody></table>`;
    if (selGrp) {
      const shown = rows.slice(0,30);
      const nm = shown.filter(r=>posGroupsOf(r.pos).has(selGrp)).length;
      const last = tcInitialName(sel.c.name).split(" ").slice(-1)[0];
      h += `<div class="tc-feed-more">${nm} of ${shown.length} in ${last}'s position group</div>`;
    }
    return h + `</div>`;
  }

  // Drafted NON-client → a vitals card: level, school, position(s), agency, slot, and a

  function renderDraftedVitals(state, c, pk) {
    const comp = c.comp;
    const displayName = pk.player || c.name;
    const positions = [...new Set([pk.pos, comp?.pos].filter(Boolean).flatMap(s=>String(s).split(/[\/,]/).map(x=>x.trim())).filter(Boolean))].join(" / ");
    const level = comp ? levelClass(comp).replace("College-","College ") : (pk.schoolClass || "—");
    const eb = effectiveBonus(pk), lb = bonusFor(c.key);
    const agCell = agEditCell(c.key.replace(/'/g,"\\'"), comp);
    let h = `<div class="cc"><div class="detail-head">${teamLogo(pk.team,32)}<span class="big">${displayName}</span>
      <span class="pl">drafted #${pk.overall} · ${roundLabel(pk.round)} · ${pk.teamName||pk.team}</span></div>`;
    h += `<div class="pool-row" style="margin-top:12px">${[
      ["Level", level],
      ["School", schoolShort(comp?.school || pk.school) || "—"],
      [positions.includes("/") ? "Positions" : "Position", positions || "—"],
      ["B/T", fmtBT(comp)],
      ["HT / WT", comp ? fmtHtWt(comp) : "—"],
      ["Agency", agCell],
      ["Pick slot", pk.slot>0?fmt$(pk.slot):"—"],
      ["Bonus", eb.bonus!=null && (pk.bonus!=null||eb.src) ? fmt$(eb.bonus)+(eb.src?` (${eb.src})`:"") : "—"],
    ].map(([k,v])=>`<div class="stat"><div class="k">${k}</div><div class="v">${v}</div></div>`).join("")}</div></div>`;
    const qn = displayName.replace(/'/g,"\\'");
    const sug = suggestBonus(pk);
    h += `<div class="panel" style="margin-top:14px"><h3>Bonus intel</h3>
      ${lb?`<div class="ct"><span style="color:#6b7280;font-weight:700">Logged:</span> <b>${fmt$(lb.amount)}</b> <span class="tg ${lb.kind==='confirmed'?'over':'fit'}">${lb.kind}</span>${pk.slot>0&&lb.amount!=null?` ${ouTag(lb.amount-pk.slot, lb.kind!=='confirmed'?lb.kind.slice(0,3).toUpperCase():false)}`:""}</div>`:""}
      <div class="ct"><span style="color:#6b7280;font-weight:700">Model suggests:</span> <b>~${fmt$(sug)}</b>${pk.slot>0?` ${ouTag(sug-pk.slot,true)}`:""} <button class="ctl" style="padding:2px 8px;font-size:11px" onclick="document.getElementById('bvAmount').value=${sug}">use</button></div>
      <div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap;font-size:13px;margin-top:6px">
        $<input id="bvAmount" type="number" placeholder="${sug}" style="width:130px;padding:6px;border:1px solid var(--line);border-radius:6px">
        <select id="bvKind" style="font:inherit;padding:6px;border:1px solid var(--line);border-radius:6px">
          <option value="estimated">estimated</option><option value="reported">reported</option><option value="confirmed">confirmed</option></select>
        <input id="bvNote" placeholder="source / note (optional)" style="flex:1;min-width:160px;padding:6px;border:1px solid var(--line);border-radius:6px">
        <button class="ctl primary" onclick="saveBonusVital('${qn}','${pk.team}',${pk.overall})">Save</button>
      </div></div>`;
    $("detailBody").innerHTML = h;
  }
  window.saveBonusVital = (name, team, overall) => {
    const amt = parseFloat($("bvAmount")?.value);
    if (!Number.isFinite(amt) || amt<=0) { alert("Enter a bonus amount."); return; }
    postIntel({ kind:"bonus", player_name:name, team, pick_overall:overall,
      offer_type: $("bvKind")?.value || "reported", amount:amt, note: $("bvNote")?.value || null, status:"active" });
  };

  // ── Pick Economics: "if we got popped here" — what a given pick equips the ask to be:
  // slot money, the player's projected ask, the team's pool room, and a leverage line.
  // Core rows shared by the team card (this card's pick) and the dossier (team on the clock).
  function pickEconRows(state, key, comp, pick, subLabel) {
    const slot = pick.slot || 0;
    const ask = negBonus(comp, slot, pick.overall);
    const pf = tcPickFit(comp, pick, state);
    const pool = state.poolsMap[pick.team];
    let h = `<div class="ct" style="margin-bottom:2px">
      <span class="ov" style="min-width:44px;color:var(--red);font-weight:800">#${pick.overall}</span>
      ${intelDot(key, pick.team)}
      <span class="tm" data-org="${pick.team}">${teamLink(pick.team)}</span>
      <span class="tg ${pf.cls}">${pf.label}</span>
      <span class="nx" style="margin-left:auto;color:var(--muted);font-size:11px">${subLabel}</span></div>`;
    h += `<div class="tc-kv"><span class="k">Slot at this pick</span><span class="v">${slot>0?fmt$(slot):"— (no pool slot)"}</span></div>`;
    h += `<div class="tc-kv"><span class="k">Projected ask here</span><span class="v">${fmt$(ask)}${slot>0?` ${ouTag(ask-slot,true)}`:""}</span></div>`;
    h += `<div class="tc-kv"><span class="k">Market at rank #${comp.rank}</span><span class="v">${fmt$(demandFor(comp))}</span></div>`;
    if (pool) h += `<div class="tc-kv"><span class="k">${teamAbbrevOf(pick.team)} pool room</span><span class="v">${fmtM(pool.room)}${pf.moneyFits?"":' <span class="tg under">short of ask</span>'}</span></div>`;
    const lever = slot<=0
      ? `No pool slot in rounds 11+ — anything over $175k eats their pool; ask is framed by the exempt cap.`
      : ask > slot
        ? `Slot here is ${fmtM(ask-slot)} under his number — leverage to hold the ask${pool?`; they'd need the room (${fmtM(pool.room)} banked)`:""}.`
        : `Slot covers the ask with ${fmtM(slot-ask)} cushion — clean sign, little leverage to push over.`;
    const reach = pf.label==="reach" ? `Early for his rank — a pop here usually means a pre-agreed number. ` :
                  pf.label==="value" ? `Well past his rank — faller territory; over-slot demand is the play. ` : "";
    h += `<div class="tc-hab-note">${reach}${lever}</div>`;
    return h;
  }
  // Dossier variant — live read for whichever team is on the clock right now.
  function renderPickEconomics(state, c, comp) {
    const oc = state.onClock;
    let h = `<div class="tc-pecon"><h5>Pick Economics</h5>`;
    if (!oc) return h + `<div class="placeholder">No pick on the clock.</div></div>`;
    if (!comp) return h + `<div class="placeholder">Unranked — no market model for this spot.</div></div>`;
    return h + pickEconRows(state, c.key, comp, oc, `R${oc.round} · on the clock`) + `</div>`;
  }

  function renderPlayerDetail(state) {
    const cp0 = DATA.compByName.get(selected.id);
    const c = DATA.clientList.find(x => x.key===selected.id) || { name:(cp0&&cp0.name)||selected.id, key:selected.id, comp:cp0 };
    // Drafted non-SV player → compact vitals + bonus-intel capture instead of the client view.
    if (!DATA.clients.has(c.key)) {
      const dpk = state.picks.find(p => p.isDrafted && normName(p.player)===c.key);
      if (dpk) { renderDraftedVitals(state, c, dpk); return; }
    }
    const isClient = DATA.clients.has(c.key);
    const comp = c.comp, kqk = c.key.replace(/'/g,"\\'");
    const dem = demandFor(comp);
    const pk = state.picks.find(p => p.isDrafted && normName(p.player)===c.key);
    const ms = medicalOf(comp || c);
    const eb = pk ? effectiveBonus(pk) : null;
    const knownB = eb && eb.bonus!=null && (pk.bonus!=null || eb.src);

    // ── header: name + team-card-style stat band ──
    // One scannable vitals band: draft state first (status/money), then the scouting
    // identity (position/level/age, and Bats/Throws for hitters — pitchers skip both,
    // LHP/RHP already says it), then the off-field facts (school/commit/agency).
    const isP = comp?.posGroup === "P";
    const stats = [
      ["Status", pk?`<span style="color:var(--good)">DRAFTED #${pk.overall}</span>`:"ON BOARD", pk?(pk.teamName||pk.team):"awaiting selection"],
      pk ? ["Pick slot", pk.slot>0?fmtM(pk.slot):"—", "slot value"] : null,
      pk ? ["Signing bonus", knownB?fmt$(eb.bonus):"—", knownB?(eb.src||"official"):"not yet known"]
         : ["Est. market value", dem!=null?fmt$(dem):"—", dem!=null?"model estimate":""],
      comp ? ["Position", comp.pos, comp.ht&&comp.wt?fmtHtWt(comp):""] : null,
      comp ? ["Level", `<span class="lvl lvl-tile ${comp.level}">${comp.level==="HS"?"High School":comp.level==="College"?"College":comp.level||"—"}</span>`, ""] : null,
      comp?.age ? ["Age", fmtAge(comp.age), ""] : null,
      (comp && !isP) ? ["Bats", (comp.bats||"—").replace("B","S"), (comp.bats==="B"||comp.bats==="S")?"switch hitter":""] : null,
      (comp && !isP) ? ["Throws", comp.throws||"—", ""] : null,
      ["School", schoolShort(comp?.school)||"—", ""],
      (comp && (comp.level==="HS" || comp.commit)) ? ["Commit", comp.commit||"—", comp.commit?"college commitment":"none listed"] : null,
      // Non-SV players: agency is click-to-edit; SV clients keep the static (self) representation.
      isClient
        ? (comp ? ["Agency", comp.agent||"—", comp.agent?"representation":"none listed"] : null)
        : ["Agency", agEditCell(kqk, comp), "click to edit"],
    ].filter(Boolean);
    const rkChips = comp ? RANK_SRCS.map(([f,label,mk]) => {
      const d = srcAsOf(mk);
      return `<span class="pp-rk"><span class="s">${label}${d?` <span class="a">${d}</span>`:""}</span><span class="r">${comp[f]!=null?"#"+comp[f]:"—"}</span></span>`;
    }).join("") : "";
    let h = `<div class="cc">
      <div class="detail-head">${pk?teamLogo(pk.team,30):""}<span class="rk" style="font-size:20px">${comp?"#"+comp.rank:"NR"}</span>
        <span class="big">${c.name}</span>${comp?"":`<span class="pl">unranked</span>`}${isClient&&(comp||RANGES[c.key])?`<button class="ctl" style="margin-left:auto" onclick="openClientBoard('${kqk}')">▦ View his board</button>`:""}</div>
      <div class="tc-stats pp-stats">${stats.map(([k,v,sub])=>`<div class="tc-stat"><div class="k">${k}</div><div class="v">${v}</div>${sub?`<div class="sub">${sub}</div>`:""}</div>`).join("")}</div>
      ${comp?`<div class="pp-ranks"><span class="pp-rk-t">Source ranks</span>${rkChips}${trendCell(comp)}</div>`:""}
    </div>`;

    // ── player settings bar, right under the header (combine medical + range hard lock) ──
    const rOpts = (sel) => Array.from({length:20},(_,i)=>i+1).map(r=>`<option ${String(r)===String(sel)?"selected":""}>${r}</option>`).join("");
    const rgm = RANGES[c.key] || null;   // unranked clients can carry a manual range too
    h += `<div class="tc-foot pp-foot"><span class="tc-qa">Player settings</span>
      <span style="font-size:12px;font-weight:700;color:#6b7280">Combine medical</span>
      <span class="seg">
        <button class="${ms==='yes'?'on':''}" onclick="setMedical('${kqk}','yes')">✓ Yes</button>
        <button class="${ms==='no'?'on':''}" onclick="setMedical('${kqk}','no')">✗ No</button>
        <button class="${ms==='unknown'?'on':''}" onclick="setMedical('${kqk}','unknown')">? Unk</button>
      </span>
      <span style="font-size:12px;font-weight:700;color:#6b7280;margin-left:12px">Known range (hard lock)</span>
      #<input id="rgLo" type="number" min="1" value="${rgm?.lo||""}" placeholder="lo" style="width:58px;padding:5px;border:1px solid var(--line);border-radius:6px">
      –<input id="rgHi" type="number" min="1" value="${rgm?.hi||""}" placeholder="hi" style="width:58px;padding:5px;border:1px solid var(--line);border-radius:6px">
      <button class="ctl" onclick="setRange('${kqk}', document.getElementById('rgLo').value, document.getElementById('rgHi').value)">Set</button>
      <span style="color:#9aa0a6;font-size:12px">or rounds</span>
      <select id="rgRLo">${rOpts(rgm?roundOfPick(rgm.lo):1)}</select>–<select id="rgRHi">${rOpts(rgm?roundOfPick(rgm.hi):1)}</select>
      <button class="ctl" onclick="setRangeByRound('${kqk}', document.getElementById('rgRLo').value, document.getElementById('rgRHi').value)">Set rounds</button>
      ${rgm?`<button class="ctl" onclick="clearRange('${kqk}')">Clear</button> <span class="outag over">🔒 #${rgm.lo||"—"}–#${rgm.hi||"—"}</span>`:""}</div>`;

    // ── numbered panels in two independent columns (heights flow — no grid-row stretch).
    // Left stacks the compact panels; the long org list runs the right column.
    // 1 — presented/auto comps (top-left)
    const p1 = `<div class="tc-panel" data-q="comps"><h4><span class="n">1</span> Recent Draft Comparisons</h4>${compsTableHtml(c)}</div>`;

    // 2 — every org with logged intel, in draft order of their next pick (right column).
    // Client-only: for a non-SV player there's no intel book to show, so the panel is skipped
    // and the remaining panels renumber.
    let p2 = "";
    if (isClient) {
      const teams = [...new Set(DATA.intel.filter(r=>normName(r.player)===c.key).map(r=>teamAlias(r.team)))]
        .map(t => ({ t, rec:latestIntel(c.key,t), f:fit(comp,t,c.key,state), nx:teamPickInRange(state,t,comp?effRangeOf(comp):null), cr:intelColorRank(c.key,t) }))
        .sort((a,b) => (a.cr-b.cr) || ((!!a.nx !== !!b.nx) ? (a.nx?-1:1) : (a.nx ? a.nx.overall-b.nx.overall : b.f.score-a.f.score)));
      p2 = `<div class="tc-panel" data-q="orgs"><h4><span class="n">2</span> How Each Org Views Him</h4>
        <div class="tc-fitline sm"><span>grouped by latest interest · then their next pick in his landing window</span></div>`;
      let lastCr = -1;
      p2 += teams.length ? teams.map(x => {
        const hdr = x.cr!==lastCr ? intGroupHdr(x.cr) : ""; lastCr = x.cr;
        const pool = state.poolsMap[x.t];
        const ou = (comp && x.nx) ? negBonus(comp, x.nx.slot, x.nx.overall) - x.nx.slot : null;
        return `${hdr}<div class="ct">
          <span class="ov" style="min-width:44px;color:var(--red);font-weight:800">${x.nx?`#${x.nx.overall}`:"—"}</span>
          ${intelDot(c.key, x.t)}
          <span class="tm" data-org="${x.t}">${teamLink(x.t)}</span>${contactBadges(c.key, x.t)}
          <span class="nx">${x.nx?`${fmtM(x.nx.slot)}${ou!=null?` · ${ouTag(ou,true)}`:""}${pool?` · ammo ${fmtM(pool.room)}`:""}`:(teamNextPick(state,x.t)?"no pick in his window":"no picks left")}</span></div>`;
      }).join("") : `<div class="placeholder">No logged team interest.</div>`;
      if (!pk) p2 += renderPickEconomics(state, c, comp);
      p2 += `</div>`;
    }

    // 3 — Money (and, once drafted, the approximate-bonus capture) — under the comps
    let p3 = `<div class="tc-panel" data-q="money"><h4><span class="n">${isClient?3:2}</span> Money</h4>`;
    if (comp) p3 += `<div class="tc-kv"><span class="k">Est. market value</span><span class="v">${fmt$(dem)}</span></div>`;
    if (ms!=="unknown") p3 += `<div class="tc-kv"><span class="k">Medical floor</span><span class="v">${ms==="yes"?(pk&&pk.slot>0?`${fmtM(MEDICAL_FLOOR*pk.slot)} · 75% of slot`:"≥75% of slot"):"none · under-slot possible"}</span></div>`;
    if (pk) {
      p3 += `<div class="tc-kv"><span class="k">Drafted</span><span class="v">#${pk.overall} · ${teamLink(pk.team)}</span></div>`;
      p3 += `<div class="tc-kv"><span class="k">Pick slot</span><span class="v">${pk.slot>0?fmt$(pk.slot):"—"}</span></div>`;
      const lb = bonusFor(c.key), qn = (pk.player || c.name).replace(/'/g,"\\'");
      const sug = suggestBonus(pk);
      if (pk.bonus!=null) p3 += `<div class="tc-kv"><span class="k">Official bonus</span><span class="v">${fmt$(pk.bonus)}${pk.slot>0?` ${ouTag(pk.bonus-pk.slot,false)}`:""}</span></div>`;
      if (lb) p3 += `<div class="tc-kv"><span class="k">Logged (${lb.kind})</span><span class="v">${fmt$(lb.amount)}${pk.slot>0&&lb.amount!=null?` ${ouTag(lb.amount-pk.slot, lb.kind!=='confirmed'?lb.kind.slice(0,3).toUpperCase():false)}`:""}</span></div>`;
      p3 += `<div class="tc-kv"><span class="k">Model suggests</span><span class="v">~${fmt$(sug)}${pk.slot>0?` ${ouTag(sug-pk.slot,true)}`:""}</span></div>`;
      p3 += `<div class="pp-bonusform">
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;font-size:13px">
          $<input id="bvAmount" type="number" placeholder="${sug}" style="width:110px;padding:6px;border:1px solid var(--line);border-radius:6px">
          <select id="bvKind" style="font:inherit;padding:6px;border:1px solid var(--line);border-radius:6px">
            <option value="estimated">estimated</option><option value="reported">reported</option><option value="confirmed">confirmed</option></select>
          <button class="ctl" style="padding:4px 8px;font-size:11px" onclick="document.getElementById('bvAmount').value=${sug}">use est</button>
        </div>
        <div style="display:flex;gap:6px;align-items:center;margin-top:6px">
          <input id="bvNote" placeholder="source / note (optional)" style="flex:1;min-width:0;padding:6px;border:1px solid var(--line);border-radius:6px">
          <button class="ctl primary" onclick="saveBonusVital('${qn}','${pk.team}',${pk.overall})">Save</button>
        </div></div>`;
    } else if (comp) {
      p3 += `<div class="tc-kv"><span class="k">Walk-away floor</span><span class="v">${fmt$(signFloor(comp))}</span></div>`;
      p3 += `<div class="tc-kv"><span class="k">Slot at rank #${comp.rank}</span><span class="v">${slotForRank(comp.rank)?fmt$(slotForRank(comp.rank)):"—"}</span></div>`;
      p3 += `<div class="tc-hab-note">Bonus capture unlocks here the moment he's drafted — log your best guess, then upgrade it to reported/confirmed as the real number firms up.</div>`;
    }
    p3 += `</div>`;

    // 4 — historical precedent in the live context — under the money panel
    const p4 = `<div class="tc-panel" data-q="hist"><h4><span class="n">${isClient?4:3}</span> Historical Precedent</h4>${
      comp ? (DATA.slotHistory.length ? renderEmerging(state, c, comp) : (loadSlotHistory(), `<div class="placeholder">Loading historical signings…</div>`))
           : `<div class="placeholder">Unranked — no precedent profile.</div>`}</div>`;

    h += mobPanels(isClient
      ? `<div class="pp-cols"><div class="pp-col">${p1}${p3}${p4}</div><div class="pp-col">${p2}</div></div>`
      : `<div class="pp-cols"><div class="pp-col">${p1}${p3}</div><div class="pp-col">${p4}</div></div>`, ppPanelOpen);

    h += nbMiniHtml(nbNotes().filter(e => normName(e.player_name||"")===c.key));   // war-room notes on him

    $("detailBody").innerHTML = h;
  }

  function renderTeamDetail(state) {
    const t = selected.id, pool = state.poolsMap[t], o = DATA.orgs[t] || {};
    const teamName = (state.pools.find(p=>p.team===t)||{}).teamName || "";

      overdue.sort((a,b) => (rangeOf(a).hi-rangeOf(b).hi) || (a.rank-b.rank));
      return { comp: overdue[0], bonus: negBonus(overdue[0], pk.slot, pk.overall) };
    }
    // ...and anyone before their earliest isn't eligible yet
    const avail = all.filter(c => { const r=rangeOf(c); return !(r && r.lo && pk.overall < r.lo); }).slice(0, 60);
    if (!avail.length) return null;
    const tb = teamBudget(team, pk.overall);
    const headroom = tb.budget - tb.committed - ENG.RESERVE*tb.poolPicksAfter;
    const extra = (tb.budget - tb.committed - tb.slotsAfter) / (tb.pool || 1);
    const lamEff = Math.max(0.3, Math.min(ENG.LAMBDA*2, ENG.LAMBDA*(1 - ENG.BANK_K*extra)));
    const o = DATA.orgs[team] || {}; const lean = (o.earlyPitcherPct!=null?o.earlyPitcherPct:50)/100;
    const sd = sdFor(pk.round);
    const orgDevN = o.orgRank!=null ? (31 - o.orgRank)/30 : 0.5;   // org-review dev fit (subtle pull)
    let best=null, bestVal=-1e9, bestBonus=0;
    for (const c of avail) {
      const b = negBonus(c, pk.slot, pk.overall);
      if (pk.slot > 0 && b > headroom) continue;        // can't afford -> he slides
      // RANKINGS (talent, convex at top so elite picks are sticky) + MONEY + ORG + INTEL + VARIANCE
      let v = (350 - c.rank) + Math.max(0, (ENG.TOP_SPAN - c.rank)) * ENG.TOP_SEP - lamEff*(b/1e6);
      v += (isPitcher(c.pos) ? (lean-.5) : (.5-lean)) * ENG.POS_LEAN;
      if (pk.slot > 0 && b < pk.slot) v += spreadOf(team) * ENG.SAVE_W * ((pk.slot - b)/1e6);  // banking
      const nm = normName(c.name);
      if (DATA.clients.has(nm)) {                       // intel + org-dev pull (only where we have intel)
        const ti = teamInterest(nm, team);
        if (ti.strength>0) v += ti.strength * ENG.INTEREST_W + (orgDevN-0.5) * ENG.DEV_W;
      }
      v += gaussian() * sd;                             // board-disagreement spread (with tails)
      if (v > bestVal) { bestVal=v; best=c; bestBonus=b; }
    }
    if (!best) {                                        // nothing affordable -> cheapest available
      best = avail.reduce((a,c) => negBonus(c,pk.slot,pk.overall) < negBonus(a,pk.slot,pk.overall) ? c : a, avail[0]);
      bestBonus = negBonus(best, pk.slot, pk.overall);
    }
    // never let the resulting pool charge exceed the +5% ceiling
    const charge = pk.slot>0 ? bestBonus : Math.max(0, bestBonus - LATE_EXEMPT);
    const remain = Math.max(0, tb.budget - tb.committed);
    if (charge > remain) bestBonus -= (charge - remain);
    return { comp: best, bonus: bestBonus };
  }

    const reported = new Set(currentState.picks.filter(p => p.reported).map(p => p.overall));
    const leadPicks = new Set(MOCKLEADS.map(l => l.pick));
    const pk = currentState.picks.find(p => !p.isDrafted && !p.isPass && p.team
      && !reported.has(p.overall) && !leadPicks.has(p.overall));
    if (!cands.length || !pk) { alert("No open pick / available player left to seed."); return; }
    const c = cands[0], srcs = ["JeffPassan", "kileymcd", "CarlosACollazo"];
    const l = { id: `test-${++testSocialN}-${normName(c.name)}`, player: c.name, team: pk.teamName || pk.team,
      pick: pk.overall, confidence: 0.9, src: srcs[testSocialN % 3], mock: true,
      at: new Date().toISOString(), text: `(TEST) Hearing ${c.name} to ${pk.team} at #${pk.overall}.` };
    MOCKLEADS.push(l);
    noteNewLeads([l]);
    if (VIEW !== "board") setView("board"); else renderActive();
  };
  function leadTeamAbbr(t) {
    if (!t) return null;
    const up = teamAlias(t.trim().toUpperCase());
    if (ABBR_TO_ID[up]) return up;
    const low = t.trim().toLowerCase();
    const pools = currentState ? currentState.pools : [];
    const hit = pools.find(p => { const n = (p.teamName || "").toLowerCase();
      return n && (n.includes(low) || low.includes(n.split(" ").pop())); });
    return hit ? hit.team : null;
  }
  function activeLeads(base) {
    const now = Date.now();
    const drafted = currentState
      ? new Set(currentState.picks.filter(p => p.isDrafted && p.player).map(p => normName(p.player)))
      : new Set();
    // ANY reported record clears the player's lead chips — soft included: the server
    // soft-files credible leads, and a surviving raw chip would re-resolve to the
    // team's NEXT open pick (same player rendered on two tiles)
    if (currentState) for (const p of currentState.picks) if (p.reported) drafted.add(normName(p.reported.player));
    return (base || []).filter(l => l.confidence >= LEAD_MIN_CONF
      && (!l.at || isNaN(new Date(l.at)) || now - new Date(l.at).getTime() < LEAD_TTL_MS)
      && !drafted.has(normName(l.player))).slice(0, LEAD_SHOW);
  }
  // live → server leads; mock → seeded demo leads (rehearsal); pre-draft/other → none
  const modeLeads = () => MODE === "mock" ? activeLeads(MOCKLEADS)
                        : MODE === "live" ? activeLeads(XLEADS.leads) : [];
  // Resolve a lead to its target pick: the lead's pick# if that slot is open and the
  // team's, else the team's next open pick. Shared by the tile chips and validateLead.
  function leadTargetPick(l) {
    if (!currentState) return null;
    const ab = leadTeamAbbr(l.team);
    const reported = new Set(currentState.picks.filter(p => p.reported).map(p => p.overall));
    const open = p => !p.isDrafted && !p.isPass && !reported.has(p.overall);
    if (l.pick != null) { const p = currentState.picks.find(x => x.overall === +l.pick); if (p && open(p) && (!ab || p.team === ab)) return p.overall; }
    if (ab) { const p = currentState.picks.find(x => x.team === ab && open(x)); if (p) return p.overall; }
    return null;   // no open pick — the lead lives only in the notebook
  }
  function leadsByPick() {
    const m = new Map();
    for (const l of modeLeads()) { const ov = leadTargetPick(l); if (ov != null && !m.has(ov)) m.set(ov, l); }
    return m;
  }
  // Promote a lead into the reported-pick flow: leadTargetPick resolves the slot, then
  // reportPick does the rest (board chip, tracker flip, clock hold, POST + notebook).
  window.validateLead = (id, ev) => {
    if (ev) ev.stopPropagation();
    const src = MODE === "mock" ? MOCKLEADS : XLEADS.leads;
    const l = (src || []).find(x => String(x.id) === String(id));
    if (!l || !currentState) return;
    const overall = leadTargetPick(l);
    if (overall == null) { alert(`No open pick resolves for "${l.team}" — validate manually from the pick card.`); return; }
    const comp = DATA.compByName.get(normName(l.player));
    reportPick(overall, comp ? comp.name : l.player);
    if (MODE === "live") window.dismissLead(String(l.id));   // durable dismissal; the chip already cleared via the reported filter
  };
  window.dismissLead = async (id, ev) => {
    if (ev) ev.stopPropagation();
    MOCKLEADS = MOCKLEADS.filter(l => String(l.id) !== String(id));
    XLEADS.leads = XLEADS.leads.filter(l => String(l.id) !== String(id));
    renderActive();
    if (MODE === "live") try { await fetch(`/api/xlead?id=${encodeURIComponent(id)}`, { method: "DELETE" }); } catch (e) {}
  };
  // MOCK-ONLY (seedMockLeads demo + testSocial): lead → notebook note, deduped per device.
  // Live never calls this — the server's xlead refresh lock writes live notebook records.
  const LEAD_NOTED_KEY = "dd:leadNoted";
  async function noteNewLeads(leads) {
    let seen; try { seen = new Set(JSON.parse(localStorage.getItem(LEAD_NOTED_KEY) || "[]")); } catch (e) { seen = new Set(); }
    let dirty = false;
    for (const l of leads || []) {
      const id = String(l.id);
      if (seen.has(id)) continue;
      seen.add(id); dirty = true;
      const ov = leadTargetPick(l), ab = leadTeamAbbr(l.team);
      const comp = DATA.compByName.get(normName(l.player));
      await postIntel({ kind: "note",
        note: `⚡ X lead: ${l.player} → ${l.team}${l.pick ? ` at #${l.pick}` : ""} per @${l.src}`
          + (ov == null ? " (no open pick resolves)" : "") + (l.text ? ` — ${l.text}` : ""),
        player_name: comp ? comp.name : null,
        team: !comp && ab ? ab : null }, true);
    }
    if (dirty) try { localStorage.setItem(LEAD_NOTED_KEY, JSON.stringify([...seen].slice(-800))); } catch (e) {}
  }
  // ---------- X fast lane: paste a tweet straight into the ladder + watcher heartbeat ----------
  // The paste POST rides the login cookie; /api/xlead-ingest drops it in the Redis inbox
  // and clears the refresh lock, so the follow-up poll parses it within seconds.
  window.togglePaste = (ev) => {
    if (ev) ev.stopPropagation();
    const p = $("pastePanel"); if (!p) return;
    p.classList.toggle("on");
    if (p.classList.contains("on")) $("pasteIn").focus();
  };
  document.addEventListener("click", (e) => {
    const p = $("pastePanel");
    if (p && p.classList.contains("on") && !(e.target.closest && e.target.closest(".paste-wrap"))) p.classList.remove("on");
  });
  window.pasteSend = async () => {
    const el = $("pasteIn"), btn = $("pasteGo");
    const text = (el.value || "").trim();
    if (!text) return;
    btn.disabled = true; btn.textContent = "…";
    try {
      const r = await fetch("/api/xlead-ingest", { method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ paste: true, tweets: [{ text }] }) });
      if (!r.ok) throw new Error((await r.json().catch(() => ({}))).error || r.status);
      el.value = ""; $("pastePanel").classList.remove("on");
      setTimeout(pollXLeads, 800);   // lock is cleared — this poll runs the parse
    } catch (e) { alert("Paste failed: " + e.message); }
    btn.disabled = false; btn.textContent = "Send";
  };
  function renderXhb(d) {
    const w = $("pasteWrap"); if (w) w.style.display = d.enabled ? "" : "none";
    const hb = $("xhb"); if (!hb) return;
    const live = d.hbAt && (Date.now() - d.hbAt) < 90000;
    hb.classList.toggle("live", !!live);
    hb.title = live ? "X watcher live" : "X watcher quiet — paste lane + sheet bot only";
  }
  async function pollXLeads() {
    if (MODE !== "live" || XLEADS.enabled === false) return;   // server said disabled — stop asking
    try {
      const d = await fetch("/api/xlead", { cache: "no-store" }).then(r => r.json());
      XLEADS.enabled = !!d.enabled;
      renderXhb(d);
      // NO noteNewLeads here: api/xlead's refresh lock is the single writer for live
      // notebook records — client-side noting fires once per war-room device (N dupes)
      if (d.enabled) { XLEADS.leads = d.leads || []; renderActive(); }
    } catch (e) {}
  }

  // ---------- push notifications: "SV client drafted" on this device ----------
  // Server side lives in lib/push.js (detection piggybacks on /api/draft's cache-miss
  // path). The bell renders only when the server has VAPID keys AND this context can
  // push — on iOS that's the installed home-screen PWA (16.4+), never a Safari tab.
  let pushState = {
    supported: "serviceWorker" in navigator && "PushManager" in window && "Notification" in window,
    enabled: false, key: null, busy: false,
  };
  function renderPushCtl() {
    const el = $("pushCtl"); if (!el) return;
    el.innerHTML = `<button class="ctl ${pushState.enabled ? 'primary' : ''}" onclick="togglePush()"
      title="${pushState.enabled ? "Client-drafted alerts ON for this device" : "Notify this device when an SV client is drafted"}">${pushState.busy ? "…"
        : `<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>`}</button>`;
  }
  const _b64ToU8 = (s) => { const p = "=".repeat((4 - s.length % 4) % 4), b = atob((s + p).replace(/-/g, "+").replace(/_/g, "/"));
    return Uint8Array.from([...b].map(c => c.charCodeAt(0))); };
  async function initPush() {
    if (!pushState.supported) return;
    try {
      const cfg = await fetch("/api/push").then(r => r.json());
      if (!cfg.enabled) return;   // server unconfigured — no bell, keep the header clean
      pushState.key = cfg.publicKey;
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.getSubscription();
      pushState.enabled = !!sub && Notification.permission === "granted";
      renderPushCtl();
    } catch (e) {}
  }
  window.togglePush = async () => {
    if (pushState.busy || !pushState.key) return;
    pushState.busy = true; renderPushCtl();
    try {
      const reg = await navigator.serviceWorker.ready;
      if (pushState.enabled) {
        const sub = await reg.pushManager.getSubscription();
        if (sub) {
          await fetch("/api/push", { method: "DELETE", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ endpoint: sub.endpoint }) });
          await sub.unsubscribe();
        }
        pushState.enabled = false;
      } else {
        // permission prompt must ride the tap gesture (iOS hard requirement)
        const perm = await Notification.requestPermission();
        if (perm === "granted") {
          const sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: _b64ToU8(pushState.key) });
          await fetch("/api/push", { method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ subscription: sub.toJSON(), test: true }) });   // test:true → instant confirmation push
          pushState.enabled = true;
        }
      }
    } catch (e) {}
    pushState.busy = false; renderPushCtl();
  };

  // Shareable deep-links: #teamfit opens the Team Fit grid, #research the precedent wizard.
  const applyResHash = () => {
    const hh = (location.hash||"").toLowerCase();
    if (hh==="#teamfit" || hh==="#team-fit") setView("fit");
    else if (hh==="#research") setView("research");
  };
  window.addEventListener("hashchange", applyResHash);

  (async () => {
    initOrgTooltip();
    initPush();   // async — renders the header bell if server + device both support push
    applyTv();
    applyViewVis();   // sync tab/section classes (Board is the default view everywhere)
    applyResHash();   // honor a #teamfit / #research deep-link on first load
    await loadStatic();
    try { await loadOrder(); } catch (e) {}   // slot table for demandFor() in all views
    await loadIntel().then(backfillLocalSettings);   // load shared intel, then migrate browser-only ranges/medicals
    loadSlotHistory();                                // historical draft-slot signings for the team card's Q4
    await loadPickInPlay();                           // sv-teamintel per-pick "in play" checkboxes
    pollLive();
    setInterval(pollLive, 3000);
    pollXLeads();
    setInterval(pollXLeads, 20000);           // X insider leads from DraftDay_Feed (no-op unless configured)
    setInterval(loadIntel, 12000);            // refresh shared intel so the war room stays in sync
    setInterval(() => loadTeamIntel(true), 15000);   // re-pull teamintel colors/scores live
    setInterval(() => loadPickInPlay(true), 15000);  // re-pull per-pick in-play checkboxes
    setInterval(tick, 250);
  })();
</script>
