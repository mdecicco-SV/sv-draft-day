    return { geo01: 1 - Math.min(mi / 2800, 1), mi: Math.round(mi), state: hs, known: true };
  }
  // bonus pool: LIVE pools (richer than sv-draft-fit's static file) min-max across 30
  function dfPool(team, state) {
    const pools = state && state.pools ? state.pools : [];
    if (!pools.length) return { pool01: 0.5, known: false };
    const mine = pools.find(p => p.team === team);
    if (!mine) return { pool01: 0.5, known: false };
    const vals = pools.map(p => p.pool);
    const lo = Math.min(...vals), hi = Math.max(...vals);
    return { pool01: hi > lo ? (mine.pool - lo) / (hi - lo) : 0.5, known: true };
  }
  // ---- projectability: the per-player caliber term the classic engine lacked ----
  // Blend: NCAA model FV (college) / fv.json (HS fallback) + consensus-rank percentile +
  // cross-source agreement (rank dispersion). 0-1; null when nothing known.
  function projOf(comp) { return comp ? (DATA.projection && DATA.projection[normName(comp.name)]) || null : null; }
  function calibOf(comp) {
    if (!comp) return { calib01: null };
    const pj = projOf(comp);
    const parts = [];
    const fvv = pj && Number.isFinite(+pj.final_fv) ? Math.max(0, Math.min(1, (+pj.final_fv - 20) / 40)) : fvNormOf(comp);
    if (fvv != null) parts.push(fvv);
    if (comp.rank) parts.push(Math.max(0, 1 - (comp.rank - 1) / 315));
    const srcs = ["ba", "mlb", "espn", "pbr", "overslot", "ath"].map(k => comp[k]).filter(v => v);
    if (srcs.length >= 2) {
      const spread = Math.max(...srcs) - Math.min(...srcs);
      parts.push(Math.max(0, 1 - spread / (comp.rank ? Math.max(comp.rank * 1.5, 30) : 100)));
    }
    return { calib01: parts.length ? parts.reduce((a, b) => a + b, 0) / parts.length : null,
      fv: pj ? pj.final_fv : fvRawOf(comp), tier: pj ? pj.tier : null,
      draftProb: pj ? pj.draftProb : null, tools: pj ? pj.tools : null, src: pj ? "NCAA model" : (fvRawOf(comp) != null ? "FV feed" : null) };
  }
  // ---- directional lenses: the four questions, each 0-1 ----
  function dirReach(team, comp) {   // best shot to REACH MLB
    const d = dfDev(team, comp), o = DATA.orgs[team] || {};
    const parts = [];
    if (d.known && d.best && d.lgRate != null) parts.push(Math.max(0, Math.min(1, 0.5 + 1.6 * (d.best.rate - d.lgRate))));
    if (o.dev && o.dev.mlbDebut != null && DATA.lgDebut) parts.push(Math.max(0, Math.min(1, 0.5 + 2.0 * (o.dev.mlbDebut - DATA.lgDebut.avg / 100))));
    return { v: parts.length ? parts.reduce((a, b) => a + b, 0) / parts.length : 0.5, known: !!parts.length, d };
  }
  function dirDevelop(team, comp) { // maximize DEVELOPMENT (long-run value extraction)
    const g = comp ? (comp.posGroup || posGroupOf(comp.pos)) : null;
    const w = comp ? warSignal(team, g, comp.rank, comp.level) : { warN: 0.5, known: false };
    const d = dfDev(team, comp);
    // WAR lookback carries 12 mature draft classes; the regime DB only 5 young ones — 60/40.
    const v = d.known && w.known ? 0.6 * w.warN + 0.4 * d.dev01 : w.known ? w.warN : d.known ? d.dev01 : 0.5;
    return { v, known: w.known || d.known, war: w, d };
  }
  function dirSpeed(team, comp) {   // FASTEST through the pipeline
    const W = DATA.warhist && DATA.warhist.orgs && DATA.warhist.orgs[team];
    const ds = W && W.debutSpeed; if (!ds || !comp) return { v: 0.5, known: false };
    const lvl = comp.level === "HS" ? "HS" : "College";
    const cell = ds[lvl] || ds.all; if (!cell || !cell.n) return { v: 0.5, known: false };
    const lgds = DATA.warhist.meta && DATA.warhist.meta.lgDebutSpeed;
    const lg = lgds && lgds[lvl] != null ? lgds[lvl] : (lvl === "HS" ? 5 : 4);   // baked league medians, era '18+
    return { v: Math.max(0, Math.min(1, 0.5 + 0.25 * (lg - cell.medianYears))), known: true,
      med: cell.medianYears, n: cell.n, lg, lvl };
  }
  // ---- acquisition cost vs proven value (FanGraphs prospect-valuation frame, Jul-2026
  // update; approved). FG values the PROSPECT side (FV tier → surplus $, 2026 dollars);
  // the acquisition-cost side (signing bonus / expected bonus) is ours.
  // FV → expected surplus $M during team control, hitters vs pitchers:
  const FGV = {
    hit: { 70:195, 65:95, 60:82, 55:55, 50:45, 47.5:18.5, 45:14.5, 42.5:8, 40:5.5, 37.5:2 },
    pit: { 70:195, 65:95, 60:70, 55:45, 50:33.5, 47.5:15, 45:9.5, 42.5:7, 40:4, 37.5:1.5 },
  };
  const FG_DPW = 8.5e6;   // blended realized-$/WAR (FG uses $7M/$8.5M/$13M by win level)
  // player's FV bucket: prefer graded FV (fv.json, real 20-80 scale); fall back to the
  // NCAA model TIER (Impact→55, Regular→50, Role→45, Org→40) — never raw NCAA FV,
  // whose scale runs hot vs the FG ladder.
  function fgBucketOf(comp) {
    const raw = fvRawOf(comp);
    if (raw != null && DATA.fvScale !== 100) {
      const keys = [70,65,60,55,50,47.5,45,42.5,40,37.5];
      return keys.reduce((b, k) => Math.abs(k - raw) < Math.abs(b - raw) ? k : b, 40);
    }
    const pj = projOf(comp);
    const t = pj && (pj.tier || "");
    if (/Tier 1/.test(t)) return 55;
    if (/Tier 2/.test(t)) return 50;
    if (/Tier 3/.test(t)) return 45;
    if (/Tier 4/.test(t)) return 40;
    return null;
  }
  // expected surplus $ vs expected acquisition cost (his market bonus) — the draft-day read
  function playerValue(comp) {
    if (!comp) return null;
    const b = fgBucketOf(comp);
    if (b == null) return null;
    const kind = isPitcher(comp.pos) ? "pit" : "hit";
    const surplus = FGV[kind][b] * 1e6;
    const cost = demandFor(comp);
    return { fv: b, surplus, cost, net: cost ? surplus - cost : null,
      ratio: cost ? surplus / cost : null, kind };
  }
  // org realized ROI: bonus $ paid vs career-WAR value returned, draft classes 2018+
  // (the slot-history era — first debut Nico Hoerner '19; bonus coverage 99% here).
  // Value credited to the DRAFTING org (draft-day lens; retention split is a noted
  // follow-up — B-Ref carries per-season team_ID). All orgs share the class mix, so
  // the cross-org ranking is exposure-fair even though recent classes deflate levels.
  let _dfROI = null;
  function dfROI(team) {
    const W = DATA.warhist && DATA.warhist.orgs;
    if (!W) return { known: false };
    if (!_dfROI) {
      _dfROI = {};
      const eraFrom = 2018;
      let lgCost = 0, lgVal = 0;
      for (const [t, o] of Object.entries(W)) {
        let cost = 0, val = 0, n = 0;
        for (const p of o.picks) {
          if (p.y < eraFrom || !p.bon) continue;
          cost += p.bon; val += Math.max(p.w, 0) * FG_DPW; n++;
        }
        _dfROI[t] = cost ? { roi: val / cost, cost, val, n, known: true } : { known: false };
        lgCost += cost; lgVal += val;
      }
      _dfROI._lg = lgCost ? lgVal / lgCost : null;
    }
    const r = _dfROI[team] || { known: false };
    return r.known ? { ...r, lg: _dfROI._lg } : r;
  }
  function dirEarn(team, comp) {    // acquisition cost vs proven value
    // Org side: realized ROI on 2018+ classes vs league (primary), over-slot spending
    // willingness (secondary — they pay to acquire). Player surplus rides on the card.
    const roi = dfROI(team), s = dfSpend(team);
    const parts = [];
    if (roi.known && roi.lg) parts.push(Math.max(0, Math.min(1, 0.5 + 0.35 * Math.log2(roi.roi / roi.lg))));
    if (s.known) parts.push(s.spend01);
    const v = parts.length ? (roi.known && roi.lg && s.known
      ? 0.7 * parts[0] + 0.3 * s.spend01
      : parts.reduce((a, b) => a + b, 0) / parts.length) : 0.5;
    return { v, known: !!parts.length, roi, spend: s };
  }
  // empirical composite (Kent weights, HS vs College), ratio-compressed around league avg like the source
  const _dfCompCache = new Map();
  function dfComposite(comp, team, state) {
    if (!dfReady() || !comp) return { v: 0.5, known: false };
    const key = normName(comp.name);
    let all = _dfCompCache.get(key);
    if (!all || all._pools !== (state && state.pools)) {
      const W = DF_WEIGHTS[comp.level === "HS" ? "HS" : "College"];
      all = { _pools: state && state.pools };
      for (const t of Object.keys(DATA.orgs)) {
        all[t] = dfDev(t, comp).dev01 * W.dev + dfPool(t, state).pool01 * W.pool
          + dfSpend(t).spend01 * W.spend + dfDepth(t, comp).depth01 * W.depth + dfGeo(t, comp).geo01 * W.geo;
      }
      const vals = Object.keys(DATA.orgs).map(t => all[t]);
      all._avg = vals.reduce((a, b) => a + b, 0) / vals.length;
      _dfCompCache.set(key, all);
    }
    if (all[team] == null || !all._avg) return { v: 0.5, known: false };
    const ratio = all[team] / all._avg;   // 0.5-centered, ±0.5 per 100% ratio delta (source compression)
    return { v: Math.max(0, Math.min(1, 0.5 + (ratio - 1) * 0.5)), known: true };
  }
  function dfResetCaches() { _dfIdx = null; _dfDevCache.clear(); _dfSpendCache.clear(); _dfCompCache.clear(); }

  // Pipeline lens: how much of the player's position group the org's Top-30 already carries,
  // vs the league norm for that group (a SS isn't judged against pitcher counts). More than
  // the field = they collect his type.
  function pipeSignal(team, g) {
    const ps = orgPosSystem(team), B = leagueBaselines();
    if (!ps || !g || g==="?" || ps[g]==null) return { pipeN:0.5, known:false };
    return { pipeN:_relG(ps[g], B.sys[g]), known:true,
      count: Math.round(ps[g]*ps.n), total: ps.n, lgAvg: B.sys[g]*ps.n };
  }
  // The comp: the org's most recent pick that looks like this player — cascade from strictest
  // (group + HS/college + bats-or-throws side + price bucket) down to group-only.
  function findComp(team, comp, bIdx) {
    const A = histAgg(); if (!A || !A.teams[team] || !comp) return null;
    const picks = A.teams[team].picks;   // pre-sorted: newest year first
    const g = comp.posGroup || posGroupOf(comp.pos);
    const lvl = comp.level==="HS" ? "HS" : comp.level==="College" ? "C" : null;
    const side = isPitcher(comp.pos) ? (comp.throws||null) : (comp.bats||null);
    const sideOf = (p) => p.g==="P" ? p.t : p.b;
    const tiers = [
      [p => p.g===g && (!lvl||p.lvl===lvl) && (!side||sideOf(p)===side) && (bIdx<0||bucketOf(p.bon)===bIdx), "same level · side · price"],
      [p => p.g===g && (!lvl||p.lvl===lvl) && (bIdx<0||bucketOf(p.bon)===bIdx), "same level · price"],
      [p => p.g===g && (bIdx<0||bucketOf(p.bon)===bIdx), "same price"],
      [p => p.g===g && (!lvl||p.lvl===lvl), "same level"],
      [p => p.g===g, "same position group"],
    ];
    for (const [test, label] of tiers) {
      const hit = picks.find(test);
      if (hit) return { pick: hit, match: label };
    }
    return null;
  }
  const OUT_LBL = { mlb:["MLB","reached the majors"], t30:["T30","current Top-30 prospect"], act:["IN SYS","still in the system"], out:["OUT","out of pro ball"] };

  // landing-spot fit FOR the client: interest 45 / dev 20 / type 15 / money 20, where
  // interest is the full-history aggregate (teamInterest). Interest-dominant by design.
  function fit(comp, team, clientKey, state) {
    const o = DATA.orgs[team] || {};
    const interestN = clientKey ? teamInterest(clientKey, team).strength : 0;
    const devN = o.orgRank != null ? Math.max(0, (31 - o.orgRank)/30) : 0.5;
    let typeN = 0.5;
    let flavorN = 0.5;
    if (comp) {
      const lean = (o.earlyPitcherPct!=null?o.earlyPitcherPct:50)/100;
      const posN = isPitcher(comp.pos) ? lean : (1-lean);
      let lvlN = 0.5;
      if (comp.level==="HS" && o.hsPct!=null) lvlN = o.hsPct/100;
      else if (comp.level==="College" && o.collegePct!=null) lvlN = o.collegePct/100;
      typeN = (posN + lvlN)/2;
      // Flavor: positional identity match — arm/bat + level leans, plus (when present)
      // early-draft positional habit and current Top-30 system composition.
      const g = comp.posGroup || posGroupOf(comp.pos);
      const B = leagueBaselines();
      const armShare = o.earlyPitcherPct!=null ? o.earlyPitcherPct/100 : B.epp;
      // arm/bat: is THIS org more inclined to the player's side than the field?
      const armSig = isPitcher(comp.pos) ? _rel(armShare, B.epp) : _rel(1-armShare, 1-B.epp);
      const colShare = o.collegePct!=null ? o.collegePct/100 : B.col;
      const lvlSig = comp.level==="College" ? _rel(colShare, B.col)
                   : comp.level==="HS" ? _rel(1-colShare, 1-B.col) : 0.5;
      const sig = [armSig, lvlSig];
      if (o.posDraftEarly && o.posDraftEarly[g]!=null && B.hab) sig.push(_relG(o.posDraftEarly[g], B.hab[g]));  // draft habit (Phase B)
      const ps = orgPosSystem(team); if (ps && ps[g]!=null) sig.push(_relG(ps[g], B.sys[g]));                    // current system composition
      flavorN = sig.reduce((a,b)=>a+b,0)/sig.length;
    }
    const fvv = comp ? fvNormOf(comp) : null;
    const fvN = fvv==null ? 0.5 : fvv;
    const fvKnown = fvv!=null;
    // Track record + pipeline (drafthist-driven; 0.5-neutral until the file loads)
    const g = comp ? (comp.posGroup || posGroupOf(comp.pos)) : null;
    const pb = comp ? playerBucket(comp) : { est:null, idx:-1 };
    const hist = comp ? histSignal(team, g, pb.idx) : { histN:0.5, known:false };
    const pipe = comp ? pipeSignal(team, g) : { pipeN:0.5, known:false };
    // Track record = recent hit-rate ('18-25) blended 50/50 with the long-run WAR
    // lookback ('18+ classes) when warhist.json is loaded; hit-rate alone otherwise.
    const war = comp ? warSignal(team, g, comp.rank, comp.level) : { warN:0.5, known:false };
    const histN = war.known && hist.known ? 0.5*hist.histN + 0.5*war.warN
                : war.known ? war.warN : hist.histN;
    const pool = state.poolsMap[team];
    const moneyN = pool && pool.ceiling ? Math.max(0, Math.min(1, pool.room/pool.ceiling)) : 0.5;
    const score = Math.round(100*(0.45*interestN + 0.20*devN + 0.15*typeN + 0.20*moneyN));
    // org fit = interest/dev/type only (money excluded), renormalized — lets a strong intel/org
    // fit surface at a slot even when the team's money doesn't work.
    const orgScore = Math.round(100*(0.45*interestN + 0.20*devN + 0.15*typeN)/0.80);
    // Directional lenses (empirical fit engine) — cached per player, cheap per cell.
    // dev/depth ride along as raw 0-1 factors for the weight-blend basis.
    const dir = comp ? {
      reach: dirReach(team, comp), develop: dirDevelop(team, comp),
      speed: dirSpeed(team, comp), earn: dirEarn(team, comp),
      emp: dfComposite(comp, team, state),
      dev: (() => { const d = dfDev(team, comp); return d.known ? d.dev01 : null; })(),
      depth: (() => { const d = dfDepth(team, comp); return d.known ? d.depth01 : null; })(),
      depthInfo: dfDepth(team, comp),
    } : null;
    return { score, orgScore, interestN, devN, typeN, moneyN, flavorN, fvN, fvKnown,
      histN, hist, war, dir, pipeN:pipe.pipeN, pipe, bucketEst:pb.est, bucketIdx:pb.idx };
  }

  // "Is player Y team X's flavor, and why?" — verdict + 2-4 concise reason strings.
  const flavorVerdict = (n) => n>=0.62 ? "Strong flavor" : n>=0.54 ? "On-brand" : n>=0.46 ? "Neutral" : "Against type";
  function flavorReasons(comp, team, state) {
    try {
      const o = DATA.orgs[team] || {};
      const f = fit(comp, team, comp ? normName(comp.name) : null, state);
      const verdict = flavorVerdict(f.flavorN);
      const reasons = [];
      // FV
      const raw = fvRawOf(comp);
      if (raw != null) {
        const meta = fvMetaOf(comp), src = meta && meta.source ? ` (${fvSrcLabel(meta.source)})` : "";
        if (DATA.fvScale===100) reasons.push(`FV ${raw}/100${src} — ${raw>=75?"elite":raw>=60?"solid":"modest"} upside`);
        else reasons.push(`FV ${raw}${src} — ${raw>=60?"elite":raw>=50?"solid":"modest"} upside`);
      } else reasons.push(`FV pending — not yet scored`);
      const isP = comp ? isPitcher(comp.pos) : false;
      const B = leagueBaselines();
      const brand = (dev) => dev>=0.03 ? "on-brand" : dev<=-0.03 ? "off-brand" : "league-average";
      // arm/bat lean vs the FIELD (not a fixed 55/45) — flavor is about deviating from the norm
      if (comp && o.earlyPitcherPct!=null) {
        const ep = Math.round(o.earlyPitcherPct), armShare = o.earlyPitcherPct/100;
        const dev = isP ? (armShare-B.epp) : ((1-armShare)-(1-B.epp));
        reasons.push(isP ? `spends ${ep}% of early picks on arms vs ${Math.round(B.epp*100)}% league — ${brand(dev)}`
                          : `drafts hitters early ${100-ep}% vs ${Math.round((1-B.epp)*100)}% league — ${brand(dev)}`);
      }
      // HS / College mix vs the player's level, relative to the field
      if (comp && comp.level==="HS" && o.hsPct!=null)
        reasons.push(`${Math.round(o.hsPct)}% HS drafters vs ${Math.round((1-B.col)*100)}% league — ${brand((o.hsPct/100)-(1-B.col))} for a prep`);
      else if (comp && comp.level==="College" && o.collegePct!=null)
        reasons.push(`${Math.round(o.collegePct)}% college drafters vs ${Math.round(B.col*100)}% league — ${brand((o.collegePct/100)-B.col)} for a college player`);
      // current system composition (Top-30)
      const g = comp ? (comp.posGroup || posGroupOf(comp.pos)) : null;
      const ps = orgPosSystem(team);
      if (ps && g && ps[g]!=null) {
        const lead = ["P","C","IF","OF"].reduce((a,b)=>(ps[a]||0)>=(ps[b]||0)?a:b);
        reasons.push(lead===g ? `Top-30 already skews ${lead} (${Math.round((ps[lead]||0)*100)}%) — matches his group` : `Top-30 skews ${lead} (${Math.round((ps[lead]||0)*100)}%); he's ${g} (${Math.round((ps[g]||0)*100)}%)`);
      }
      // early-draft positional habit (Phase B data; absent until rebuild)
      if (comp && o.posDraftEarly && g && o.posDraftEarly[g]!=null) {
        const hm = posMatch(o.posDraftEarly, g);
        reasons.push(`drafts ${g} early ${Math.round((o.posDraftEarly[g]||0)*100)}% — ${hm!=null&&hm>=0.66?"on":"off"}-brand`);
      }
      return { verdict, reasons: reasons.slice(0,4) };
    } catch (e) { return { verdict:"Neutral", reasons:[] }; }
  }

  // ---------- VIEW: OUR CLIENTS ----------
  function renderClients(state) {
    const drafted = new Map(); // key -> pick
    state.picks.forEach(p => { if (p.isDrafted && p.player) drafted.set(normName(p.player), p); });
    const dCount = DATA.clientList.filter(c => drafted.has(c.key)).length;
    const secured = DATA.clientList.reduce((s,c)=>{ const pk = drafted.get(c.key); return s + (pk?.slot || 0); }, 0);
    $("clientSummary").innerHTML = [
      ["Clients tracked", DATA.clientList.length, ""],
      ["Drafted", dCount, ""],
      ["Still on board", DATA.clientList.length - dCount, ""],
      ["Slot $ secured", secured ? fmtM(secured) : "$0", "sum of drafted slot values"],
    ].map(([k,v,sub]) => `<div><div class="k">${k}</div><div class="v">${v}</div>${sub?`<div class="sub">${sub}</div>`:""}</div>`).join("");

    if (!DATA.clientList.length) { $("clientRows").innerHTML = `<tr><td colspan="10"><div class="placeholder">No client data — is sv-teamintel reachable?</div></td></tr>`; return; }

    // One scannable row per client: still-on-board first (rank order — that's the working set
    // mid-draft), drafted after (pick order). All depth lives on the player page (row click).
    const rows = [...DATA.clientList].sort((a,b) => {
      const pa = drafted.get(a.key), pb = drafted.get(b.key);
      if (!!pa !== !!pb) return pa ? 1 : -1;
      if (pa && pb) return pa.overall - pb.overall;
      return (a.comp?.rank ?? 1e9) - (b.comp?.rank ?? 1e9);
    });
    $("clientRows").innerHTML = rows.map(c => {
      const comp = c.comp, pk = drafted.get(c.key);
      // Interest: strongest color first; ties broken by who's up soonest INSIDE his landing
      // window (locked range / strike window when set, else the engine estimate) — teams
      // with no pick in the window sort last. Every pill has the same shape (dot · team ·
      // pick slot); no pick in window → "—", so rows scan as a repeated unit.
      const rgW = comp ? effRangeOf(comp) : null;
      const teams = [...new Set(DATA.intel.filter(r=>normName(r.player)===c.key).map(r=>teamAlias(r.team)))]
        .map(t => ({ t, cr: intelColorRank(c.key,t), nx: teamPickInRange(state, t, rgW) }))
        .sort((a,b)=> (a.cr-b.cr) || (!!b.nx-!!a.nx) || ((a.nx?a.nx.overall:1e9)-(b.nx?b.nx.overall:1e9)));
      const interest = teams.length
        ? `<div class="cl-intw">` + teams.slice(0,3).map(x=>{
            const hasPk = x.nx && !pk;
            return `<span class="cl-int">${intelDot(c.key,x.t)}${x.t}<span class="cl-pk${hasPk?"":" na"}">${hasPk?`#${x.nx.overall}`:"—"}</span></span>`;
          }).join("")
          + (teams.length>3?`<span class="cl-int cl-more">+${teams.length-3}</span>`:"") + `</div>`
        : `<span class="cl-none">—</span>`;
      // Range: locked intel range when we have one, else the engine's window around his rank.
      // Unranked (NR) rows get an inline lo/hi editor — same setRange semantics as the player page.
      const rg = rangeOf(comp || c.key);
      const rngEdit = () => { const qk = c.key.replace(/'/g,"\\'"), cur = rg || {};
        return `<span class="cl-rngedit" onclick="event.stopPropagation()" title="set landing range (hard lock)">${cur.lo||cur.hi?"🔒":""}#<input type="number" min="1" value="${cur.lo||""}" placeholder="lo">–<input type="number" min="1" value="${cur.hi||""}" placeholder="hi"><button class="ctl" onclick="var i=this.parentElement.querySelectorAll('input');setRange('${qk}',i[0].value,i[1].value)">Set</button>${RANGES[c.key]?`<button class="ctl" onclick="clearRange('${qk}')" title="clear range">✕</button>`:""}</span>`; };

  // Composite-rank trend across ranking editions (baked from rank_history.json; the point

  function trendCell(p) {

  function clientsInPlay(pk, state) {

  };
  const fmtHtWt = (r) => (r.ht && r.wt) ? `${r.ht.replace("-","'")}" / ${r.wt}` : "—";
  // B/T display: feed marks switch-hitters "B" — show the slot-tracker's "S" convention
  const fmtBT = (r) => (r && (r.bats || r.throws)) ? `${(r.bats||"?").replace("B","S")}/${r.throws||"?"}` : "—";
  // Manual batting-side overrides (normName -> "L" | "R" | "S"). The composite feed now
  // bakes Bats/Throws for nearly everyone — this is only an escape hatch for feed errors.
  const CLIENT_BATS = {};
  // Same-hand rule for comps: pitchers match throwing hand, hitters match batting side.
  // The feed marks switch-hitters "B"; slot-tracker history uses "S" — normalize to "S".
  function handOf(comp) {
    if (!comp) return null;

    const b = CLIENT_BATS[normName(comp.name)] || comp.bats;
    if (!b) return null;

    return { field:"bats", side: side==="B" ? "S" : side };

  // SSs, not the whole infield); generic listings (IF/OF) and pitchers keep group matching.
  const compExactPos = (comp) => { const p = String(comp?.pos||"").toUpperCase();
    return (!isPitcher(comp?.pos) && /^(C|1B|2B|3B|SS|LF|CF|RF)$/.test(p)) ? p : null; };
  // Auto comps: same level × exact position (hitters) or position group, drafted nearest the
  // client's composite rank, deduped, most recent first on ties. Hand: pitchers hard-match
  // throwing hand (RHP -> RHPs); hitters PREFER the same batting side — an off-side comp only
  // makes the table if it's >25 picks closer to his rank than the next same-side option.
  function autoComps(comp) {
    const lvl = comp.level==="HS" ? "HS" : "College", grp = comp.posGroup || posGroupOf(comp.pos);
    const hand = handOf(comp), xp = compExactPos(comp);
    // primary listed position must match: "SS-3B" is an SS comp, "P-SS"/"2b-ss" are not
    const posHit = (r) => (String(r.pos||"").toUpperCase().split(/[^A-Z0-9]+/)[0]||"") === xp;
    const sameHand = (r) => !hand || (r[hand.field]||"").toUpperCase().startsWith(hand.side);
    const seen = new Set(), out = [];
    const rows = DATA.slotHistory.filter(r => r.bonus!=null && (r.level==="HS")===(lvl==="HS")
        && (xp ? posHit(r) : r.group===grp)
        && (isPitcher(comp.pos) ? sameHand(r) : true))
      .sort((a,b) => (Math.abs(a.overall-comp.rank) + (sameHand(a)?0:25))
                   - (Math.abs(b.overall-comp.rank) + (sameHand(b)?0:25)) || b.year-a.year);
    for (const r of rows) { const k = r.first+" "+r.last; if (seen.has(k)) continue; seen.add(k); out.push(r); if (out.length>=5) break; }
    return out;
  }
  // Comps table for ONE client, rendered on his player page (the Our Clients list stays
  // flat; this is part of the "ton of information" behind the row click).
  function compsTableHtml(c) {
    const comp = c.comp; if (!comp) return `<div class="placeholder">Unranked — no comp profile.</div>`;
    if (!DATA.slotHistory.length) { loadSlotHistory(); return `<div class="placeholder">Loading historical signings…</div>`; }
    const curated = DRAFT_COMPS[c.key];
    const rows = curated ? curated.map(n=>slotSign(n)).filter(Boolean) : autoComps(comp);
    const rowsH = rows.map(r=>`<tr>
        <td class="cmp-nm"><span${histAttr(r)}>${r.full || (r.first+" "+r.last)}</span></td>
        <td>${r.pos}</td><td>${r.bats&&r.throws?`${r.bats}/${r.throws}`:"—"}</td>
        <td>${fmtHtWt(r)}</td>
        <td>${compAge(r.born, r.year)??"—"}</td>
        <td class="cmp-dr"><b>${r.year}</b><br><span>${roundLabel(r.round)} · #${r.overall} · ${r.team}</span></td>
        <td class="cmp-bn">${r.bonus!=null?fmt$(r.bonus):"—"}${r.diff!=null?`<br><span class="tg ${r.diff>0?'over':r.diff<0?'under':'fit'}" style="font-size:9px">${r.diff>0?"+":""}${fmtM(r.diff)} vs slot</span>`:""}</td>
      </tr>`).join("");
    const wd = rows.filter(r=>r.bonus!=null);
    const lo = wd.length?Math.min(...wd.map(r=>r.bonus)):null, hi = wd.length?Math.max(...wd.map(r=>r.bonus)):null;
    const avg = wd.length ? wd.reduce((s,r)=>s+r.bonus,0)/wd.length : null;
    return `
      <table class="cmp-table"><thead><tr><th>Player</th><th>Pos</th><th>B/T</th><th>HT / WT</th><th>Age</th><th>Drafted</th><th>Bonus</th></tr></thead>
      <tbody>
        <tr class="cmp-us"><td class="cmp-nm">${c.name}</td><td>${comp.pos}</td><td>${fmtBT(comp)}</td><td>${fmtHtWt(comp)}</td><td>${fmtAge(comp.age)||"—"}</td>
          <td class="cmp-dr"><b>2026</b><br><span>TBD${comp.rank?` · ranked #${comp.rank}`:""}</span></td><td class="cmp-bn">—</td></tr>
        ${rowsH || `<tr><td colspan="7"><div class="placeholder">No comps found for this profile.</div></td></tr>`}
      </tbody></table>
      <div class="cmp-foot">${curated?"Presented comps (already shared)":(()=>{const hd=handOf(comp), xp=compExactPos(comp);
        const hdTxt = !hd ? "" : hd.field==="throws" ? ` × ${hd.side==="L"?"lefty":"righty"} (throws)`
          : hd.side==="S" ? " · switch-hitters preferred" : ` · ${hd.side}HH preferred`;
        return `Auto comps — same level × ${xp||"position"}${hdTxt}, drafted nearest his rank`;})()}${avg!=null?` · comp bonuses ${fmtM(lo)}–${fmtM(hi)} · avg <b>${fmt$(Math.round(avg))}</b>`:""}</div>`;
  }

  // Historical precedent search over the FULL 2018-25 slot-tracker database: same-profile
  // signings scored against a live context lens (pick band, $ band, team) — recency breaks ties.
  function precedentRows(comp, ctx) {
    const lvl = comp.level==="HS" ? "HS" : "College", grp = comp.posGroup || posGroupOf(comp.pos);
    const rows = DATA.slotHistory.filter(r => r.bonus!=null && (r.level==="HS")===(lvl==="HS") && r.group===grp);
    const score = (r) => {
      let s = 0;
      if (ctx.pickLo!=null) s += (r.overall>=ctx.pickLo && r.overall<=ctx.pickHi) ? 0
        : Math.min(Math.abs(r.overall-ctx.pickLo), Math.abs(r.overall-ctx.pickHi));
      if (ctx.amtLo!=null) { const m=(ctx.amtLo+ctx.amtHi)/2;
        s += (r.bonus>=ctx.amtLo && r.bonus<=ctx.amtHi) ? 0 : Math.abs(r.bonus-m)/m*30; }
      if (ctx.teamName && r.team===ctx.teamName) s -= 25;   // same-team precedent is gold
      return s;
    };
    return rows.map(r=>({r, s:score(r)})).sort((a,b)=> a.s-b.s || b.r.year-a.r.year)
      .slice(0,5).map(x=>x.r);
  }

  // Emerging context — as the draft develops, what's the reasonable HISTORICAL precedent for
  // this client given the live situation: logged offers, his strike window, prospective team
  // fits. Presented comps are highlighted when they "pop" into the current context.
  function renderEmerging(state, c, comp) {
    const lvl = comp.level==="HS" ? "HS" : "College", grp = comp.posGroup || posGroupOf(comp.pos);
    const last = tcInitialName(c.name).split(" ").slice(-1)[0];
    const presented = new Set((DRAFT_COMPS[c.key]||[]).map(normName));
    const teamNameOf = (ab) => (state.picks.find(p=>p.team===ab)||{}).teamName || null;
    const cap = intelFor(c.key);
    let h = "";

    // Upcoming opportunities in his talent window (also feeds the fit lens below).
    const dpk = state.picks.find(p=>p.isDrafted && normName(p.player||"")===c.key);
    const ops = [];
    if (!dpk) for (const p of state.picks) {
      if (p.isDrafted) continue;
      if (!inRangeAt(c.key, p.overall)) continue;
      const team = p.team, o = DATA.orgs[team] || {};
      const intel = intelColorRank(c.key, team) <= 1 && tiInPlayAt(c.key, team, p.overall);
      const lvlLean = lvl==="HS" ? (o.hsPct!=null && o.hsPct>=30) : (o.collegePct!=null && o.collegePct>=75);
      const posLean = isPitcher(comp.pos) ? (o.earlyPitcherPct!=null && o.earlyPitcherPct>=55)
                                          : (o.earlyPitcherPct!=null && o.earlyPitcherPct<=45);
      const pool = state.poolsMap[team];
      const money = pool ? pool.room >= negBonus(comp, p.slot, p.overall) : true;
      const habit = lvlLean && posLean && money && tiInPlayAt(c.key, team, p.overall);
      if (intel || habit) ops.push({ p, intel, why: intel ? (habit?"intel + habit":"live intel") : "habit + $" });
      if (ops.length >= 6) break;
    }

    // Assemble context lenses (priority: drafted > offers > window > fits > rank fallback).
    const contexts = [];
    if (dpk) {
      contexts.push({ title:`Drafted lens · #${dpk.overall} ${dpk.team}`,
        ctx:{ pickLo:Math.max(1,dpk.overall-8), pickHi:dpk.overall+8, teamName:dpk.teamName||teamNameOf(dpk.team) } });
    } else {
      for (const o of (cap?.offers||[]).slice(0,2)) {
        const loA = o.lo!=null ? o.lo : (o.amount!=null ? o.amount*0.8 : null);
        const hiA = o.hi!=null ? o.hi : (o.amount!=null ? o.amount*1.2 : null);
        if (loA==null) continue;
        contexts.push({ title:`Offer lens · ${o.team||"?"} · ${o.amount!=null?fmtM(o.amount):`${fmtM(o.lo)}–${fmtM(o.hi)}`}`,
          ctx:{ amtLo:loA, amtHi:hiA, teamName:teamNameOf(o.team) } });
      }
      const win = cap?.window || RANGES[c.key];
      if (win && (win.lo || win.hi)) {
        const wl = win.lo||1, wh = win.hi||(win.lo+20);
        contexts.push({ title:`Range lens · #${wl}–#${wh}`, ctx:{ pickLo:wl, pickHi:wh } });
      }
      for (const x of ops.filter(o=>o.intel).slice(0, 2 - Math.min(1, contexts.length))) {
        contexts.push({ title:`Fit lens · ${x.p.team} at #${x.p.overall}`,
          ctx:{ pickLo:Math.max(1,x.p.overall-8), pickHi:x.p.overall+8, teamName:x.p.teamName||teamNameOf(x.p.team) } });
      }
    }
    if (!contexts.length) contexts.push({ title:`Rank lens · around #${comp.rank}`,
      ctx:{ pickLo:Math.max(1,comp.rank-10), pickHi:comp.rank+10 } });

    // Render precedent blocks — pop-highlight presented comps that surface naturally.
    for (const blk of contexts.slice(0,3)) {
      const rows = precedentRows(comp, blk.ctx);
      const pops = rows.filter(r=>presented.has(normName(r.full || (r.first+" "+r.last))));
      h += `<div class="cmp-emh">Historical precedent — ${blk.title}</div>`;
      if (pops.length) h += `<div class="cmp-popnote">★ Presented comp pops here: <b>${pops.map(r=>`<span${histAttr(r)}>${r.full||(r.first+" "+r.last)}</span>`).join(", ")}</b></div>`;
      h += rows.length ? rows.map(r=>{
        const pop = presented.has(normName(r.full || (r.first+" "+r.last)));
        return `<div class="cmp-em-row ${pop?'cmp-pop':''}">
          <span class="rr-no">'${String(r.year).slice(2)}</span>
          <span class="cmp-em-nm"><span${histAttr(r)}>${r.full||(r.first+" "+r.last)}</span>${pop?' <span class="cmp-popbadge">★ presented</span>':''}</span>
          <span class="cmp-em-meta">${r.pos} · #${r.overall} · ${r.team}</span>
          <span class="cmp-em-val">${fmt$(r.bonus)}${r.diff!=null?` <span class="tg ${r.diff>0?'over':r.diff<0?'under':'fit'}">${r.diff>0?"+":""}${fmtM(r.diff)} vs slot</span>`:""}</span></div>`;
      }).join("") : `<div class="placeholder">No same-profile precedent in this context.</div>`;
    }
    if (dpk) {
      const deb = effectiveBonus(dpk);
      return h + `<div class="cmp-foot">${last} drafted #${dpk.overall} by ${dpk.team}${deb.bonus!=null?` · ${fmtM(deb.bonus)}`:""} — precedent above frames the signing conversation.</div>`;
    }

    h += `<div class="cmp-emh">Emerging opportunities — where ${last} could land <span class="exp-hint">live intel + team-habit fits in his window · click for the team card</span></div>`;
    h += ops.length ? ops.map(x=>`<div class="cmp-em-row" onclick="expandPick(${x.p.overall})">
        <span class="rr-no">#${x.p.overall}</span>${teamLogo(x.p.team,14)}<span class="cmp-em-tm">${x.p.team}</span>
        <span class="cmp-em-nm">${x.p.slot>0?fmtM(x.p.slot):"—"}</span>
        <span class="cmp-em-meta">${roundLabel(x.p.round)}</span>
        <span class="cmp-em-val"><span class="tg ${x.why.includes("intel")?"over":"late"}">${x.why}</span></span></div>`).join("")
      : `<div class="placeholder">No open picks in his window fit yet.</div>`;
    return h;
  }
  // Readable text color for a filled intel-color card.
  function textOn(hex) {
    const h=(hex||"").replace("#",""); if (h.length<6) return "#111";
    const r=parseInt(h.slice(0,2),16), g=parseInt(h.slice(2,4),16), b=parseInt(h.slice(4,6),16);
    return (0.299*r+0.587*g+0.114*b)/255 > 0.62 ? "#111" : "#fff";
  }

  // Dropdown multi-select. Empty selection = "Big Board" (every pick shows its full in-play
  // cluster). One selected → full-color heat board; 2+ → filtered dots. Clicking items keeps
  // the menu open (multi-select); it closes on outside-click.
  function renderBoardPlayers(state) {
    const el = $("boardPlayers"); if (!el) return;
    const sel = boardSelClients, bigOn = sel.size===0;
    const drafted = new Set(state.picks.filter(p=>p.isDrafted&&p.player).map(p=>normName(p.player)));
    for (const p of state.picks) if (repHard(p.reported)) drafted.add(normName(p.reported.player));
    const clients = DATA.clientList.filter(c=>c.comp || rangeOf(c.key)).sort((a,b)=>(a.comp?.rank ?? 1e9)-(b.comp?.rank ?? 1e9));
    // one player selected -> the chip names whose board it is, never a bare "1 player"
    const selC = clients.filter(c=>sel.has(c.key));
    const value = bigOn ? "All"
      : sel.size===1 ? `${(selC[0]?.name||"").trim().split(/\s+/).pop()}’s board`
      : `${sel.size} players`;
    const big = `<div class="pdrop-item ${bigOn?'on':''}" onclick="clearBoardClients(event)">
      <span class="pi-ck">${bigOn?'☑':'☐'}</span><span class="pi-nm">▦ Big Board (all)</span></div><div class="pdrop-sep"></div>`;
    const list = clients.map(c=>{
      const dr=drafted.has(c.key), on=sel.has(c.key);
      return `<div class="pdrop-item ${on?'on':''} ${dr?'dr':''}" onclick="toggleBoardClient('${c.key.replace(/'/g,"\\'")}',event)">
        <span class="pi-ck">${on?'☑':'☐'}</span><span class="pi-nm">${c.name}</span><span class="pi-rk">${c.comp?`#${c.comp.rank}`:"NR"}</span></div>`;
    }).join("");
    el.innerHTML = `<div class="pdrop">
        <button class="pdrop-btn" onclick="togglePlayerMenu(event)">
          <span class="pdrop-txt"><span class="pdrop-t">Players</span><span class="pdrop-v ${bigOn?'':'sel'}">${value}</span></span>
          <span class="caret">▾</span></button>
        <div class="pdrop-menu" style="display:${playerMenuOpen?'block':'none'}">${big}${list}</div>
      </div>`;
    // Mobile toolbar is an overflow-x scroller, which also clips vertically — unclip while open.
    const bar = el.closest(".ba-filters"); if (bar) bar.classList.toggle("menu-open", playerMenuOpen);
    // Selected players' last names inline in the toolbar's open space (chip already names a single pick).
    const names = sel.size>1 ? selC.map(c=>(c.name||"").trim().split(/\s+/).pop()) : [];
    const sn = $("boardSelNames"); if (sn) sn.textContent = names.join(", ");
  }
  window.togglePlayerMenu = (e) => { if(e) e.stopPropagation(); playerMenuOpen = !playerMenuOpen; renderBoardPlayers(currentState); };
  // Player page -> the board pre-focused to just this client ("View his board")
  window.openClientBoard = (key) => { boardSelClients.clear(); boardSelClients.add(key); playerMenuOpen = false; setView("board"); };
  document.addEventListener("click", (e) => {
    if (playerMenuOpen && !(e.target.closest && e.target.closest(".pdrop"))) { playerMenuOpen = false; renderBoardPlayers(currentState); }
    if (bonusEdit!=null && !(e.target.closest && e.target.closest(".bc-bform"))) { bonusEdit = null; renderBoard(currentState); }
    if ((resPosOpen||resStOpen) && !(e.target.closest && e.target.closest(".res-pdrop"))) { resPosOpen = false; resStOpen = false; renderResearch(); }
    if (baOpen && !(e.target.closest && e.target.closest(".ba-drop"))) { baOpen = null; renderBaChips(); }
    if ((rfClientsMenu||rfBoardMenu||rfPosMenu||rfRankMenu) && !(e.target.closest && e.target.closest(".rf-drop, .res-pdrop"))) { rfClientsMenu = false; rfBoardMenu = false; rfPosMenu = false; rfRankMenu = false; if (VIEW==="fit") renderRfControls(); }
  });
  window.toggleBoardClient = (key, e) => {
    if (e) e.stopPropagation();
    if (boardSelClients.has(key)) boardSelClients.delete(key); else boardSelClients.add(key);
    renderBoard(currentState);
  };
  window.clearBoardClients = (e) => { if (e) e.stopPropagation(); boardSelClients.clear(); renderBoard(currentState); };

  // The dot cluster for one undrafted pick: {key,name,rank,hex} per player to show.
  // Teamintel-only (no heat scores): Big Board mode → every client with live green/light-green
  // teamintel for this team who is in play at THIS pick (sv-teamintel checkboxes + our rule-outs).
  // Focus mode → the selected clients, any logged color, still gated by per-pick in-play.
  function pickDots(pk, state) {
    const team = pk.team, sel = boardSelClients;
    const mk = (c) => ({ key:c.key, name:c.name, rank:intelColorRank(c.key,team), hex:intelColorHex(c.key,team), nr:!c.comp });
    let entries;
    if (sel.size===0) entries = tiClientsAt(pk, state).map(mk);
    else entries = [...sel].map(k=>DATA.clientList.find(c=>c.key===k)).filter(c=>c&&(c.comp||rangeOf(c.key)))
      .filter(c => intelColorRank(c.key,team)<5 && tiInPlayAt(c.key, team, pk.overall))
      .map(mk);
    return entries.sort((a,b)=> a.rank-b.rank || a.name.localeCompare(b.name));
  }

  // Which drafted tile has its bonus-entry form open (pick overall, or null).
  let bonusEdit = null;
  window.openBonusChip = (ov, e) => {
    if (e) e.stopPropagation();
    bonusEdit = ov; renderBoard(currentState);
    const a = $("bxAmt"); if (a) { a.focus(); a.select(); }
  };
  window.closeBonusChip = (e) => { if (e) e.stopPropagation(); bonusEdit = null; renderBoard(currentState); };
  // Comma-group the bonus amount as it's typed, keeping the caret with its digit.
  window.fmtBonusInput = (el) => {
    const digitsBefore = el.value.slice(0, el.selectionStart).replace(/\D/g,"").length;
    el.value = el.value.replace(/\D/g,"").replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    let pos = 0, seen = 0;
    while (pos < el.value.length && seen < digitsBefore) { if (/\d/.test(el.value[pos])) seen++; pos++; }
    el.setSelectionRange(pos, pos);
  };
  window.saveBonusChip = (ov, e) => {
    if (e) e.stopPropagation();
    const amt = parseFloat(($("bxAmt")?.value||"").replace(/[^\d.]/g,"")), val = !!($("bxVal")?.checked);
    if (!Number.isFinite(amt) || amt<=0) { alert("Enter a bonus amount."); return; }
    const p = (currentState?.picks||[]).find(x=>x.overall===ov); if (!p) return;
    bonusEdit = null;
    // a reported (unofficial) pick takes a bonus too — logged against the reported player,
    // so the number carries straight through when MLB confirms the pick
    const repName = !p.isDrafted && p.reported ? p.reported.player : null;
    if (MODE==="mock") {
      if (repName) { const rec = REPORTED_MOCK.get(ov); if (rec) { rec.bonus = amt; rec.bonusV = val; } pushMock(); }
      else { p.bonus = amt; p.bonusV = val; p.bonusUser = true; pushMock(); }
    }
    else {
      renderBoard(currentState);   // close the form now; loadIntel() re-renders with the logged number
      postIntel({ kind:"bonus", player_name:repName || p.player, team:p.team, pick_overall:ov,
        offer_type: val?"confirmed":"estimated", amount:amt, status:"active", note: repName ? "board chip (reported pick)" : "board chip" });
    }
  };

  // manual overrides on the auto-fold of completed rounds (session-scoped)
  const openRounds = new Set();
  window.toggleRound = (r) => { openRounds.has(r) ? openRounds.delete(r) : openRounds.add(r); renderActive(); };
  function renderBoardGrid(state) {
    const svOnly = $("bSv").checked, focus = boardSelClients.size>0, CAP = 6;
    const leadMap = leadsByPick();   // active X leads resolved onto their target pick tiles
    // Exactly one player selected → full intel-color "heat" board around that player.
    const single = boardSelClients.size===1 ? [...boardSelClients][0] : null;
    const singleC = single ? DATA.clientList.find(c=>c.key===single) : null;
    // One continuous flex grid; full-width round headers force a wrap. Dedupe by
    // round so interleaved comp/PPI picks don't re-emit "Round 1" repeatedly.
    let html = `<div class="board-grid">`;
    // Completed rounds fold to a one-line summary so the current round owns the
    // screen — SV picks stay named on the folded header; tap re-expands. Not
    // applied in SV-only mode (that view is already sparse).
    const rdStat = new Map();
    for (const p of state.picks) {
      let s = rdStat.get(p.round); if (!s) rdStat.set(p.round, s = { total:0, done:0, sv:[] });
      s.total++; if (p.isDrafted || p.isPass) s.done++;
      if (p.isDrafted && p.player && DATA.clients.has(normName(p.player))) s.sv.push(p.player);
    }
    const seenRounds = new Set();
    for (const p of state.picks) {
      const ours = p.isDrafted && DATA.clients.has(normName(p.player||""));
      if (svOnly && !ours) continue;
      const rs = rdStat.get(p.round), complete = rs.done === rs.total;
      const folded = complete && !svOnly && !openRounds.has(String(p.round));
      if (!seenRounds.has(p.round)) {
        seenRounds.add(p.round);
        const sum = complete ? ` <span class="rc-sum">· ✓ ${rs.total} picks${rs.sv.length?` · <b>SV:</b> ${rs.sv.map(_esc).join(", ")}`:""}</span><span class="rc-tgl">${folded?"▸ expand":"▾ collapse"}</span>` : "";
        html += `<div class="bc-rnd${complete?" done":""}"${complete?` onclick="toggleRound('${String(p.round).replace(/'/g,"\\'")}')"`:""}>${roundLabel(p.round)}${sum}</div>`;
      }
      if (folded) continue;
      const onclock = state.onClock && state.onClock.overall === p.overall;
      let cardCls = `bcard ${ours?"sv":""} ${onclock?"oc":""}`, dotsHtml = "", body, cardStyle = "";
      if (p.isDrafted) {
        // Selected player: one line per vital — position, school (denotes level), agency,
        // bonus, slot diff. No hometown on tiles.
        body = (p.player||"—") + (ours?' <span class="svtag">SV</span>':"");
        const comp = DATA.compByName.get(normName(p.player||""));
        const eb = effectiveBonus(p);
        // mobile tiles are rows, not columns — meta joins onto one line, money onto another
        const metaParts = [pickPos(p, comp), schoolShort(comp?.school || p.school), comp?.agent].filter(Boolean);
        const lines = MOBILE.matches
          ? (metaParts.length ? [`<div class="bc-meta">${metaParts.join(" · ")}</div>`] : [])
          : metaParts.map(v=>`<div class="bc-meta">${v}</div>`);
        // Bonus = click-to-enter chip. NOTHING shows until a number is entered ($— placeholder):
        // live = official feed or a war-room log; mock = only a chip-entered value (the engine's
        // simulated bonus stays in the pool math but off the tile). Checked box = validated.
        const shown = MODE==="mock" ? !!p.bonusUser : (eb.bonus!=null && (p.bonus!=null || eb.src));
        const validated = MODE==="mock" ? !!p.bonusV : (p.bonus!=null || eb.src==="confirmed");
        if (bonusEdit === p.overall) {
          const cur = Math.round(shown ? eb.bonus : suggestBonus(p));

            <label><input id="bxVal" type="checkbox"${validated?" checked":""}>validated</label>

        } else if (shown) {

          const chip = `<span class="bc-chip${validated?" val":""}" title="Click to edit signing bonus" onclick="openBonusChip(${p.overall},event)"><span class="bc-ck">${validated?"✓":""}</span>${fmtM(eb.bonus)}${src}</span>`;

  // Right-hand running pick feed: every pick in order, live/upcoming state, click to focus.

  function feedHtml(state, inCard) {
    let rows = "", lastRound = null;

      if (p.round !== lastRound) { lastRound = p.round; rows += `<div class="feed-rnd">${roundLabel(p.round)}</div>`; }

      const comp = p.isDrafted ? DATA.compByName.get(normName(p.player||"")) : null;
      let cls = "feed-row", who, sub;
      if (p.isDrafted) {
        who = p.player || "—";
        sub = [pickPos(p, comp), comp?.agent, schoolShort(comp?.school || p.school)].filter(Boolean).join(" · ");
        if (ours) cls += " sv";
      } else if (onclock) { cls += " oc"; who = "On the clock"; sub = "● NOW"; }
      else { cls += " up"; who = "Upcoming"; sub = ""; }
      const onclick = p.isDrafted
        ? `${inCard?"closeTeamCard();":""}openPlayer('${normName(p.player||"").replace(/'/g,"\\'")}')`
        : (inCard ? `goCardPick(${p.overall})` : `expandPick(${p.overall})`);
      // Drafted rows show known money only (official > confirmed > reported/estimated log) —
      // model estimates stay off the feed; they surface as the suggestion in the entry form.

        <span class="fr-val">${val}</span></div>`;

    return `<div class="feed-hd"><span class="live"></span>Live Pick Feed</div><div class="feed-scroll">${rows}</div>`;

  function jumpCurrent() { document.getElementById("ocRow")?.scrollIntoView({ block:"center", behavior:"smooth" }); }
  // ---------- VIEW: BONUS POOLS ----------
  const POOL_COLS = [["team","Team"],["picksMade","Picks"],["pool","Pool"],["overage","Overage"],["room","Room"],
                     ["poolCharge","Spent"],["overUnder","Over/Under"],["pctNum","%"]];
  let poolSort = { key:"room", dir:-1 };   // dir: -1 desc, 1 asc
  window.sortPools = (key) => {
    if (poolSort.key === key) poolSort.dir *= -1;
    else poolSort = { key, dir: key==="team" ? 1 : -1 };
    renderPools();
  };
  function renderPools() {
    if (!currentState) return;
    $("poolHead").innerHTML = "<tr>" + POOL_COLS.map(([k,label]) => {
      const arrow = poolSort.key===k ? (poolSort.dir<0 ? " ▾" : " ▴") : "";
      return `<th class="sortable" onclick="sortPools('${k}')">${label}${arrow}</th>`;
    }).join("") + "</tr>";
    const { key, dir } = poolSort;
    const pools = currentState.pools.slice().sort((a,b) =>
      key==="team" ? dir*a.team.localeCompare(b.team) : dir*(((a[key]??0)) - ((b[key]??0))));
    $("poolNote").textContent = currentState.poolsEst
      ? "Spent counts only official + war-room-entered bonuses (includes unofficial entries)"
      : `${currentState.madeCount} picks in · Spent counts only official + war-room-entered bonuses`;
    // phone columns are narrow — compact money ("$9.25M") and a signed over/under badge
    const money = MOBILE.matches ? fmtM : fmt$;
    const ou = MOBILE.matches ? (n => !n ? "slot" : (n>0?"+":"−")+fmtM(Math.abs(n))) : fmtOU;
    // Room heat: least room = soft red, median = neutral gray, most room = soft green.
    // Light tints only, on the Room cell — the ink stays the table's own.
    const rooms = pools.map(t => t.room ?? 0);
    const rMin = Math.min(...rooms), rMax = Math.max(...rooms);
    const rMed = pctOf(rooms, 0.5) ?? (rMin + rMax) / 2;
    const RED = [247,209,205], GRAY = [241,242,243], GREEN = [206,236,213];
    const mix = (c1, c2, t) => `rgb(${c1.map((a,i)=>Math.round(a+(c2[i]-a)*t)).join(",")})`;
    const roomBg = (v) => {
      if (!Number.isFinite(v) || rMax === rMin) return "";
      const bg = v <= rMed ? mix(RED, GRAY, rMed > rMin ? (v - rMin) / (rMed - rMin) : 1)
                           : mix(GRAY, GREEN, rMax > rMed ? (v - rMed) / (rMax - rMed) : 0);
      return ` style="background:${bg}"`;
    };
    $("poolBody").innerHTML = pools.map(t => {
      const ouCls = t.overUnder>50000 ? "over" : t.overUnder<-50000 ? "under" : "atslot";
      const pctCls = t.pctNum>=4.8 ? "over" : t.pctNum<0 ? "under" : "atslot";
      const hasKnown = t.knownSlot > 0 || t.poolCharge > 0;   // any real/entered money on the books yet?
      return `<tr class="clickable" onclick="openTeam('${t.team}')">
        <td><b>${t.team}</b></td>
        <td>${t.picksMade}/${t.picksTotal}</td>
        <td>${money(t.pool)}</td>
        <td>${money(t.overage)}</td>
        <td${roomBg(t.room ?? 0)}>${t.hasEst?"~":""}${money(t.room)}</td>
        <td>${money(t.poolCharge)}${t.hasEst?' <span class="outag est atslot">est</span>':""}</td>
        <td>${hasKnown ? `<span class="outag ${ouCls}">${ou(t.overUnder)}</span>` : `<span class="sub">—</span>`}</td>
        <td>${t.poolCharge ? `<span class="outag ${pctCls}">${t.pctNum>=0?"+":""}${t.pctNum.toFixed(1)}%</span>` : `<span class="sub">—</span>`}</td>
      </tr>`;
    }).join("");
  }

  // ---------- DETAIL: player / team drill-down ----------
  const teamUpcoming = (state, t) => state.picks.filter(p => p.team===t && !p.isDrafted).sort((a,b)=>a.overall-b.overall);
  const teamMade = (state, t) => state.picks.filter(p => p.team===t && p.isDrafted).sort((a,b)=>a.overall-b.overall);

  const pctOf = (arr,p) => { if(!arr.length) return null; const s=arr.slice().sort((a,b)=>a-b); return s[Math.min(s.length-1, Math.max(0, Math.round(p*(s.length-1))))]; };

  // ---------- LIVE INTEL CAPTURE (Supabase via /api/intel) ----------
  let INTEL = { events: [], byKey: new Map(), loadedAt: 0 };
  let armed = null;   // inline capture form currently open: { key, name, kind }
  const agentName = () => { try { return localStorage.getItem("dd:agent") || ""; } catch (e) { return ""; } };
  window.setAgent = (v) => { try { localStorage.setItem("dd:agent", v||""); } catch (e) {} renderActive(); };

  async function loadIntel() {
    try {
      const r = await fetch("/api/intel", { cache:"no-store" });
      if (!r.ok) throw new Error(r.status);
      const d = await r.json();
      INTEL.events = Array.isArray(d.events) ? d.events : [];
      INTEL.loadedAt = Date.now();
      deriveIntel();
      renderActive();
      if (nbOpen) renderNbFeed();   // notebook feed rides the existing 12s intel poll
    } catch (e) { /* best-effort; keep prior state */ }
  }
  // Collapse the append-only log into current state per player key (events come newest-first).
  function deriveIntel() {
    const byKey = new Map();
    for (const ev of INTEL.events) {
      const key = normName(ev.player_name||""); if (!key) continue;
      let s = byKey.get(key);
      if (!s) { s = { interest:new Map(), ruleOuts:[], window:null, offers:[], bonuses:[], events:[] }; byKey.set(key, s); }
      s.events.push(ev);
      const team = ev.team || null;
      if (ev.kind==="interest_sought" || ev.kind==="interest_received") {
        const mk = (team||"") + "|" + ev.kind;
        if (!s.interest.has(mk)) s.interest.set(mk, { team, dir: ev.kind==="interest_sought"?"sought":"received", strength: ev.strength, color: ev.color, date: ev.created_at });
      } else if (ev.kind==="rule_out" && ev.status==="active") {
        s.ruleOuts.push({ team, pick: ev.pick_overall, date: ev.created_at });
      } else if (ev.kind==="strike_window" && ev.status==="active") {
        if (!s.window) s.window = { lo: ev.window_lo, hi: ev.window_hi, date: ev.created_at };
      } else if (ev.kind==="offer") {
        s.offers.push({ team, type: ev.offer_type, amount: ev.amount, lo: ev.amount_lo, hi: ev.amount_hi, pick: ev.pick_overall, status: ev.status, date: ev.created_at });
      } else if (ev.kind==="bonus") {                   // reported/confirmed/estimated signing bonus (newest first)
        s.bonuses.push({ team, kind: ev.offer_type||"reported", amount: ev.amount, pick: ev.pick_overall, note: ev.note, date: ev.created_at });
      } else if (ev.kind==="medical") {                 // newest-first, so first seen wins
        if (s.medical===undefined) s.medical = ev.note || "unknown";
      } else if (ev.kind==="range") {
        if (s.range===undefined) s.range = (ev.window_lo || ev.window_hi) ? { lo: ev.window_lo, hi: ev.window_hi } : null;
      } else if (ev.kind==="agency") {                  // newest-first, so first seen wins ("" clears)
        if (s.agency===undefined) s.agency = ev.note || "";
      }
    }
    INTEL.byKey = byKey;
    // Overlay shared settings onto local caches so medical/range sync across the war room.
    // (shared wins; local-only values not present in the feed are left intact)
    for (const [key, s] of byKey) {
      if (s.medical!==undefined) { if (s.medical && s.medical!=="unknown") MEDICALS[key]=s.medical; else delete MEDICALS[key]; }
      if (s.range!==undefined) { if (s.range) RANGES[key]=s.range; else delete RANGES[key]; }
      if (s.agency!==undefined) { if (s.agency) AGENCIES[key]=s.agency; else delete AGENCIES[key]; }
    }
    try { localStorage.setItem("dd:medicals", JSON.stringify(MEDICALS)); localStorage.setItem("dd:ranges", JSON.stringify(RANGES)); localStorage.setItem("dd:agencies", JSON.stringify(AGENCIES)); } catch (e) {}
  }
  const intelFor = (key) => INTEL.byKey.get(key) || null;
  // Best-known signing bonus for a player, across war-room captures AND the teamintel feed:
  // any confirmed beats any rumor; within a tier, war-room capture wins.
  function bonusFor(key) {
    const s = intelFor(key);
    const logged = s && s.bonuses && s.bonuses.length
      ? (s.bonuses.find(b=>b.kind==="confirmed" && b.amount!=null) || s.bonuses.find(b=>b.amount!=null) || null) : null;
    const feed = DATA.feedBonuses ? (DATA.feedBonuses.get(key) || null) : null;
    if (logged && feed) return (feed.kind==="confirmed" && logged.kind!=="confirmed") ? feed : logged;
    return logged || feed || null;
  }

  async function postIntel(ev, silent) {
    ev.agent = ev.agent || agentName() || "console";
    try {
      const r = await fetch("/api/intel", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(ev) });
      if (!r.ok) throw new Error(await r.text());

  // ---------- WAR-ROOM NOTEBOOK — shared free-form notes (kind:"note" via /api/intel) ----------
  // The panel renders itself only (never from the global render loop), so the composer draft,
  // tag pick, and open pickers survive live ticks; loadIntel refreshes just the feed list.
  let nbOpen=false, nbFilter="all", nbDraft="", nbTag=null, nbPicker=null, nbQ="", nbBusy=false, nbSearch="";
  // auto-filed X-lead reports (noteNewLeads) can crowd the feed — toggleable, sticky per device
  let nbShowX = (()=>{ try { return localStorage.getItem("dd:nbShowX") !== "0"; } catch (e) { return true; } })();
  // matches the client mock format (⚡) AND the server xlead formats (📡 raw, 🟡 soft-file)
  const nbIsXLead = (e) => /^(⚡ X lead:|📡 |🟡 reported)/.test(e.note||"");
  window.nbToggleX = () => { nbShowX = !nbShowX;
    try { localStorage.setItem("dd:nbShowX", nbShowX ? "1" : "0"); } catch (e) {}

  window.toggleNotebook = (open) => {

  // Tiny inline-SVG line chart — no external lib, auto-scales y to the data range.
  // Each point is {v, hex}; segments are colored by the report's interest color at that time,
  // so the line literally shifts color (green→yellow→red…) as the signal changes over the window.
  function tcSparkline(points, fallback) {
    const W = 360, H = 90, pad = 7;
    if (!points || !points.length) return `<div class="placeholder" style="height:${H}px;display:flex;align-items:center;justify-content:center">No signal history.</div>`;
    let pts = points.map(p => (typeof p === "number") ? { v:p, hex:fallback } : p);
    if (pts.length === 1) pts = [pts[0], pts[0]];
    const vals = pts.map(p=>p.v);
    let lo = Math.min(...vals), hi = Math.max(...vals);
    if (hi === lo) { hi += 1; lo -= 1; }
    const n = pts.length;
    const x = i => pad + (i/(n-1))*(W-2*pad);
    const y = v => pad + (1-(v-lo)/(hi-lo))*(H-2*pad);
    const areaPts = `${pad.toFixed(1)},${(H-pad).toFixed(1)} ` + pts.map((p,i)=>`${x(i).toFixed(1)},${y(p.v).toFixed(1)}`).join(" ") + ` ${(W-pad).toFixed(1)},${(H-pad).toFixed(1)}`;
    let segs = "";
    for (let i=1;i<n;i++) segs += `<polyline points="${x(i-1).toFixed(1)},${y(pts[i-1].v).toFixed(1)} ${x(i).toFixed(1)},${y(pts[i].v).toFixed(1)}" fill="none" stroke="${pts[i].hex}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"></polyline>`;
    const dots = pts.map((p,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(p.v).toFixed(1)}" r="2.6" fill="${p.hex}"></circle>`).join("");
    return `<svg class="tc-spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <polyline points="${areaPts}" fill="${fallback}14" stroke="none"></polyline>
      ${segs}${dots}</svg>`;
  }

  // Landing fit for one player at one specific pick: is this a plausible slot for his talent,

  function tcPickFit(comp, pick, state) {

    const rg = effRangeOf(comp) || { lo: 1, hi: 9999 };
    const early = pick.overall < rg.lo;         // reaching (taking him earlier than his window)
