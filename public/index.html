<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SV Draft Day</title>
<link rel="icon" href="/favicon.svg" />
<style>
  @font-face { font-family:'Satoshi'; src:url('/fonts/Satoshi-Regular.otf') format('opentype'); font-weight:400; font-display:swap; }
  @font-face { font-family:'Satoshi'; src:url('/fonts/Satoshi-Medium.otf') format('opentype'); font-weight:500; font-display:swap; }
  @font-face { font-family:'Satoshi'; src:url('/fonts/Satoshi-Bold.otf') format('opentype'); font-weight:700; font-display:swap; }
  @font-face { font-family:'Satoshi'; src:url('/fonts/Satoshi-Black.otf') format('opentype'); font-weight:900; font-display:swap; }
  :root { --red:#ff2a22; --red-deep:#d81e17; --ink:#141414; --muted:#6b6b6b; --line:#e3e3e3; --bg:#f4f3f1; --card:#ffffff; --good:#1a7f37; }
  * { box-sizing: border-box; }
  body { margin:0; font:15px/1.45 'Satoshi',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; color:var(--ink); background:var(--bg); -webkit-font-smoothing:antialiased; }
  header { display:flex; align-items:center; gap:12px; padding:10px 16px; background:#fff; border-bottom:3px solid var(--red); position:sticky; top:0; z-index:6; }
  header .logo { height:26px; width:auto; display:block; }
  header .title { font-weight:900; letter-spacing:.2px; font-size:17px; }
  header .badge { margin-left:auto; font-size:12px; font-weight:700; color:var(--red); border:1px solid var(--red); border-radius:999px; padding:3px 10px; }
  .dot { width:9px; height:9px; border-radius:50%; background:#bbb; display:inline-block; }
  .dot.live { background:var(--good); } .dot.err { background:var(--red); }
  .seg { display:inline-flex; border:1px solid var(--line); border-radius:8px; overflow:hidden; }
  .seg button { border:0; background:#fff; padding:6px 12px; font:inherit; font-weight:700; cursor:pointer; color:var(--muted); }
  .seg button.on { background:var(--red); color:#fff; }

  .tabs { display:flex; gap:4px; padding:8px 16px 0; background:#fff; border-bottom:1px solid var(--line); position:sticky; top:49px; z-index:5; }
  .tabs button { border:0; border-bottom:3px solid transparent; background:none; padding:8px 14px; font:inherit; font-weight:700; color:var(--muted); cursor:pointer; }
  .tabs button.on { color:var(--ink); border-bottom-color:var(--red); }

  .bar { display:flex; align-items:center; gap:8px; flex-wrap:wrap; padding:8px 16px; background:#fff7f8; border-bottom:1px solid var(--line); position:sticky; top:90px; z-index:5; }
  .bar.hidden { display:none; }
  .prebanner { display:flex; align-items:center; justify-content:center; gap:8px; padding:9px 16px; background:#fff; border-bottom:1px solid var(--line); font-size:13px; font-weight:700; color:var(--ink); position:sticky; top:90px; z-index:4; }
  .prebanner b { color:var(--red); font-variant-numeric:tabular-nums; }
  .pulse { width:8px; height:8px; border-radius:50%; background:var(--red); box-shadow:0 0 0 0 rgba(255,42,34,.5); animation:pulse 1.6s infinite; }
  @keyframes pulse { 70% { box-shadow:0 0 0 7px rgba(255,42,34,0); } 100% { box-shadow:0 0 0 0 rgba(255,42,34,0); } }
  .ctl { border:1px solid var(--line); background:#fff; border-radius:8px; padding:6px 11px; font:inherit; font-weight:700; cursor:pointer; }
  .ctl.primary { background:var(--red); color:#fff; border-color:var(--red); }
  .bar select { font:inherit; padding:6px 8px; border:1px solid var(--line); border-radius:8px; }
  .bar .note { color:var(--muted); font-size:12px; margin-left:auto; }

  main { max-width:1080px; margin:0 auto; padding:16px; }
  .view { display:none; } .view.on { display:block; }

  /* shared */
  h2 { font-size:13px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); margin:22px 0 8px; }
  .placeholder { color:var(--muted); font-size:13px; border:1px dashed var(--line); border-radius:10px; padding:12px; background:#fff; }
  .idot { width:12px; height:12px; border-radius:50%; border:1px solid rgba(0,0,0,.15); display:inline-block; }
  .idot[data-intel-key] { cursor:help; }
  .pdw { font-size:10px; font-weight:800; color:var(--red); border:1px solid var(--red); border-radius:4px; padding:1px 5px; }
  .pdw.cmb { color:#3949ab; border-color:#3949ab; margin-left:4px; }
  .grade { font-size:12px; font-weight:800; color:#fff; border-radius:6px; padding:2px 7px; }
  .grade[data-org] { cursor:help; }
  #orgTip { position:fixed; z-index:60; max-width:270px; background:#141414; color:#fff; border-radius:10px;
            padding:11px 13px; font-size:12px; line-height:1.5; box-shadow:0 8px 24px rgba(0,0,0,.28); pointer-events:none; display:none; }
  #orgTip .ot-h { font-weight:900; font-size:13px; margin-bottom:5px; }
  #orgTip .ot-sec { color:#ff6a63; font-weight:800; font-size:10px; text-transform:uppercase; letter-spacing:.4px; margin-top:7px; margin-bottom:1px; }
  #orgTip .ot-row { display:flex; justify-content:space-between; gap:16px; }
  #orgTip .ot-row span { color:#aaa; } #orgTip .ot-row b { font-variant-numeric:tabular-nums; }

  /* clients view */
  .summary { display:flex; gap:18px; flex-wrap:wrap; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px 18px; margin-bottom:14px; }
  .summary .k { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; }
  .summary .v { font-size:24px; font-weight:900; font-variant-numeric:tabular-nums; }
  .clients { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .cc { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px 16px; }
  .cc.drafted { opacity:.92; border-color:#cfe8d6; }
  .cc .top { display:flex; align-items:baseline; gap:8px; }
  .cc .rk { font-weight:900; color:var(--red); }
  .cc .nm { font-weight:800; font-size:17px; }
  .cc .pl { color:var(--muted); font-size:13px; margin-left:auto; }
  .cc .status { margin:6px 0 10px; font-size:13px; font-weight:700; }
  .cc .status.av { color:var(--muted); } .cc .status.dr { color:var(--good); }
  .ct { display:flex; align-items:center; gap:8px; padding:5px 0; border-top:1px solid var(--line); font-size:13px; }
  .ct .tm { font-weight:800; min-width:38px; } .ct .nx { color:var(--muted); margin-left:auto; text-align:right; font-variant-numeric:tabular-nums; }
  .ct .ov { min-width:34px; color:var(--red); font-weight:800; font-variant-numeric:tabular-nums; }

  /* clock view */
  .clock-card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:18px 20px; }
  .clock-card.mock { border-color:#f1b8c1; box-shadow:0 0 0 2px #fdeef0; }
  .pick-no { font-size:13px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
  .team-line { display:flex; align-items:center; gap:14px; margin:6px 0 2px; }
  .team-abbr { font-size:44px; font-weight:900; line-height:1; }
  .team-name { font-size:15px; color:var(--muted); }
  .countdown { margin-left:auto; text-align:right; }
  .cd-time { font-size:46px; font-weight:900; font-variant-numeric:tabular-nums; line-height:1; }
  .cd-time.low { color:var(--red); }
  .cd-time.days { font-size:clamp(24px,6vw,34px); }
  .cd-label { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
  .alert { margin-top:12px; background:#fff5f6; border:1px solid #f1b8c1; border-radius:10px; padding:10px 12px; font-size:14px; font-weight:700; color:var(--red); }
  .pool-row { display:flex; gap:10px; flex-wrap:wrap; margin-top:16px; }
  .stat { background:#fafafa; border:1px solid var(--line); border-radius:10px; padding:9px 13px; min-width:92px; }
  .stat .k { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; }
  .stat .v { font-size:20px; font-weight:800; font-variant-numeric:tabular-nums; margin-top:2px; }
  .cols { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:14px; }
  .panel { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px 16px; }
  .panel h3 { margin:0 0 10px; font-size:12px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); }
  .chips { display:flex; flex-wrap:wrap; gap:6px; }
  .chip { font-size:12px; font-weight:600; background:#f1f3f5; border-radius:999px; padding:4px 10px; }
  .chip .lab { color:var(--muted); }
  .r1 { margin-top:10px; font-size:13px; color:var(--muted); } .r1 div { padding:2px 0; }
  .intel .row { display:flex; align-items:center; gap:9px; padding:3px 0; }
  .intel .nm { font-weight:700; } .intel .sc { color:var(--muted); font-size:13px; margin-left:auto; }
  .recent { display:flex; flex-direction:column; gap:6px; }
  .pick { display:flex; align-items:center; gap:10px; background:#fff; border:1px solid var(--line); border-radius:10px; padding:8px 12px; }
  .pick .ov { font-weight:800; min-width:38px; color:var(--red); }
  .pick .who { font-weight:700; } .pick .rkbadge { font-size:11px; font-weight:700; color:var(--good); }
  .pick .clab { font-size:11px; font-weight:700; color:#fff; background:var(--good); border-radius:4px; padding:0 5px; }
  .pick .meta { color:var(--muted); font-size:13px; margin-left:auto; text-align:right; }

  /* best available */
  .ba-filters { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:10px; }
  .ba-filters select, .ba-filters input { font:inherit; padding:6px 9px; border:1px solid var(--line); border-radius:8px; }
  .ba-filters label { font-size:12px; font-weight:700; color:var(--muted); display:inline-flex; align-items:center; gap:5px; }
  .ba-filters .count { margin-left:auto; color:var(--muted); font-size:13px; font-weight:700; }
  table.ba { width:100%; border-collapse:collapse; background:#fff; border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  table.ba th { text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:var(--muted); padding:8px 10px; border-bottom:1px solid var(--line); background:#fafafa; }
  table.ba td { padding:7px 10px; border-bottom:1px solid #f0f1f3; font-size:14px; }
  table.ba tr.sv { background:#fff5f6; }
  table.ba tr.draftable:hover { background:#fdeef0; cursor:pointer; }
  table.ba .rk { font-weight:800; color:var(--red); }
  .lvl { font-size:11px; font-weight:700; border-radius:4px; padding:1px 6px; }
  .lvl.HS { background:#eef2ff; color:#3949ab; } .lvl.College { background:#e8f5e9; color:#2e7d32; }
  .lvl.JUCO { background:#fff3e0; color:#e65100; } .lvl.Unk { background:#f1f3f5; color:#6b7280; }
  .svtag { font-size:10px; font-weight:800; color:#fff; background:var(--red); border-radius:4px; padding:1px 5px; }
  .outag { font-size:10px; font-weight:800; border-radius:4px; padding:1px 5px; white-space:nowrap; }
  .outag.over { background:#e8f5e9; color:#1a7f37; }
  .outag.under { background:#fff3e0; color:#e65100; }
  .outag.atslot { background:#f1f3f5; color:#6b7280; }
  .outag.est { opacity:.85; border:1px dashed currentColor; padding:0 4px; }
  table.ba th.sortable { cursor:pointer; user-select:none; white-space:nowrap; }
  table.ba th.sortable:hover { color:var(--red); }
  .cc.clickable { cursor:pointer; } .cc.clickable:hover { border-color:var(--red); }
  table.ba tr.clickable { cursor:pointer; } table.ba tr.clickable:hover { background:#fff5f6; }
  .tlink { color:var(--red); font-weight:800; text-decoration:none; cursor:pointer; }
  .tlink:hover { text-decoration:underline; }
  .detail-head { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
  .detail-head .big { font-size:26px; font-weight:900; }
  .backbtn { margin-bottom:12px; }

  /* board */
  .board { display:flex; flex-direction:column; gap:3px; }
  .rnd { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin:10px 0 3px; }
  .brow { display:flex; align-items:center; gap:9px; background:#fff; border:1px solid var(--line); border-radius:8px; padding:6px 10px; font-size:14px; }
  .brow .ov { font-weight:800; min-width:42px; color:var(--red); font-variant-numeric:tabular-nums; }
  .brow .tm { font-weight:800; min-width:40px; }
  .brow .who { font-weight:700; }
  .brow .rkbadge { font-size:11px; font-weight:700; color:var(--good); }
  .brow .meta { color:var(--muted); font-size:12px; margin-left:auto; font-variant-numeric:tabular-nums; }
  .brow.up { background:#fafbfc; color:#9aa0a6; } .brow.up .tm { color:#6b7280; }
  .brow.sv { background:#fff5f6; border-color:#f1b8c1; }
  .brow.oc { border-color:var(--red); box-shadow:0 0 0 2px #fdeef0; }

  @media (max-width:680px) {
    .team-abbr { font-size:34px; } .cd-time { font-size:34px; }
    .countdown { margin-left:0; text-align:left; width:100%; }
    .cols, .clients { grid-template-columns:1fr; }
    table.ba .hide-sm { display:none; }
    .bar { top:90px; }
  }

  /* ── Scenario Engine: probability bars ── */
  .proj-head { display:flex; align-items:baseline; gap:6px; font-size:12px; font-weight:700; margin:8px 0 6px; }
  .proj-head b { color:var(--red); }
  .proj-head .sims { margin-left:auto; color:var(--muted); font-weight:600; font-size:11px; }
  .proj-wait { font-size:11px; color:var(--muted); margin-top:8px; }
  .proj-bar { position:relative; height:6px; background:#f0f1f3; border-radius:3px; margin-bottom:8px; }
  .proj-bar .pb-fill { position:absolute; height:100%; background:#e8ddf9; border-radius:3px; }
  .proj-bar .pb-med { position:absolute; width:10px; height:10px; top:-2px; background:var(--red); border-radius:50%; transform:translateX(-50%); box-shadow:0 0 0 2px #fff; }

  /* ── Pick probability section on Clock ── */
  .prob-section { margin-top:12px; }
  .prob-section .ph3 { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin:0 0 6px; }
  .prob-row { display:flex; align-items:center; gap:8px; padding:3px 0; font-size:13px; }
  .prob-mini { flex:1; height:5px; background:#f0f1f3; border-radius:3px; overflow:hidden; }
  .prob-mini .fill { height:100%; background:var(--red); border-radius:3px; }
  .prob-pct { font-weight:700; font-size:12px; min-width:34px; text-align:right; color:var(--red); }

  /* ── Board entropy ── */
  .brow.ent-hot { background:#fff8f0!important; border-left:3px solid #e8820e!important; }
  .brow.ent-chalk { background:#f0fff4!important; border-left:3px solid #1a7f37!important; }
  .brow.wi-lock { border-left:3px solid #6366f1!important; }
  .ent-legend { font-size:11px; color:var(--muted); font-weight:700; display:flex; gap:12px; align-items:center; }
  .ent-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:3px; }

  /* ── Card grid view ── */
  .board-grid { display:flex; flex-wrap:wrap; gap:5px; }
  .bc-rnd { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin:10px 0 4px; width:100%; }
  .bcard { background:#fff; border:1px solid var(--line); border-radius:9px; padding:7px 8px; width:88px; min-height:86px; font-size:12px; display:flex; flex-direction:column; cursor:pointer; }
  .bcard:hover { border-color:var(--red); }
  .bcard.sv { background:#fff5f6; border-color:#f1b8c1; }
  .bcard.oc { border-color:var(--red); box-shadow:0 0 0 2px #fdeef0; }
  .bcard.ent-hot { border-color:#e8820e; background:#fffaf5; }
  .bcard.ent-chalk { border-color:#1a7f37; background:#f5fff7; }
  .bcard .bc-no { font-size:10px; font-weight:700; color:var(--muted); }
  .bcard .bc-team { font-weight:900; font-size:14px; line-height:1.1; }
  .bcard .bc-slot { font-size:10px; color:var(--muted); }
  .bcard .bc-player { font-weight:700; font-size:11px; flex:1; margin-top:3px; line-height:1.3; }
  .bcard .bc-ti { display:flex; flex-wrap:wrap; gap:2px; margin-top:auto; padding-top:3px; }
  .bcard .ti-pill { font-size:9px; font-weight:800; background:#f0f1f3; border-radius:3px; padding:1px 4px; color:#444; }
  .bcard .ti-Ap { background:#d4edda; color:#155724; }
  .bcard .ti-A { background:#d4edda; color:#155724; }
  .bcard .ti-Bp { background:#dbeafe; color:#1e3a8a; }

  /* ── What If panel ── */
  .wi-wrap { background:#fff; border:1px solid #c7c3f4; border-radius:12px; padding:14px 16px; margin-bottom:14px; }
  .wi-wrap h3 { margin:0 0 10px; font-size:12px; text-transform:uppercase; letter-spacing:.6px; color:#6366f1; display:flex; align-items:center; gap:8px; }
  .wi-controls { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
  .wi-controls select { font:inherit; padding:5px 7px; border:1px solid var(--line); border-radius:7px; max-width:200px; }
  .wi-lock-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-bottom:6px; font-size:13px; }
  .wi-lock-row select { font:inherit; padding:4px 6px; border:1px solid var(--line); border-radius:6px; }
  .wi-delta { margin-top:10px; }
  .wi-delta-hdr { display:flex; gap:8px; font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.4px; color:var(--muted); padding-bottom:4px; border-bottom:1px solid var(--line); }
  .wi-delta-hdr .dn { flex:1; } .wi-delta-hdr .db,.wi-delta-hdr .dn2,.wi-delta-hdr .dd { min-width:54px; text-align:right; }
  .wi-drow { display:flex; align-items:center; gap:8px; font-size:13px; padding:4px 0; border-bottom:1px solid #f5f5f5; }
  .wi-drow .dn { font-weight:700; flex:1; }
  .wi-drow .db { color:var(--muted); min-width:54px; text-align:right; font-variant-numeric:tabular-nums; }
  .wi-drow .dn2 { font-weight:700; min-width:54px; text-align:right; font-variant-numeric:tabular-nums; }
  .wi-drow .dd { font-weight:800; min-width:60px; text-align:right; font-variant-numeric:tabular-nums; }
  .wi-drow .dd.pos { color:var(--good); } .wi-drow .dd.neg { color:var(--red); }

  /* ── Simulation progress toast ── */
  #projToast { position:fixed; bottom:18px; right:18px; z-index:70; display:none; align-items:center; gap:9px;
    background:#141414; color:#fff; border-radius:999px; padding:9px 16px; font-size:13px; font-weight:700;
    box-shadow:0 8px 24px rgba(0,0,0,.28); }
  #projToast b { font-variant-numeric:tabular-nums; color:#ff6a63; }
  #projToast .pt-bar { width:60px; height:5px; background:rgba(255,255,255,.2); border-radius:3px; overflow:hidden; }
  #projToast .pt-fill { height:100%; background:var(--red); border-radius:3px; transition:width .12s linear; }

  /* ── Board: clickable picks + expand-pick in-play table ── */
  .brow.clickrow { cursor:pointer; } .brow.clickrow:hover { border-color:var(--red); }
  .brow.clickrow .who { color:var(--red); font-weight:700; }
  .brow.clickrow.expanded, .bcard.expanded { box-shadow:0 0 0 2px #6366f1; border-color:#6366f1; }
  .exp-wrap { background:#fff; border:1px solid #c7c3f4; border-radius:12px; padding:14px 16px; margin-bottom:12px; }
  .exp-head { display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
  .exp-no { font-weight:900; color:#6366f1; font-size:15px; }
  .exp-sub { color:var(--muted); font-size:13px; }
  .exp-section { margin-top:14px; margin-bottom:6px; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:var(--ink); }
  .exp-hint { color:var(--muted); font-weight:600; text-transform:none; letter-spacing:0; font-size:11px; margin-left:6px; }
  .exp-table { display:flex; flex-direction:column; gap:2px; }
  .exp-row { display:flex; align-items:center; gap:9px; padding:7px 8px; border:1px solid var(--line); border-radius:8px; background:#fff; flex-wrap:wrap; }
  .exp-row.ruled { opacity:.55; background:#fafafa; }
  .er-prob { font-weight:900; color:var(--red); min-width:42px; font-variant-numeric:tabular-nums; }
  .er-name { font-weight:700; min-width:170px; } .er-name .er-rk { color:var(--muted); font-weight:600; font-size:12px; }
  .er-bits { display:flex; gap:5px; flex-wrap:wrap; align-items:center; flex:1; }
  .ib { font-size:11px; font-weight:700; border-radius:5px; padding:1px 6px; background:#f1f3f5; color:#444; display:inline-flex; align-items:center; gap:3px; }
  .ib.sought { background:#e0e7ff; color:#3730a3; } .ib.received { background:#dcfce7; color:#166534; }
  .ib.feed { background:#f8f9fa; border:1px solid var(--line); } .ib.win { background:#fef3c7; color:#92400e; } .ib.offer { background:#fae8ff; color:#86198f; }
  .tg { font-size:11px; font-weight:700; border-radius:5px; padding:1px 6px; background:#f1f3f5; color:#6b7280; }

<script>
  const $ = (id) => document.getElementById(id);
  const fmt$ = (n) => n == null ? "—" : "$" + Math.round(n).toLocaleString();
  const fmtAge = (a) => { if (a==null||a==="") return ""; const n=parseFloat(a); return Number.isFinite(n) ? String(n).replace(/\.0$/,"") : String(a); };
  const fmtM = (n) => n == null ? "—" : "$" + (n/1e6).toFixed(2) + "M";
  const DRAFT_START = Date.UTC(2026, 6, 11, 17, 30, 0);   // Jul 11 2026, 1:30 PM ET (EDT = UTC-4)
  function fmtCountdown(ms) {
    if (ms < 0) ms = 0; let s = Math.floor(ms/1000);
    const d = Math.floor(s/86400); s -= d*86400;
    const h = Math.floor(s/3600); s -= h*3600;
    const m = Math.floor(s/60); s -= m*60;
    const p = (n) => String(n).padStart(2,"0");
    return (d>0 ? d+"d " : "") + p(h)+":"+p(m)+":"+p(s);
  }
  const LATE_EXEMPT = 150000;   // rounds 11+ (slot 0): only bonus above this counts vs the pool
  const CUSHION = 1.05;         // teams may exceed pool by 5% before forfeiting a 1st-round pick
  // Budget-engine params, calibrated to the 2021-25 over/under curve (slot-tracker).
  const ENG = {
    LAMBDA: 4.5,          // cost of money: talent points sacrificed per $1M
    BANK_K: 2.5,          // spare money vs picks left -> lower cost-of-money (spend the cushion)
    RESERVE: 90000,       // $ reserved per remaining pool pick so late picks stay signable
    TOP_DISCOUNT: 0.90,   // elite picks (<=10) sign under the mega-slot
    RAMP_DIV: 24,         // leverage premium ramps in from pick 1 to ~pick 25
    EROSION_RATE: 0.010,  // a slider's price erodes per spot fallen past his rank
    EROSION_FLOOR: 0.40,
    HOLD: { HS:0.90, JUCO:0.85, "College-JR":0.55, "College-SR":0.15 }, // over-slot premium captured
    POS_LEAN: 14, INTEREST_MAX: 3,
    INTEREST_W: 9,        // talent pts an interested team adds per unit of intel strength (pull toward fit)
    DEV_W: 4,             // org-review dev-fit pull for teams interested in our guy
    TOP_SEP: 5, TOP_SPAN: 6,  // convex separation concentrated in the true elite (top ~6): sticky above,
                              // but a #9 gets ~none so he's free to slide. Thins the upward tail only.
    BAND: 0.25,           // signing bonus lands within slot +/-25% (95% of high picks do, 2015-24)
    FLOOR_MULT: 0.82,     // default personal walk-away ~= 0.82x market value (per-player capturable later)
    SAVE_W: 3.0,          // banking weight: talent pts a spreader gives per $1M saved vs slot.
                          // Tuned so a SPECIFIC high-pick faller-grab stays "unlikely" (~14% for a top
                          // spreader like SF) per scouting input, while aggregate under-slot/faller
                          // rates sit near the 2015-24 history (~35-49% / ~19-31%).
  };
  // Pool-spreader propensity 0..1 from 2015-24 (under-slot early -> over-slot late). Drives which
  // teams will grab a faller under slot to bank for an over-slot pick later.
  const SPREAD = {"TEX":1,"SD":0.91,"SF":0.83,"BAL":0.64,"LAA":0.63,"CLE":0.58,"ATL":0.54,"BOS":0.53,"LAD":0.53,"NYY":0.48,"ATH":0.46,"CHC":0.42,"MIA":0.41,"DET":0.38,"ARI":0.36,"NYM":0.35,"CHW":0.31,"CIN":0.31,"HOU":0.3,"KC":0.3,"STL":0.29,"MIN":0.28,"TOR":0.26,"PHI":0.21,"MIL":0.2,"PIT":0.14,"WSH":0.05,"TB":0.04,"COL":0,"SEA":0};
  const spreadOf = (t) => SPREAD[t] != null ? SPREAD[t] : 0.3;
  const fmtOU = (n) => !n ? "at slot" : (n>0 ? "+"+fmtM(n)+" over" : fmtM(-n)+" banked");
  const fmtVsSlot = (n) => n==null ? "" : (!n ? "at slot" : (n>0 ? "+"+fmtM(n)+" over slot" : fmtM(-n)+" under slot"));
  const MEDICAL_FLOOR = 0.75;   // combine-medical consent guarantees >=75% of slot
  let MEDICALS = {};            // normName -> "yes" | "no"  (absent = unknown)
  try { MEDICALS = JSON.parse(localStorage.getItem("dd:medicals") || "{}"); } catch (e) {}
  const medicalOf = (comp) => comp ? (MEDICALS[normName(comp.name)] || "unknown") : "unknown";
  window.setMedical = (key, val) => {
    if (val === "unknown") delete MEDICALS[key]; else MEDICALS[key] = val;
    try { localStorage.setItem("dd:medicals", JSON.stringify(MEDICALS)); } catch (e) {}
    renderActive();
  };

  // Known landing range (your intel) — HARD lock: a player can't be drafted before
  // range.lo and is taken by range.hi, in projections AND mocks.
  let RANGES = {};   // normName -> { lo, hi }  (pick numbers)
  try { RANGES = JSON.parse(localStorage.getItem("dd:ranges") || "{}"); } catch (e) {}
  // Effective hard-range for the engine: local manual range wins; else a captured strike window.
  const rangeOf = (comp) => {
    if (!comp) return null;
    const k = normName(comp.name);
    if (RANGES[k]) return RANGES[k];
    const s = (typeof INTEL !== "undefined" && INTEL.byKey) ? INTEL.byKey.get(k) : null;
    return (s && s.window && (s.window.lo || s.window.hi)) ? { lo: s.window.lo, hi: s.window.hi } : null;
  };
  const roundSpan = (r) => { const ps=(ORDER?.picks||[]).filter(p=>String(p.round)===String(r)); return ps.length?{first:Math.min(...ps.map(p=>p.overall)), last:Math.max(...ps.map(p=>p.overall))}:null; };
  const roundOfPick = (n) => (ORDER?.picks||[]).find(p=>p.overall===n)?.round;
  function saveRanges(key) { try { localStorage.setItem("dd:ranges", JSON.stringify(RANGES)); } catch (e) {}
    renderActive(); }
  window.setRange = (key, lo, hi) => {
    lo = parseInt(lo,10) || null; hi = parseInt(hi,10) || null;
    if (!lo && !hi) delete RANGES[key]; else RANGES[key] = { lo, hi };
    saveRanges(key);
  };
  window.setRangeByRound = (key, rLo, rHi) => { const a=roundSpan(rLo), b=roundSpan(rHi); if(a&&b) window.setRange(key, a.first, b.last); };
  window.clearRange = (key) => { delete RANGES[key]; saveRanges(key); };
  const TEAMINTEL_URL = "https://sv-teamintel.vercel.app/teamintel.json";
  const SUFFIX = /\b(jr|sr|ii|iii|iv|v)\b/g;
  const normName = (s) => (s||"").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"")
      .replace(/[.''`\-]/g," ").replace(SUFFIX,"").replace(/[^a-z\s]/g," ").replace(/\s+/g," ").trim();
  const teamAlias = (t) => (t === "OAK" ? "ATH" : t);
  const isPitcher = (pos) => /(^|\b)(P|RHP|LHP|SP|RP)\b/i.test(pos || "");
  const COLOR_HEX = { green:"#1a7f37","light green":"#86c98b", yellow:"#e3b505", orange:"#e8820e", red:"#C8102E" };

  let DATA = { composite:[], compByName:new Map(), orgs:{}, intel:[], clients:new Set(), clientList:[], leverage:null };
  let boardView = "list";      // "list" | "grid"
  let expandedPick = null;     // overall # whose in-play list is expanded, or null

  // ----- bonus / leverage model: expected bonus = slot-at-rank × leverage multiplier -----
  function levelClass(comp) {
    if (!comp) return "College-JR";
    if (comp.level === "HS") return "HS";
    if (comp.level === "JUCO") return "JUCO";
    const a = parseFloat(comp.age);
    if (comp.level === "College") return (a && a >= 21.5) ? "College-SR" : "College-JR";
    return (a && a <= 18.5) ? "HS" : "College-JR";   // Unk -> age proxy
  }
  function leverageMult(comp) {
    const L = DATA.leverage && DATA.leverage.mult; if (!L) return 1;
    const cell = L[levelClass(comp)];
    if (cell && cell[comp.posGroup] != null) return cell[comp.posGroup];
    if (cell && cell["_"] != null) return cell["_"];
    return L["_"] || 1;
  }
  function effMult(comp) {                             // leverage, ramped in (top picks ~ slot) + elite discount
    const ramp = Math.min(1, Math.max(0, (comp.rank-1)/ENG.RAMP_DIV));
    let m = 1 + (leverageMult(comp)-1)*ramp;
    if (comp.rank <= 10) m *= ENG.TOP_DISCOUNT;
    return m;
  }
  function demandFor(comp) {                           // expected market bonus for the player
    if (!comp) return null;
    return Math.round((slotForRank(comp.rank) || LATE_EXEMPT) * effMult(comp));
  }
  // Personal walk-away floor — the bonus below which a player won't sign anywhere. Default scales
  // with market value; per-athlete signability can override this later via captured intel.
  function signFloor(comp) {
    const market = slotForRank(comp.rank) || LATE_EXEMPT;
    const k = normName(comp.name);
    if (typeof SIGN_FLOORS !== "undefined" && SIGN_FLOORS[k] != null) return SIGN_FLOORS[k];
    return Math.max(50000, market * ENG.FLOOR_MULT);
  }
  // Negotiated bonus = the pick's slot +/-25% band, centered on the player's market value, floored
  // at his personal signability. Produces UNDER-slot deals at high picks (team banks the savings)
  // and OVER-slot faller-grabs deep (funded by banked pool). Calibrated to 2015-24 history.
  function negBonus(comp, pickSlot, overall) {
    const market = slotForRank(comp.rank) || LATE_EXEMPT;
    if (pickSlot <= 0) return Math.round(Math.min(market, 175000));   // rounds 11+ (no pool slot)
    let b = Math.min(pickSlot*(1+ENG.BAND), Math.max(pickSlot*(1-ENG.BAND), market));
    b = Math.max(b, signFloor(comp));
    if (medicalOf(comp) === "yes") b = Math.max(b, MEDICAL_FLOOR*pickSlot);   // combine-medical 75% floor
    return Math.max(50000, Math.round(b));
  }
  let MODE = "live", VIEW = "clients", selected = null;
  const teamLink = (t) => t ? `<span class="tlink" onclick="openTeam('${t}')">${t}</span>` : "";
  const playerLink = (name) => `<span class="tlink" onclick="openPlayer('${normName(name).replace(/'/g,"\\'")}')">${name}</span>`;
  let currentState = null, lastLive = null, ORDER = null;
  let mock = { picks:null, running:false, speed:"fast", nextAt:0, seeding:false };

  async function loadStatic() {
    try {
      const [c, o, lev] = await Promise.all([
        fetch("/data/composite.json").then(r=>r.json()),
        fetch("/data/orgs.json").then(r=>r.json()),
        fetch("/data/leverage.json").then(r=>r.json()).catch(()=>null),
      ]);
      DATA.composite = c; DATA.orgs = o; DATA.leverage = lev;
      c.forEach(p => { p._key = normName(p.name); });   // cache normalized key (hot in sims)
      DATA.compByName = new Map(c.map(p => [p._key, p]));
    } catch (e) {}
    try {
      const ti = await fetch(TEAMINTEL_URL, { cache:"no-store" }).then(r=>r.json());
      DATA.intel = Array.isArray(ti) ? ti : (ti.records || []);
      DATA.clients = new Set(DATA.intel.map(r => normName(r.player)));
      // distinct clients, attach composite entry
      const names = [...new Set(DATA.intel.map(r => r.player))];
      DATA.clientList = names.map(name => ({ name, key:normName(name), comp:DATA.compByName.get(normName(name)) || null }))
        .sort((a,b) => (a.comp?.rank || 9999) - (b.comp?.rank || 9999));
      _tiCache.clear();   // recompute interest aggregates against fresh feed
    } catch (e) {}
  }
  async function loadOrder() {
    if (ORDER) return ORDER;
    const r = await fetch("/data/order.json", { cache:"no-store" });
    if (!r.ok) throw new Error("order " + r.status);
    ORDER = await r.json(); return ORDER;
  }

  const allotment = (round) => { const r = parseInt(round,10)||1; return r<=1?300:r<=4?90:60; };
  let timer = { pick:null, endsAt:null, remainingMs:0 };   // endsAt set only while the clock runs
  function clockRunning() { return MODE==="live" || (MODE==="mock" && mock.running); }
  function setClockForPick(p) {
    const allot = allotment(p.round) * 1000;
    timer = { pick: p.overall, remainingMs: allot, endsAt: clockRunning() ? Date.now()+allot : null };
  }
  function renderCountdown() {
    if (isPreDraft()) {                                   // pre-draft: clock shows time until first pick
      $("cdTime").textContent = fmtCountdown(DRAFT_START - Date.now());
      $("cdTime").classList.remove("low"); $("cdTime").classList.add("days");
      return;
    }
    $("cdTime").classList.remove("days");
    if (!timer.pick) { $("cdTime").textContent = "--:--"; return; }
    const leftMs = timer.endsAt != null ? (timer.endsAt - Date.now()) : timer.remainingMs;  // frozen when paused
    const left = Math.max(0, Math.round(leftMs/1000));
    $("cdTime").textContent = `${Math.floor(left/60)}:${String(left%60).padStart(2,"0")}`;
    $("cdTime").classList.toggle("low", left <= 15);
  }

  // Actual bonus if known (mock engine, or live once signed); otherwise our model
  // estimate. Live drafts have no bonus at pick time -> we project, flagged est.
  function effectiveBonus(p) {
    if (!p.isDrafted) return { bonus:null, est:false };
    if (p.bonus != null) return { bonus:p.bonus, est:false };
    const comp = DATA.compByName.get(normName(p.player||""));
    if (comp) return { bonus: negBonus(comp, p.slot||0, p.overall), est:true };
    return { bonus:null, est:false };
  }
  function ouTag(over, est) {
    const cls = over>50000 ? "over" : over<-50000 ? "under" : "atslot";
    const lab = (est?"EST ":"") + (over>50000?"OVER":over<-50000?"UNDER":"AT SLOT") + (Math.abs(over)>50000?" "+fmtM(Math.abs(over)):"");
    return `<span class="outag ${cls}${est?" est":""}">${lab}</span>`;
  }
  function moneyCell(p) {            // "slot $X · $Y OVER $Z" with the slot kept visible
    const eb = effectiveBonus(p), parts = [];
    if (p.slot > 0) parts.push(`slot ${fmtM(p.slot)}`);
    if (eb.bonus != null) parts.push(fmtM(eb.bonus));
    let s = parts.join(" · ");
    if (eb.bonus != null && p.slot > 0) s += " " + ouTag(eb.bonus - p.slot, eb.est);
    return s;
  }

  function derive(picks, year) {
    const onClockIndex = picks.findIndex(p => !p.isDrafted && !p.isPass);
    const onClock = onClockIndex >= 0 ? picks[onClockIndex] : null;
    const pools = {};
    for (const p of picks) {
      if (!p.team) continue;
      const t = pools[p.team] = pools[p.team] || { team:p.team, teamName:p.teamName,
        pool:0, picksTotal:0, picksMade:0, committedSlot:0, poolBonusPaid:0, poolCharge:0, hasEst:false };
      const isPool = p.slot > 0;                    // rounds 1-10 + CB/comp/PPI (rounds 11+ carry slot 0)
      if (isPool) { t.pool += p.slot; t.picksTotal += 1; }
      if (p.isDrafted) {
        if (isPool) { t.committedSlot += p.slot; t.picksMade += 1; }
        const eb = effectiveBonus(p);
        if (eb.bonus != null) {
          if (eb.est) t.hasEst = true;
          if (isPool) t.poolBonusPaid += eb.bonus;
          t.poolCharge += isPool ? eb.bonus : Math.max(0, eb.bonus - LATE_EXEMPT);
        }
      }
    }
    for (const t of Object.values(pools)) {
      t.remainingSlot = t.pool - t.committedSlot;        // slot $ of pool picks not yet made
      t.ceiling = t.pool * CUSHION;                      // hard spend wall
      t.room = t.ceiling - t.poolCharge;                 // AMMO: $ still spendable within the rules
      t.overUnder = t.poolBonusPaid - t.committedSlot;   // picks over (+) / banked (−) vs slot to date
      t.pctNum = t.pool ? (t.poolCharge - t.pool)/t.pool*100 : 0;
    }
    return { year, picks, onClockIndex, onClock, madeCount:picks.filter(p=>p.isDrafted).length, poolsMap:pools,
             poolsEst: Object.values(pools).some(t=>t.hasEst),
             pools:Object.values(pools).sort((a,b)=>a.team.localeCompare(b.team)) };
  }

  // latest intel record for client+team
  function latestIntel(clientKey, team) {
    return DATA.intel.filter(r => teamAlias(r.team)===team && normName(r.player)===clientKey)
                     .sort((a,b)=>(b.date||"").localeCompare(a.date||""))[0] || null;
  }
  // A pre-draft workout / combine meeting is a cumulative fact: it's true if ANY record in the
  // player's full history with this team flags it. latestIntel only sees the newest record, so it
  // silently drops workouts/combines logged on earlier records — aggregate across all of them.
  function contactFlags(clientKey, team) {
    const recs = DATA.intel.filter(r => teamAlias(r.team)===team && normName(r.player)===clientKey);
    return { workout: recs.some(r => r.workout===true), combine: recs.some(r => r.combine===true) };
  }
  function contactBadges(clientKey, team) {
    const f = contactFlags(clientKey, team);
    return (f.workout?'<span class="pdw" title="pre-draft workout">PDW</span>':"")
         + (f.combine?'<span class="pdw cmb" title="combine meeting">CMB</span>':"");
  }
  // Interest color dot: use the most recent record that actually has a color. Recent note-only
  // records often log color=null, which would otherwise blank out a known signal (latestIntel
  // would return that null-color record even though the player has a logged green/red history).
  function intelColorHex(clientKey, team) {
    const rec = DATA.intel.filter(r => teamAlias(r.team)===team && normName(r.player)===clientKey && r.color)
                          .sort((a,b)=>(b.date||"").localeCompare(a.date||""))[0];
    return COLOR_HEX[(rec?.color||"").toLowerCase()] || "#ccc";
  }
  const _esc = (s) => (s||"").replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
  // The interest color dot, tagged so hovering it shows the latest teamintel message (below).
  function intelDot(clientKey, team) {
    return `<span class="idot" data-intel-key="${clientKey}" data-intel-team="${team}" style="background:${intelColorHex(clientKey, team)}"></span>`;
  }
  // Hover card for an interest dot: latest logged signal + the most recent actual message
  // (Slack note / manual entry), with its date and source — mirrors what's in sv-teamintel.
  function intelMsgHtml(clientKey, team) {
    const recs = DATA.intel.filter(r => teamAlias(r.team)===team && normName(r.player)===clientKey)
                           .sort((a,b)=>(b.date||"").localeCompare(a.date||""));
    if (!recs.length) return `<div class="ot-h">${team}</div><div style="color:#aaa">No intel on file.</div>`;
    const latest = recs[0];
    const colorRec = recs.find(r => r.color);
    const msgRec = recs.find(r => (r.note || r.full_text)) || latest;
    const raw = (msgRec.note || msgRec.full_text || "").trim();
    const msg = raw.length > 400 ? raw.slice(0,400) + "…" : raw;
    const src = msgRec.is_manual ? "manual override" : (msgRec.channel ? "#"+msgRec.channel : "Slack");
    let h = `<div class="ot-h">${team} · latest intel</div>`;
    h += `<div class="ot-row"><span>Date</span><b>${latest.date||"—"}</b></div>`;
    h += `<div class="ot-row"><span>Interest</span><b>${latest.score!=null?(latest.score>0?"+":"")+latest.score:"—"}${colorRec?" · "+colorRec.color:""}</b></div>`;
    h += `<div class="ot-row"><span>Source</span><b>${msgRec.tier_label?msgRec.tier_label+" · ":""}${src}</b></div>`;
    if (msg) h += `<div class="ot-sec">Latest message${msgRec!==latest&&msgRec.date?` · ${msgRec.date}`:""}</div><div style="color:#ddd;white-space:pre-wrap">${_esc(msg)}</div>`;
    return h;
  }
  // Aggregate a team's interest in a client across the FULL intel history — recency- and
  // source-tier-weighted, with a small boost for sustained volume. Returns strength 0..1.
  // (Months of repeated, recent, director-level interest should outweigh one stale score.)
  const _tiCache = new Map();
  function teamInterest(clientKey, team) {
    const ck = clientKey + "|" + team;
    if (_tiCache.has(ck)) return _tiCache.get(ck);
    const recs = DATA.intel.filter(r => teamAlias(r.team)===team && normName(r.player)===clientKey);
    let out;
    if (!recs.length) out = { strength:0, n:0, max:0, latest:null };
    else {
      const now = Date.now();
      let wsum=0, w=0, max=0, latest=null;
      for (const r of recs) {
        const score = (r.score!=null ? r.score : 0);
        if (score>max) max=score;
        if (!latest || (r.date||"")>(latest.date||"")) latest=r;
        const days = r.date ? Math.max(0,(now - Date.parse(r.date))/86400000) : 150;
        const recW = Math.exp(-days/90);                      // ~90-day decay; near-draft intel dominates
        const tierW = Math.sqrt(r.tier_multiplier || 1);      // a scouting director outweighs an area scout
        const wt = recW * tierW;
        wsum += score*wt; w += wt;
      }
      const wavg = w ? wsum/w : 0;
      const vol = Math.min(1.2, 1 + Math.log10(recs.length+1)*0.12);   // sustained-interest boost
      const strength = Math.max(0, Math.min(1, ((wavg*0.6 + max*0.4)/6) * vol));
      out = { strength, n:recs.length, max, latest };
    }
    _tiCache.set(ck, out);
    return out;
  }
  function teamNextPick(state, team) { return state.picks.find(p => p.team===team && !p.isDrafted) || null; }

  // landing-spot fit FOR the client: interest 45 / dev 20 / type 15 / money 20, where
  // interest is the full-history aggregate (teamInterest). Interest-dominant by design.
  function fit(comp, team, clientKey, state) {
    const o = DATA.orgs[team] || {};
    const interestN = clientKey ? teamInterest(clientKey, team).strength : 0;
    const devN = o.orgRank != null ? Math.max(0, (31 - o.orgRank)/30) : 0.5;
    let typeN = 0.5;
    if (comp) {
      const lean = (o.earlyPitcherPct!=null?o.earlyPitcherPct:50)/100;
      const posN = isPitcher(comp.pos) ? lean : (1-lean);
      let lvlN = 0.5;
      if (comp.level==="HS" && o.hsPct!=null) lvlN = o.hsPct/100;
      else if (comp.level==="College" && o.collegePct!=null) lvlN = o.collegePct/100;
      typeN = (posN + lvlN)/2;
    }
    const pool = state.poolsMap[team];
    const moneyN = pool && pool.ceiling ? Math.max(0, Math.min(1, pool.room/pool.ceiling)) : 0.5;
    const gradeOf = (s)=> s>=85?"A+":s>=75?"A":s>=66?"B+":s>=56?"B":s>=46?"C":"D";
    const colorOf = (s)=> s>=75?"#1a7f37":s>=56?"#3949ab":s>=46?"#e8820e":"#9aa0a6";
    const score = Math.round(100*(0.45*interestN + 0.20*devN + 0.15*typeN + 0.20*moneyN));
    // org fit = interest/dev/type only (money excluded), renormalized — lets a strong intel/org
    // fit surface at a slot even when the team's money doesn't work.
    const orgScore = Math.round(100*(0.45*interestN + 0.20*devN + 0.15*typeN)/0.80);
    return { score, grade:gradeOf(score), color:colorOf(score),
             orgScore, orgGrade:gradeOf(orgScore), color2:colorOf(orgScore),
             interestN, devN, typeN, moneyN };
  }

  // ---------- VIEW: OUR CLIENTS ----------
  function renderClients(state) {
    const drafted = new Map(); // key -> pick
    state.picks.forEach(p => { if (p.isDrafted && p.player) drafted.set(normName(p.player), p); });
    const dCount = DATA.clientList.filter(c => drafted.has(c.key)).length;
    const secured = DATA.clientList.reduce((s,c)=>{ const pk = drafted.get(c.key); return s + (pk?.slot || 0); }, 0);
    $("clientSummary").innerHTML = [
      ["Clients tracked", DATA.clientList.length],
      ["Drafted", dCount],
      ["Still on board", DATA.clientList.length - dCount],
      ["Slot $ secured", fmtM(secured)],
    ].map(([k,v]) => `<div><div class="k">${k}</div><div class="v">${v}</div></div>`).join("");

    if (!DATA.clientList.length) { $("clientCards").innerHTML = `<div class="placeholder">No client data — is sv-teamintel reachable?</div>`; return; }

    $("clientCards").innerHTML = DATA.clientList.map(c => {
      const comp = c.comp, pk = drafted.get(c.key);
      const rkTxt = comp ? `#${comp.rank}` : "NR";
      const plTxt = comp ? `${comp.pos} · ${comp.level}` : "";
      let status, body = "";
      if (pk) {
        const f = fit(comp, pk.team, c.key, state);
        status = `<span class="status dr">DRAFTED #${pk.overall} · ${pk.team} · ${moneyCell(pk)}
                  <span class="grade" data-org="${pk.team}" style="background:${f.color}">${f.grade}</span></span>`;
      } else if (!comp) {
        // Unranked — no landing projection; show logged interest compactly (intel dot + fit grade)
        const teams = [...new Set(DATA.intel.filter(r=>normName(r.player)===c.key).map(r=>teamAlias(r.team)))]
          .map(t => ({ t, rec:latestIntel(c.key,t), f:fit(comp,t,c.key,state) }))
          .sort((a,b)=> b.f.score - a.f.score).slice(0,4);
        status = `<span class="status av">On the board · unranked</span>`;
        body = teams.map(x => `<div class="ct"><span class="ov"></span>
            <span class="tm">${x.t}</span>
            ${intelDot(c.key, x.t)}
            <span class="grade" data-org="${x.t}" style="background:${x.f.color}">${x.f.grade}</span>
            ${contactBadges(c.key, x.t)}</div>`).join("")
          || `<div class="ct" style="color:#9aa0a6">No logged team interest yet.</div>`;
      } else {
        // Ranked & on the board — deterministic draft card: each interested team's next pick +
        // slot money, paired intel-dot / fit-grade. No simulations.
        const dem = demandFor(comp);
        status = `<span class="status av">On the board${dem!=null?` · est. value ~${fmt$(dem)} (${levelClass(comp).replace("College-","Col ")} ${comp.posGroup})`:""}</span>`;
        // Interested teams (logged score>0) and the next pick each one currently holds — all deterministic
        const teams = [...new Set(DATA.intel.filter(r=>normName(r.player)===c.key).map(r=>teamAlias(r.team)))]
          .map(t => ({ t, rec:latestIntel(c.key,t), f:fit(comp,t,c.key,state), nx:teamNextPick(state,t) }))
          .filter(x => (x.rec?.score||0) > 0);
        // Teams with an upcoming pick first; then by fit
        teams.sort((a,b) => (!!a.nx !== !!b.nx) ? (a.nx ? -1 : 1) : (b.f.score - a.f.score));
        const top = teams.slice(0,5);
        const head = `<div class="proj-head">Upcoming picks with interest</div>`;
        const rows = top.length
          ? top.map(x => {
              const ou = x.nx ? negBonus(comp,x.nx.slot,x.nx.overall)-x.nx.slot : null;
              const money = x.nx ? `${fmtM(x.nx.slot)}${ou!=null?` · ${fmtVsSlot(ou)}`:""}` : "no picks left";
              return `<div class="ct">
                <span class="ov">${x.nx?`#${x.nx.overall}`:"—"}</span>
                <span class="tm">${x.t}</span>
                ${intelDot(c.key, x.t)}
                <span class="grade" data-org="${x.t}" style="background:${x.f.color}">${x.f.grade}</span>
                ${contactBadges(c.key, x.t)}
                <span class="nx">${money}</span></div>`;
            }).join("")
          : `<div class="ct" style="color:#9aa0a6">No logged team interest yet.</div>`;
        body = head + rows;
      }
      return `<div class="cc clickable ${pk?"drafted":""}" onclick="openPlayer('${c.key.replace(/'/g,"\\'")}')">
        <div class="top"><span class="rk">${rkTxt}</span><span class="nm">${c.name}</span><span class="pl">${plTxt} ›</span></div>
        ${status}${body}</div>`;
    }).join("");
  }
  // rough slot for a board rank: use the order's slot at that overall pick (approx draft stock -> $)
  function slotForRank(rank) {
    if (!ORDER || !ORDER.picks) return null;
    const pk = ORDER.picks.find(p => p.overall === rank);
    return pk ? pk.slot : null;
  }

        ${comp?`<span class="rkbadge">composite #${comp.rank}</span>`:""}
        <span class="meta">${p.team||""}${p.school?" · "+p.school:""} · ${moneyCell(p)}</span></div>`;

  // ---------- VIEW: BOARD (running log + card grid) ----------
  const roundLabel = (r) => /^\d+$/.test(String(r)) ? `Round ${r}` : String(r); // "1"->Round 1, "CB-A"->CB-A
