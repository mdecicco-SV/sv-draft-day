<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>SV Draft Day</title>
<link rel="icon" href="/favicon.svg" />
<link rel="manifest" href="/manifest.webmanifest" crossorigin="use-credentials" />
<meta name="theme-color" content="#ffffff" />
<link rel="apple-touch-icon" href="/icons/icon-180.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<style>
  @font-face { font-family:'Satoshi'; src:url('/fonts/Satoshi-Regular.otf') format('opentype'); font-weight:400; font-display:swap; }
  @font-face { font-family:'Satoshi'; src:url('/fonts/Satoshi-Medium.otf') format('opentype'); font-weight:500; font-display:swap; }
  @font-face { font-family:'Satoshi'; src:url('/fonts/Satoshi-Bold.otf') format('opentype'); font-weight:700; font-display:swap; }
  @font-face { font-family:'Satoshi'; src:url('/fonts/Satoshi-Black.otf') format('opentype'); font-weight:900; font-display:swap; }
  :root { --red:#ff2a22; --red-deep:#d81e17; --ink:#141414; --muted:#6b6b6b; --line:#e3e3e3; --bg:#f4f3f1; --card:#ffffff; --good:#1a7f37;
    /* type scale — use these instead of literal px for table/label sizing */
    --fs-00:9px; --fs-0:10px; --fs-1:11px; --fs-1h:11.5px; --fs-2:12px; --fs-3:13px; --fs-4:14px; --fs-5:15px; }
  * { box-sizing: border-box; }
  body { margin:0; font:15px/1.45 'Satoshi',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; color:var(--ink); background:var(--bg); -webkit-font-smoothing:antialiased; }
  header { display:flex; align-items:center; gap:12px; padding:10px 16px; background:#fff; border-bottom:3px solid var(--red); position:sticky; top:0; z-index:6; }
  header .logo { height:26px; width:auto; display:block; }
  header .title { font-weight:900; letter-spacing:.2px; font-size:17px; }
  header .badge { margin-left:auto; font-size:12px; font-weight:700; color:var(--red); border:1px solid var(--red); border-radius:999px; padding:3px 10px; }
  /* on-the-clock header chip — the always-visible pick clock (was the big countdown on the old On The Clock view) */
  .hdr-clock { margin-left:auto; display:flex; align-items:center; gap:7px; background:#fafafa; border:1px solid var(--line); border-radius:999px; padding:3px 11px; font-size:13px; }
  .hdr-clock + .badge { margin-left:0; }
  .hdr-clock .hc-tm { font-weight:800; }
  .hdr-clock .hc-lab { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; }
  .hdr-clock .hc-cd { font-weight:900; font-variant-numeric:tabular-nums; }
  .hdr-clock .hc-cd.low { color:var(--red); }
  .dot { width:9px; height:9px; border-radius:50%; background:#bbb; display:inline-block; }
  .dot.live { background:var(--good); } .dot.err { background:var(--red); }
  .seg { display:inline-flex; border:1px solid var(--line); border-radius:8px; overflow:hidden; }
  .seg button { border:0; background:#fff; padding:6px 12px; font:inherit; font-weight:700; cursor:pointer; color:var(--muted); }
  .seg button.on { background:var(--red); color:#fff; }
  .ico { width:15px; height:15px; vertical-align:-3px; }   /* inline SVG chrome glyphs (gear, bell) — stroke follows currentColor */

  .tabs { display:flex; gap:4px; padding:8px 16px 0; background:#fff; border-bottom:1px solid var(--line); position:sticky; top:49px; z-index:5; }
  .tabs button { border:0; border-bottom:3px solid transparent; background:none; padding:8px 14px; font:inherit; font-weight:700; color:var(--muted); cursor:pointer; }
  .tabs button.on { color:var(--ink); border-bottom-color:var(--red); }

  .bar { display:flex; align-items:center; gap:8px; flex-wrap:wrap; padding:8px 16px; background:#fff7f8; border-bottom:1px solid var(--line); position:sticky; top:90px; z-index:5; }
  .bar.hidden { display:none; }
  .prebanner { display:flex; flex-direction:column; align-items:center; gap:3px; padding:8px 16px; background:#fff; border-bottom:1px solid var(--line); font-size:13px; font-weight:700; color:var(--ink); position:sticky; top:90px; z-index:4; }
  .prebanner b { color:var(--red); font-variant-numeric:tabular-nums; }
  .prebanner .pb-main { display:flex; align-items:center; gap:7px; white-space:nowrap; }
  body.mob .prebanner { padding:8px 10px; }
  /* how-to-watch: compact pill -> dropdown card with per-window broadcast + stream links */
  .pb-watch { position:relative; display:inline-block; }
  .pb-watchbtn { font:inherit; font-size:11px; font-weight:800; color:var(--muted); background:#fff; border:1px solid var(--line); border-radius:999px; padding:3px 12px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .pb-watchbtn:hover, .pb-watch.open .pb-watchbtn { color:var(--ink); border-color:#ccc; }
  .watch-card { display:none; position:absolute; top:calc(100% + 6px); left:50%; transform:translateX(-50%); width:min(360px, calc(100vw - 24px)); background:#fff; border:1px solid var(--line); border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,.14); padding:10px 14px 12px; z-index:40; text-align:left; }
  .pb-watch.open .watch-card { display:block; }
  .watch-card h5 { margin:4px 0 3px; font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:.5px; color:var(--red); }
  .watch-card h5 span { color:var(--muted); font-weight:600; text-transform:none; letter-spacing:0; }
  .watch-row { display:flex; align-items:baseline; gap:8px; padding:3px 0; font-size:12px; }
  .watch-row .wt { font-weight:800; font-variant-numeric:tabular-nums; white-space:nowrap; min-width:62px; }
  .watch-row .wp { color:var(--muted); font-weight:600; flex:1; }
  .watch-row a { color:var(--red); font-weight:800; text-decoration:none; white-space:nowrap; }
  .watch-row a:hover { text-decoration:underline; }
  /* during the draft the banner slot becomes the primary on-the-clock display */
  .prebanner.liveoc { flex-direction:row; justify-content:center; align-items:center; gap:14px; padding:9px 16px; cursor:pointer; }
  .prebanner.liveoc .oc-lab { font-size:11px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; color:var(--red); display:flex; align-items:center; gap:7px; }
  .prebanner.liveoc .oc-team { font-size:18px; font-weight:900; display:flex; align-items:center; gap:7px; line-height:1; }
  .prebanner.liveoc .oc-cd { font-size:22px; font-weight:900; font-variant-numeric:tabular-nums; line-height:1; }
  .prebanner.liveoc .oc-cd.low { color:var(--red); }
  .prebanner.liveoc .oc-meta { font-size:12px; font-weight:700; color:var(--muted); }
  body.mob .prebanner.liveoc { gap:9px; padding:7px 10px; flex-wrap:wrap; }
  body.mob .prebanner.liveoc .oc-meta { flex-basis:100%; text-align:center; margin-top:-2px; }
  .pulse { width:8px; height:8px; border-radius:50%; background:var(--red); box-shadow:0 0 0 0 rgba(255,42,34,.5); animation:pulse 1.6s infinite; }
  @keyframes pulse { 70% { box-shadow:0 0 0 7px rgba(255,42,34,0); } 100% { box-shadow:0 0 0 0 rgba(255,42,34,0); } }
  /* X leading-intel: amber lead chip ON the target pick tile (no banner) — same amber
     family as the reported ladder, flashing until the pick card is opened once */
  .bcard.lead { border-color:#e3b505; background:#fffdf4; }
  .bc-lead { display:inline-block; max-width:100%; overflow:hidden; text-overflow:ellipsis; font-size:10.5px; font-weight:800; letter-spacing:.3px;
    color:#8a6d00; background:#fff3cd; border:1px solid #e3b505; border-radius:5px; padding:1px 6px; white-space:nowrap; }
  .bc-lead.flash { animation:leadpulse 1.5s ease-in-out infinite; }
  @keyframes leadpulse { 0%,100% { box-shadow:0 0 0 0 rgba(227,181,5,.5); } 50% { box-shadow:0 0 0 5px rgba(227,181,5,0); } }
  /* X fast lane: header paste button + watcher heartbeat dot */
  .paste-wrap { position:relative; }
  .xhb { width:7px; height:7px; border-radius:50%; background:#c9c9c9; display:inline-block; margin-left:5px; vertical-align:1px; }
  .xhb.live { background:#1a7f37; box-shadow:0 0 0 2px rgba(26,127,55,.18); }
  .paste-panel { display:none; position:absolute; top:calc(100% + 8px); right:0; z-index:120; background:#fff; border:1px solid var(--line);
    border-radius:10px; box-shadow:0 10px 30px rgba(0,0,0,.16); padding:10px; width:340px; }
  .paste-panel.on { display:block; }
  .paste-panel textarea { width:100%; padding:8px 10px; border:1px solid var(--line); border-radius:7px; font:inherit; font-size:13px; resize:vertical; }
  .paste-row { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-top:7px; }
  body.mob .paste-panel { position:fixed; left:10px; right:10px; top:52px; width:auto; }
  .ctl { border:1px solid var(--line); background:#fff; border-radius:8px; padding:6px 11px; font:inherit; font-weight:700; cursor:pointer; }
  .ctl.primary { background:var(--red); color:#fff; border-color:var(--red); }
  .bar select { font:inherit; padding:6px 8px; border:1px solid var(--line); border-radius:8px; }
  .bar .note { color:var(--muted); font-size:12px; margin-left:auto; }

  main { max-width:1080px; margin:0 auto; padding:16px; }
  main.wide { max-width:none; padding:16px 32px; }
  .view { display:none; } .view.on { display:block; }

  /* shared */
  h2 { font-size:13px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); margin:22px 0 8px; }
  .placeholder { color:var(--muted); font-size:13px; border:1px dashed var(--line); border-radius:10px; padding:12px; background:#fff; }
  .idot { width:12px; height:12px; border-radius:50%; border:1px solid rgba(0,0,0,.15); display:inline-block; }
  .idot.nr { background:transparent; border:1.5px dashed rgba(0,0,0,.35); }  /* unranked client — hollow ring in his intel color */
  .idot[data-intel-key] { cursor:help; }
  .pdw { font-size:10px; font-weight:800; color:var(--red); border:1px solid var(--red); border-radius:4px; padding:1px 5px; }
  .pdw.cmb { color:#3949ab; border-color:#3949ab; margin-left:4px; }
  td.sr-col, th.sr-col { text-align:center; font-variant-numeric:tabular-nums; }
  td.sr-col { font-weight:700; color:#374151; }
  /* per-publication ranks: collapsed into one hover chip (full detail also on the player page) */
  .rks-chip { display:inline-block; font-size:11px; font-weight:800; color:#6b7280; background:#f3f4f6; border:1px solid var(--line); border-radius:999px; padding:2px 9px; white-space:nowrap; }
  table.ba tr.clickrow:hover .rks-chip { border-color:var(--red); color:var(--red); background:#fff; }
  #rksTip { position:fixed; z-index:300; display:none; background:#fff; border:1px solid var(--line); border-radius:10px; box-shadow:0 10px 26px rgba(0,0,0,.14); padding:9px 12px; min-width:180px; pointer-events:none; }
  #rksTip .rt-hd { font-size:10px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; margin-bottom:5px; white-space:nowrap; }
  #rksTip .rt-row { display:flex; justify-content:space-between; gap:18px; font-size:13px; padding:1.5px 0; }
  #rksTip .rt-src { font-weight:700; color:#374151; }
  #rksTip .rt-asof { font-weight:600; color:#9aa0a6; font-size:10.5px; }
  #rksTip .rt-rk { font-weight:800; font-variant-numeric:tabular-nums; }
  /* draft-history player card: any 2018–25 tracker name click-expands to his full research line */
  .histlink { cursor:pointer; }
  .histlink:hover { color:var(--red); text-decoration:underline; }
  #histWrap { position:fixed; inset:0; z-index:500; display:none; background:rgba(15,18,24,.35); }
  #histWrap.on { display:flex; align-items:center; justify-content:center; padding:18px; }
  .hc { background:#fff; border:1px solid var(--line); border-radius:14px; box-shadow:0 18px 48px rgba(0,0,0,.25);
    width:min(430px,100%); max-height:90vh; overflow-y:auto; padding:15px 18px 16px; }
  .hc-head { display:flex; align-items:center; gap:8px; font-size:17px; font-weight:900; }
  .hc-head .x { margin-left:auto; border:0; background:none; font-size:15px; cursor:pointer; color:var(--muted); }
  .hc-sub { color:var(--muted); font-size:12.5px; font-weight:700; margin:3px 0 10px; }
  .hc-grid { display:grid; grid-template-columns:1fr 1fr; gap:0 18px; }
  .hc-kv { display:flex; justify-content:space-between; align-items:baseline; gap:8px; font-size:13px; padding:4px 0; border-bottom:1px dashed var(--line); }
  .hc-kv .k { color:var(--muted); font-weight:700; font-size:10.5px; text-transform:uppercase; letter-spacing:.3px; white-space:nowrap; }
  .hc-kv .v { font-weight:800; font-variant-numeric:tabular-nums; text-align:right; }
  .hc-links { display:flex; gap:8px; margin-top:13px; flex-wrap:wrap; }
  .hc-links a { border:1px solid var(--line); border-radius:8px; padding:5px 10px; font-size:12px; font-weight:800; color:var(--ink); text-decoration:none; }
  .hc-links a:hover { border-color:var(--red); color:var(--red); }
  /* player-page source-ranks strip (the always-visible home for the per-publication ranks) */
  .pp-ranks { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:10px; padding-top:9px; border-top:1px solid var(--line); }
  .pp-rk-t { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.4px; color:var(--muted); margin-right:2px; }
  .pp-rk { display:inline-flex; align-items:baseline; gap:6px; background:#fafafa; border:1px solid var(--line); border-radius:8px; padding:3px 9px; font-size:13px; }
  .pp-rk .s { font-size:10px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.3px; }
  .pp-rk .a { font-weight:600; color:#b6bbc2; }
  .pp-rk .r { font-weight:800; font-variant-numeric:tabular-nums; }
  .trend { display:inline-flex; align-items:center; gap:5px; font-variant-numeric:tabular-nums; }
  .trend .spark path { fill:none; stroke:currentColor; stroke-width:1.5; }
  .trend .spark circle { fill:currentColor; }
  .trend.up { color:var(--good); } .trend.down { color:var(--red); } .trend.flat { color:#9aa0a6; }
  .trend .delta { font-size:11px; font-weight:800; }
  .trend .new { font-size:9px; font-weight:800; letter-spacing:.08em; color:#9aa0a6; }
  .ct .nx .mlab { font-size:10px; text-transform:uppercase; letter-spacing:.3px; opacity:.6; font-weight:800; }
  .bcard.bc-dim { opacity:.38; }
  .bcard .bc-lens { display:flex; align-items:center; gap:4px; margin-top:5px; flex-wrap:wrap; }
  .brow .idot { margin:0 2px; }
  /* ESPN-style pick ticker — bottom, slides up on each new pick (live + mock), any page */
  /* reported-ladder picks — amber until the feed confirms; soft (single-source) = dashed */
  .bcard.rep { border-color:#e3b505; background:#fffdf4; }
  .bcard.rep.soft { border-style:dashed; background:#fffefa; }
  .bc-rep { display:inline-block; font-size:9px; font-weight:800; letter-spacing:.4px; color:#8a6d00;
    background:#fff3cd; border:1px solid #e3b505; border-radius:4px; padding:0 4px; vertical-align:1px; }
  .bc-rep.soft { background:none; border-style:dashed; }
  .tc-reprow { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin:0 14px; padding:8px 12px;
    background:#fff7e0; border:1px dashed #e3b505; border-radius:8px; font-size:13px; }
  .tc-reprow b { font-weight:800; }
  .tc-rep-btn { border:1px solid #e3b505; background:#fff7e0; color:#8a6d00; font-weight:800; font-size:12px;
    border-radius:7px; padding:4px 10px; cursor:pointer; white-space:nowrap; }
  .tc-rep-btn.on, .tc-rep-btn:hover { background:#ffedb8; }
  .tc-rep-wrap { position:relative; }
  .tc-rep-menu { position:absolute; top:calc(100% + 6px); right:0; z-index:60; background:#fff; border:1px solid var(--line);
    border-radius:10px; box-shadow:0 8px 24px rgba(0,0,0,.14); padding:8px; width:440px; }
  .tc-rep-menu input { width:100%; padding:8px 10px; border:1px solid var(--line); border-radius:7px; font-size:14px; }
  .tc-rep-opts { max-height:260px; overflow-y:auto; margin-top:6px; }
  .tc-rep-opts button { display:flex; justify-content:space-between; align-items:baseline; gap:12px; width:100%; text-align:left; border:0;
    background:none; padding:7px 8px; border-radius:7px; font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap; }
  .tc-rep-opts button:hover { background:#fff7e0; }
  .tc-rep-opts button span { color:var(--muted); font-weight:600; font-size:12px; flex:0 0 auto; }
  .tc-rep-live { color:#8a6d00; background:#fff3cd; border:1px solid #e3b505; border-radius:6px;
    font-size:12px; font-weight:800; padding:2px 8px; white-space:nowrap; }
  /* client near-miss net: a drafted feed name that doesn't key to a client but looks like one */
  #nearMiss { display:none; }
  #nearMiss .nm-row { background:#fff7e0; border:1px solid #e3b505; border-radius:8px; padding:8px 12px;
    margin:8px 12px 0; font-size:13px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  #nearMiss .nm-row b { font-weight:800; }
  #ticker { position:fixed; left:0; right:0; bottom:0; z-index:80; transform:translateY(115%); transition:transform .38s cubic-bezier(.2,.7,.3,1); pointer-events:none; }
  #ticker.show { transform:translateY(0); }
  #ticker .tk-inner { margin:0 auto; max-width:920px; display:flex; align-items:center; gap:13px; background:#141414; color:#fff; border-top:3px solid var(--red); border-radius:12px 12px 0 0; padding:12px 20px; box-shadow:0 -8px 26px rgba(0,0,0,.28); font-size:16px; pointer-events:auto; touch-action:none; cursor:grab; }
  #ticker .tk-inner.sv { border-top-color:#1a7f37; }
  #ticker .tk-badge { background:var(--red); color:#fff; font-weight:900; font-size:12px; letter-spacing:.5px; padding:4px 9px; border-radius:6px; font-variant-numeric:tabular-nums; }
  #ticker .tk-inner.sv .tk-badge { background:#1a7f37; }
  #ticker .tk-team { font-weight:900; font-size:20px; }
  #ticker .tk-sel { color:#9aa0a6; font-size:12px; text-transform:uppercase; letter-spacing:.6px; }
  #ticker .tk-player { font-weight:800; }
  #ticker .tk-meta { color:#aaa; font-size:13px; }
  #ticker .tk-agency { color:#e8c46a; font-size:12px; font-weight:800; letter-spacing:.3px; }
  #ticker .tk-sv { margin-left:auto; background:#1a7f37; color:#fff; font-weight:900; font-size:11px; letter-spacing:.5px; padding:3px 8px; border-radius:5px; }
  /* zap: after the hold the banner flies (a fixed clone) into the pick's board tile, which pulses on landing */
  #tickerZap { position:fixed; z-index:81; pointer-events:none; will-change:transform,opacity; }
  .bcard.bc-land { animation:bcLand .7s ease-out; }
  .bcard.sv.bc-land { animation-name:bcLandSv; }
  @keyframes bcLand   { 0% { box-shadow:0 0 0 3px rgba(255,42,34,.7);  transform:scale(1.06); }
                      100% { box-shadow:0 0 0 0 rgba(255,42,34,0);     transform:scale(1); } }
  @keyframes bcLandSv { 0% { box-shadow:0 0 0 3px rgba(26,127,55,.7);  transform:scale(1.06); }
                      100% { box-shadow:0 0 0 0 rgba(26,127,55,0);     transform:scale(1); } }
  .tm[data-org] { cursor:help; }
  #orgTip { position:fixed; z-index:60; max-width:270px; background:#141414; color:#fff; border-radius:10px;
            padding:11px 13px; font-size:12px; line-height:1.5; box-shadow:0 8px 24px rgba(0,0,0,.28); pointer-events:none; display:none; }
  #orgTip .ot-h { font-weight:900; font-size:13px; margin-bottom:5px; }
  #orgTip .ot-sec { color:#ff6a63; font-weight:800; font-size:10px; text-transform:uppercase; letter-spacing:.4px; margin-top:7px; margin-bottom:1px; }
  #orgTip .ot-row { display:flex; justify-content:space-between; gap:16px; }
  #orgTip .ot-row span { color:#aaa; } #orgTip .ot-row b { font-variant-numeric:tabular-nums; }

  /* clients view */
  /* clients summary: same stat-band language as the player/team cards — evenly
     distributed tiles with hairline dividers, not a loose left-bunched row */
  .summary { display:flex; flex-wrap:wrap; gap:2px 0; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 18px; margin-bottom:14px; }
  .summary > div { flex:1 1 150px; min-width:130px; padding:2px 16px; border-left:1px solid var(--line); }
  .summary > div:first-child { border-left:none; padding-left:0; }
  .summary .k { font-size:10px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; }
  .summary .v { font-size:22px; font-weight:900; font-variant-numeric:tabular-nums; margin-top:2px; }
  .summary .sub { font-size:10px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.3px; }
  .cc { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px 16px; }
  /* our-clients roster list */
  table.cl-table td { vertical-align:middle; }
  .cl-nm { font-weight:800; }
  .cl-intw { display:flex; flex-wrap:wrap; gap:4px; align-items:center; }
  .cl-int { display:inline-flex; align-items:center; gap:4px; font-weight:800; font-size:11px;
    border:1px solid var(--line); border-radius:999px; padding:2px 7px; background:var(--card); white-space:nowrap; }
  .cl-int .idot { width:9px; height:9px; flex-shrink:0; }
  .cl-more { font-size:10px; color:var(--muted); font-weight:800; }
  .cl-int .cl-pk { color:var(--red); font-weight:800; font-size:10px; font-variant-numeric:tabular-nums; min-width:24px; text-align:right; }
  .cl-int .cl-pk.na { color:#c2c7cd; }
  .cl-none { color:#c2c7cd; }
  .cl-rng { color:var(--muted); font-weight:700; font-size:11px; font-variant-numeric:tabular-nums; white-space:nowrap; }
  .cl-rngedit { display:inline-flex; align-items:center; gap:3px; font-size:11px; font-weight:700; color:var(--muted); white-space:nowrap; }
  .cl-rngedit input { width:46px; padding:3px 4px; border:1px solid var(--line); border-radius:5px; font:inherit; font-size:11px; }
  .cl-rngedit .ctl { padding:3px 7px; font-size:10px; }
  /* player page — in-page version of the team-card look (stat band, numbered quadrants, foot) */
  .pp-stats { margin-top:12px; border-top:1px solid var(--line); padding-top:10px; }
  .pp-stats .tc-stat:first-child { border-left:none; padding-left:0; }
  .pp-cols { display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:14px; padding:14px 0; align-items:start; }
  .pp-col { display:flex; flex-direction:column; gap:14px; min-width:0; }
  .pp-col .tc-panel { background:var(--card); overflow-y:visible; }
  .pp-bonusform { border-top:1px solid var(--line); margin-top:8px; padding-top:10px; }
  .tc-foot.pp-foot { border:1px solid var(--line); border-radius:12px; margin-top:14px; }
  @media (max-width:820px){ .pp-cols { grid-template-columns:1fr; } }
  .cl-av { color:var(--muted); font-weight:700; font-size:12px; }
  .cl-dr { color:var(--good); font-weight:800; font-size:12px; white-space:nowrap; }
  .cl-money { font-weight:700; font-variant-numeric:tabular-nums; white-space:nowrap; }
  table.ba tr.cl-done { background:#f7fdf9; }
  .cc.drafted { opacity:.92; border-color:#cfe8d6; }
  .cc .top { display:flex; align-items:baseline; gap:8px; }
  .cc .rk { font-weight:900; color:var(--red); }
  .cc .nm { font-weight:800; font-size:17px; }
  .cc .pl { color:var(--muted); font-size:13px; margin-left:auto; }
  .cc .status { margin:6px 0 10px; font-size:13px; font-weight:700; }
  .cc .status.av { color:var(--muted); } .cc .status.dr { color:var(--good); }
  .ct { display:flex; align-items:center; gap:8px; padding:5px 0; border-top:1px solid var(--line); font-size:13px; }
  .int-grp { display:flex; align-items:center; gap:6px; padding:10px 0 3px; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.4px; color:#6b7280; }

  .ct .ov { min-width:34px; color:var(--red); font-weight:800; font-variant-numeric:tabular-nums; }

  /* stat tiles + panels (team/player detail pages) */
  .pool-row { display:flex; gap:10px; flex-wrap:wrap; margin-top:16px; }

  .td-upwrap { max-height:420px; overflow-y:auto; }                       /* all remaining picks — scroll, don't truncate */
  .td-win { font-size:10px; font-weight:700; color:var(--muted); margin-left:6px; }  /* data-window label on tendency rows */
  .panel { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px 16px; }
  .panel h3 { margin:0 0 10px; font-size:12px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); }
  .chips { display:flex; flex-wrap:wrap; gap:6px; }

  .r1 { margin-top:10px; font-size:13px; color:var(--muted); } .r1 div { padding:2px 0; }

  /* best available */

  .ba-filters label { font-size:12px; font-weight:700; color:var(--muted); display:inline-flex; align-items:center; gap:5px; }
  .ba-filters .count { margin-left:auto; color:var(--muted); font-size:13px; font-weight:700; }

  /* dropdown-chip filters (Level / Position / Age / Bats / Throws) — uniform pills */

  .ba-drop { position:relative; }
  .ba-chips .tc-chip { display:inline-flex; align-items:center; gap:5px; height:30px; padding:0 12px;
    font-size:12px; border-radius:15px; color:var(--ink); }
  .ba-chips .tc-chip .cx { opacity:.5; font-size:9px; }
  .ba-chips .tc-chip.on .cx { opacity:.85; }
  /* menu anchors directly under its chip (override .res-posmenu's label-offset defaults) */

    max-width:min(340px, calc(100vw - 24px)); }

  /* sortable column headers on Best Available */
  table.ba th.basort { cursor:pointer; white-space:nowrap; }
  table.ba th.basort:hover { color:var(--ink); }
  table.ba th.basort .sarr { color:var(--red); font-size:9px; margin-left:2px; }
  /* border-collapse:separate + no overflow:hidden — both break position:sticky on the thead */
  table.ba { width:100%; border-collapse:separate; border-spacing:0; background:#fff; border:1px solid var(--line); border-radius:10px; }
  table.ba th { text-align:left; font-size:var(--fs-1); text-transform:uppercase; letter-spacing:.4px; color:var(--muted); padding:8px 10px; border-bottom:1px solid var(--line); background:#fafafa;
    position:sticky; top:var(--theadTop, 128px); z-index:2; }

  table.ba .rk { font-weight:800; color:var(--red); }
  .lvl { font-size:11px; font-weight:700; border-radius:4px; padding:1px 6px; }

  .lvl.JUCO { background:#fff3e0; color:#e65100; } .lvl.Unk { background:#f1f3f5; color:#6b7280; }
  .svtag { font-size:10px; font-weight:800; color:#fff; background:var(--red); border-radius:4px; padding:1px 5px; }

  .outag.under { background:#fff3e0; color:#e65100; }
  .outag.atslot { background:#f1f3f5; color:#6b7280; }
  .outag.est { opacity:.85; border:1px dashed currentColor; padding:0 4px; }
  table.ba th.sortable { cursor:pointer; user-select:none; white-space:nowrap; }

  .cc.clickable { cursor:pointer; } .cc.clickable:hover { border-color:var(--red); }

  /* board */
  .board { display:flex; flex-direction:column; gap:3px; }

  .brow .ov { font-weight:800; min-width:42px; color:var(--red); font-variant-numeric:tabular-nums; }

  }

  /* ── Scenario Engine: probability bars ── */
  .proj-head { display:flex; align-items:baseline; gap:6px; font-size:12px; font-weight:700; margin:8px 0 6px; }
  .proj-head b { color:var(--red); }
  .proj-head .sims { margin-left:auto; color:var(--muted); font-weight:600; font-size:11px; }
  .proj-wait { font-size:11px; color:var(--muted); margin-top:8px; }
  .proj-bar { position:relative; height:6px; background:#f0f1f3; border-radius:3px; margin-bottom:8px; }
  .proj-bar .pb-fill { position:absolute; height:100%; background:#e8ddf9; border-radius:3px; }
  .proj-bar .pb-med { position:absolute; width:10px; height:10px; top:-2px; background:var(--red); border-radius:50%; transform:translateX(-50%); box-shadow:0 0 0 2px #fff; }

  /* ── Pick probability section on Clock ── */
  .prob-section { margin-top:12px; }
  .prob-section .ph3 { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin:0 0 6px; }
  .prob-row { display:flex; align-items:center; gap:8px; padding:3px 0; font-size:13px; }
  .prob-mini { flex:1; height:5px; background:#f0f1f3; border-radius:3px; overflow:hidden; }
  .prob-mini .fill { height:100%; background:var(--red); border-radius:3px; }
  .prob-pct { font-weight:700; font-size:12px; min-width:34px; text-align:right; color:var(--red); }

  /* ── Board entropy ── */
  .brow.ent-hot { background:#fff8f0!important; border-left:3px solid #e8820e!important; }
  .brow.ent-chalk { background:#f0fff4!important; border-left:3px solid #1a7f37!important; }
  .brow.wi-lock { border-left:3px solid #6366f1!important; }
  .ent-legend { font-size:11px; color:var(--muted); font-weight:700; display:flex; gap:12px; align-items:center; }
  .ent-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:3px; }

  /* ── Card grid view ── */
  .board-grid { display:flex; flex-wrap:wrap; gap:5px; }
  .bc-rnd { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin:10px 0 4px; width:100%; }
  /* completed rounds fold into their header — the current round owns the screen */
  .bc-rnd.done { cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .bc-rnd.done:hover .rc-tgl { color:var(--ink); }
  .bc-rnd .rc-sum { font-weight:600; text-transform:none; letter-spacing:0; color:var(--muted); }
  .bc-rnd .rc-sum b { color:var(--red); font-weight:800; }
  .bc-rnd .rc-tgl { font-weight:800; color:#b9b9b9; padding-left:4px; }
  .bcard { background:#fff; border:1px solid var(--line); border-radius:9px; padding:7px 8px; width:104px; min-height:104px; font-size:12px; display:flex; flex-direction:column; cursor:pointer; }
  .bcard:hover { border-color:var(--red); }
  .bcard.sv { background:#fff5f6; border-color:#f1b8c1; }
  .bcard.oc { border-color:var(--red); box-shadow:0 0 0 2px #fdeef0; }
  .bcard.ent-hot { border-color:#e8820e; background:#fffaf5; }
  .bcard.ent-chalk { border-color:#1a7f37; background:#f5fff7; }
  .bcard .bc-no { font-size:10px; font-weight:700; color:var(--muted); }
  .bcard .bc-team { font-weight:900; font-size:14px; line-height:1.1; display:flex; align-items:center; gap:4px; }
  .bcard .bc-slot { font-size:10px; color:var(--muted); }
  .bcard .bc-pool { font-size:9px; color:var(--muted); font-weight:700; }
  .bcard.bc-heat .bc-pool { color:inherit; opacity:.8; }
  .bcard .bc-player { font-weight:700; font-size:11px; flex:1; margin-top:3px; line-height:1.3; }
  /* click-to-edit agency (player cards + Best Available table) — inline, no popup */
  .ag-edit { cursor:pointer; border-bottom:1px dashed var(--line); white-space:nowrap; }
  .ag-edit:hover { color:var(--good); border-bottom-color:var(--good); }
  .ag-edit.editing { border-bottom-color:transparent; }
  .ag-pencil { font-size:10px; opacity:.35; margin-left:2px; }
  .ag-edit:hover .ag-pencil { opacity:1; }
  .ag-input { font:inherit; color:inherit; width:12ch; max-width:160px; padding:1px 4px;
    border:1px solid var(--good); border-radius:4px; background:var(--bg,#fff); outline:none; }
  /* Best Available: drafted players toggled back on — dimmed, with where they actually went */
  table.ba tr.ba-drafted { opacity:.5; }
  table.ba tr.ba-drafted:hover { opacity:.8; }
  .ba-gone { font-size:11px; font-weight:700; color:var(--muted); white-space:nowrap; display:inline-flex; align-items:center; gap:4px; }
  .ba-gone .tg { font-size:9px; }
  /* drafted-tile advisory lines: pos · agency · school, then bonus when known */
  .bcard .bc-meta { font-size:9px; color:var(--muted); font-weight:600; line-height:1.3; margin-top:1px; }
  .bcard .bc-bonus { font-size:10px; font-weight:800; font-variant-numeric:tabular-nums; margin-top:2px; display:flex; align-items:center; gap:3px; flex-wrap:wrap; }
  .bcard .bc-bonus .tg { font-size:8px; padding:0 4px; }
  .bc-src { font-size:8px; font-weight:800; text-transform:uppercase; color:var(--muted); }
  /* click-to-enter bonus chip: checked box = validated money, unchecked = our estimate */
  .bc-chip { display:inline-flex; align-items:center; gap:4px; border:1px solid var(--line); border-radius:9px; padding:1px 6px 1px 3px; cursor:pointer; background:#f7f8fa; }
  .bc-chip:hover { border-color:#9aa2ae; background:#eef0f3; }
  .bc-chip.est { color:var(--muted); }
  .bc-chip .bc-ck { width:10px; height:10px; border:1px solid #9aa2ae; border-radius:2px; display:inline-flex; align-items:center; justify-content:center; font-size:8px; line-height:1; background:#fff; color:#fff; flex-shrink:0; }
  .bc-chip.val { color:#155724; border-color:#a8d5b3; background:#f5fff7; }
  .bc-chip.val .bc-ck { background:#1a7f37; border-color:#1a7f37; }
  .bc-bform { display:flex; align-items:center; gap:4px; margin-top:2px; flex-wrap:wrap; font-size:10px; font-weight:700; }
  .bc-bform input[type=text] { width:84px; font:inherit; font-variant-numeric:tabular-nums; padding:1px 3px; border:1px solid var(--line); border-radius:4px; }
  .bc-bform label { display:inline-flex; align-items:center; gap:2px; color:var(--muted); cursor:pointer; white-space:nowrap; }
  .bc-bform button { font:inherit; border:1px solid var(--line); border-radius:4px; background:#fff; cursor:pointer; padding:1px 5px; }
  .bc-bform button.ok { background:#1a7f37; border-color:#1a7f37; color:#fff; }
  .bcard .bc-ti { display:flex; flex-wrap:wrap; gap:2px; margin-top:auto; padding-top:3px; }
  .bcard .ti-pill { font-size:9px; font-weight:800; background:#f0f1f3; border-radius:3px; padding:1px 4px; color:#444; }
  .bcard .ti-Ap { background:#d4edda; color:#155724; }
  .bcard .ti-A { background:#d4edda; color:#155724; }
  .bcard .ti-Bp { background:#dbeafe; color:#1e3a8a; }
  /* in-play player cluster: initials + teamintel-color dot, two columns like the mockup */
  .bc-dots { display:grid; grid-template-columns:1fr 1fr; gap:3px 8px; margin-top:auto; padding-top:5px; }
  .bc-pd { display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:800; color:#374151; cursor:help; white-space:nowrap; overflow:hidden; }
  .bc-pd .idot { width:9px; height:9px; flex-shrink:0; }

  .bc-more { grid-column:1/-1; font-size:9px; font-weight:700; color:var(--muted); }
  /* single-player focus = full intel-color heat card */
  .bcard.bc-heat { border:none; }
  .bcard.bc-heat .bc-no, .bcard.bc-heat .bc-team, .bcard.bc-heat .bc-slot, .bcard.bc-heat .bc-player { color:inherit; }
  .bcard.bc-heat .bc-no, .bcard.bc-heat .bc-slot { opacity:.8; }
  .bc-heatlab { display:flex; align-items:center; gap:4px; flex-wrap:wrap; margin-top:auto; padding-top:5px; }
  /* keep PDW/CMB legible on any heat-fill color */
  .bc-heatlab .pdw { background:rgba(255,255,255,.92); color:#b3122b; border-color:transparent; }
  .bc-heatlab .pdw.cmb { color:#2a3aa0; }

  /* ── What If panel ── */
  .wi-wrap { background:#fff; border:1px solid #c7c3f4; border-radius:12px; padding:14px 16px; margin-bottom:14px; }
  .wi-wrap h3 { margin:0 0 10px; font-size:12px; text-transform:uppercase; letter-spacing:.6px; color:#6366f1; display:flex; align-items:center; gap:8px; }
  .wi-controls { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
  .wi-controls select { font:inherit; padding:5px 7px; border:1px solid var(--line); border-radius:7px; max-width:200px; }
  .wi-lock-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-bottom:6px; font-size:13px; }
  .wi-lock-row select { font:inherit; padding:4px 6px; border:1px solid var(--line); border-radius:6px; }
  .wi-delta { margin-top:10px; }
  .wi-delta-hdr { display:flex; gap:8px; font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.4px; color:var(--muted); padding-bottom:4px; border-bottom:1px solid var(--line); }
  .wi-delta-hdr .dn { flex:1; } .wi-delta-hdr .db,.wi-delta-hdr .dn2,.wi-delta-hdr .dd { min-width:54px; text-align:right; }
  .wi-drow { display:flex; align-items:center; gap:8px; font-size:13px; padding:4px 0; border-bottom:1px solid #f5f5f5; }
  .wi-drow .dn { font-weight:700; flex:1; }
  .wi-drow .db { color:var(--muted); min-width:54px; text-align:right; font-variant-numeric:tabular-nums; }
  .wi-drow .dn2 { font-weight:700; min-width:54px; text-align:right; font-variant-numeric:tabular-nums; }
  .wi-drow .dd { font-weight:800; min-width:60px; text-align:right; font-variant-numeric:tabular-nums; }
  .wi-drow .dd.pos { color:var(--good); } .wi-drow .dd.neg { color:var(--red); }

  /* ── Simulation progress toast ── */
  #projToast { position:fixed; bottom:18px; right:18px; z-index:70; display:none; align-items:center; gap:9px;
    background:#141414; color:#fff; border-radius:999px; padding:9px 16px; font-size:13px; font-weight:700;
    box-shadow:0 8px 24px rgba(0,0,0,.28); }
  #projToast b { font-variant-numeric:tabular-nums; color:#ff6a63; }
  #projToast .pt-bar { width:60px; height:5px; background:rgba(255,255,255,.2); border-radius:3px; overflow:hidden; }
  #projToast .pt-fill { height:100%; background:var(--red); border-radius:3px; transition:width .12s linear; }

  /* ── Board: clickable picks + expand-pick in-play table ── */
  .brow.clickrow { cursor:pointer; } .brow.clickrow:hover { border-color:var(--red); }
  .brow.clickrow .who { color:var(--red); font-weight:700; }
  .brow.clickrow.expanded, .bcard.expanded { box-shadow:0 0 0 2px #6366f1; border-color:#6366f1; }
  .exp-wrap { background:#fff; border:1px solid #c7c3f4; border-radius:12px; padding:14px 16px; margin-bottom:12px; }
  .exp-head { display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }

  /* ════ MOBILE COMPANION (body.mob = ≤640px, JS-synced) — stacked PWA layout.
     Every rule keys off body.mob so desktop and TV mode are pixel-untouched. ════ */
  /* shell: compact header, desktop tabs replaced by a fixed bottom bar */
  #mtabs { display:none; }
  body.mob header { gap:8px; padding:8px 10px; }
  body.mob header .title { display:none; }
  body.mob header .badge { font-size:10px; padding:2px 8px; white-space:nowrap; }
  body.mob .hdr-clock { font-size:12px; padding:2px 9px; gap:5px; white-space:nowrap; }
  body.mob .hdr-clock .hc-lab { display:none; }
  body.mob .tabs { display:none; }
  body.mob .bar, body.mob .prebanner { position:static; }
  body.mob main, body.mob main.wide { padding:12px 10px calc(74px + env(safe-area-inset-bottom)); }
  /* keep rubber-band bounce from dragging the fixed bottom bar with it */
  body.mob { overscroll-behavior-y:none; }
  /* own compositing layer — iOS repaints fixed bars late during scroll without it */
  body.mob #mtabs { display:flex; position:fixed; left:0; right:0; bottom:0; z-index:70; transform:translateZ(0);
    background:#fff; border-top:1px solid var(--line); padding:5px 4px calc(5px + env(safe-area-inset-bottom)); }
  #mtabs button { flex:1; border:0; background:none; font:inherit; font-weight:800; font-size:10px;
    text-transform:uppercase; letter-spacing:.3px; color:var(--muted);
    display:flex; flex-direction:column; align-items:center; gap:2px; padding:4px 0 2px; cursor:pointer; }
  #mtabs button .mi { font-size:17px; line-height:1; }
  #mtabs button.on { color:var(--red); }
  /* sit flush directly on top of the bottom nav bar (its measured height, safe-area included) */
  body.mob #ticker { bottom:var(--navH, calc(56px + env(safe-area-inset-bottom))); }
  /* pick flash: two tidy rows — PICK · team · player, then pos/school · agency · $ */
  body.mob #ticker .tk-inner { flex-wrap:wrap; gap:5px 10px; margin:0 8px; padding:10px 14px; font-size:14px; border-radius:12px; }
  body.mob #ticker .tk-team { font-size:16px; }
  body.mob #ticker .tk-player { flex:1 1 auto; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  body.mob #ticker .tk-meta, body.mob #ticker .tk-agency { white-space:nowrap; }
  body.mob #ticker .tk-sv { margin-left:0; }

  /* board: every pick a screen-width tile — the board IS the list on a phone.
     Children keep their desktop classes; we re-place them on a 3-col grid
     (pick#/team | player + advisory lines | slot $) with dots wrapping full-width. */
  body.mob .bcard { width:100%; min-height:0; padding:8px 12px;
    display:grid; grid-template-columns:52px minmax(0,1fr) auto; column-gap:10px; align-items:center; }
  body.mob .bcard .bc-no { grid-column:1; grid-row:1; font-size:11px; }
  body.mob .bcard .bc-team { grid-column:1; grid-row:2; font-size:13px; }
  body.mob .bcard .bc-slot { grid-column:3; grid-row:1; font-size:11px; text-align:right; }
  body.mob .bcard .bc-pool { grid-column:3; grid-row:2; font-size:10px; text-align:right; }
  body.mob .bcard .bc-player { grid-column:2; grid-row:1; margin-top:0; font-size:13px; }
  body.mob .bcard .bc-meta { grid-column:2; font-size:11px; margin-top:0; }

  body.mob .bc-more { font-size:10px; }
  body.mob .bc-rnd { position:sticky; top:44px; z-index:3; background:var(--bg); padding:6px 2px; margin:6px 0 2px; }
  /* the side feed is redundant when the board itself is the list */
  body.mob .board-split { display:block; }
  body.mob .board-feed { display:none; }
  /* toolbar: one swipeable row; TV toggle and the jump button (pill replaces it) hidden */
  body.mob #viewBoard .ba-filters { flex-wrap:nowrap; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:4px; }
  /* overflow-x:auto forces overflow-y to clip too, which swallows the Players dropdown —
     lift the clip while the menu is open (row briefly stops swiping; fine, a menu is up) */
  body.mob #viewBoard .ba-filters.menu-open { overflow:visible; }
  body.mob #viewBoard .ba-filters label, body.mob #viewBoard .ba-filters .count { white-space:nowrap; }
  body.mob #tvCtl, body.mob #viewBoard .ba-filters > button.ctl { display:none; }

  body.mob #viewBest .ba-filters { align-items:center; row-gap:6px; }
  body.mob #viewBest .ba-filt-toggle { display:inline-flex; align-items:center; gap:6px; font:inherit;

    border-radius:8px; background:var(--card); cursor:pointer; }
  body.mob #viewBest .ba-filters .count { font-size:12px; }
  body.mob #viewBest .ba-filt-controls { display:flex; flex-wrap:wrap; gap:8px; width:100%; order:3; }

  body.mob #viewBest #baChips { position:relative; flex:1 1 100%; }
  body.mob #viewBest .ba-drop { position:static; }
  body.mob #viewBest .ba-drop .res-posmenu { left:0; right:0; width:auto; max-width:none; }

<script>
  const $ = (id) => document.getElementById(id);
  const fmt$ = (n) => n == null ? "—" : "$" + Math.round(n).toLocaleString();
  // Ages always show one decimal (20.0, not 20) — everywhere an age renders.
  const fmtAge = (a) => { if (a==null||a==="") return ""; const n=parseFloat(a); return Number.isFinite(n) ? n.toFixed(1) : String(a); };
  const fmtM = (n) => n == null ? "—" : "$" + (n/1e6).toFixed(2) + "M";
  const sgn$ = (n) => n == null ? "—" : (n<0?"−":"+") + "$" + Math.abs(n/1e6).toFixed(2) + "M";
  const DRAFT_START = Date.UTC(2026, 6, 11, 17, 0, 0);   // Sat Jul 11 2026, 1:00 PM ET (EDT = UTC-4)
  function fmtCountdown(ms) {
    if (ms < 0) ms = 0; let s = Math.floor(ms/1000);
    const d = Math.floor(s/86400); s -= d*86400;
    const h = Math.floor(s/3600); s -= h*3600;
    const m = Math.floor(s/60); s -= m*60;
    const p = (n) => String(n).padStart(2,"0");
    return (d>0 ? d+"d " : "") + p(h)+":"+p(m)+":"+p(s);
  }
  const LATE_EXEMPT = 150000;   // rounds 11+ (slot 0): only bonus above this counts vs the pool
  const CUSHION = 1.05;         // teams may exceed pool by 5% before forfeiting a 1st-round pick
  // Budget-engine params, calibrated to the 2021-25 over/under curve (slot-tracker).
  const ENG = {
    LAMBDA: 4.5,          // cost of money: talent points sacrificed per $1M
    BANK_K: 2.5,          // spare money vs picks left -> lower cost-of-money (spend the cushion)
    RESERVE: 90000,       // $ reserved per remaining pool pick so late picks stay signable
    EROSION_RATE: 0.010,  // a slider's price erodes per spot fallen past his rank
    EROSION_FLOOR: 0.40,
    HOLD: { HS:0.90, JUCO:0.85, "College-JR":0.55, "College-SR":0.15 }, // over-slot premium captured
    POS_LEAN: 14, INTEREST_MAX: 3,
    INTEREST_W: 9,        // talent pts an interested team adds per unit of intel strength (pull toward fit)
    DEV_W: 4,             // org-review dev-fit pull for teams interested in our guy
    TOP_SEP: 5, TOP_SPAN: 6,  // convex separation concentrated in the true elite (top ~6): sticky above,
                              // but a #9 gets ~none so he's free to slide. Thins the upward tail only.
    BAND: 0.25,           // signing bonus lands within slot +/-25% (95% of high picks do, 2015-24)
    FLOOR_MULT: 0.82,     // default personal walk-away ~= 0.82x market value (per-player capturable later)
    SAVE_W: 3.0,          // banking weight: talent pts a spreader gives per $1M saved vs slot.
                          // Tuned so a SPECIFIC high-pick faller-grab stays "unlikely" (~14% for a top
                          // spreader like SF) per scouting input, while aggregate under-slot/faller
                          // rates sit near the 2015-24 history (~35-49% / ~19-31%).
  };
  // Pool-spreader propensity 0..1 from 2015-24 (under-slot early -> over-slot late). Drives which
  // teams will grab a faller under slot to bank for an over-slot pick later.
  const SPREAD = {"TEX":1,"SD":0.91,"SF":0.83,"BAL":0.64,"LAA":0.63,"CLE":0.58,"ATL":0.54,"BOS":0.53,"LAD":0.53,"NYY":0.48,"ATH":0.46,"CHC":0.42,"MIA":0.41,"DET":0.38,"ARI":0.36,"NYM":0.35,"CHW":0.31,"CIN":0.31,"HOU":0.3,"KC":0.3,"STL":0.29,"MIN":0.28,"TOR":0.26,"PHI":0.21,"MIL":0.2,"PIT":0.14,"WSH":0.05,"TB":0.04,"COL":0,"SEA":0};
  const spreadOf = (t) => SPREAD[t] != null ? SPREAD[t] : 0.3;
  const fmtOU = (n) => !n ? "at slot" : (n>0 ? "+"+fmt$(n)+" over" : fmt$(-n)+" banked");
  const fmtVsSlot = (n) => n==null ? "" : (!n ? "at slot" : (n>0 ? "+"+fmtM(n)+" over slot" : fmtM(-n)+" under slot"));
  const MEDICAL_FLOOR = 0.75;   // combine-medical consent guarantees >=75% of slot
  let MEDICALS = {};            // normName -> "yes" | "no"  (absent = unknown)
  try { MEDICALS = JSON.parse(localStorage.getItem("dd:medicals") || "{}"); } catch (e) {}
  const medicalOf = (comp) => comp ? (MEDICALS[normName(comp.name)] || "unknown") : "unknown";
  // display name for a normalized key — needed to log medical/range to the shared intel store
  const clientName = (key) => DATA.compByName.get(key)?.name || DATA.clientList.find(c=>c.key===key)?.name || key;
  window.setMedical = (key, val) => {
    if (val === "unknown") delete MEDICALS[key]; else MEDICALS[key] = val;
    try { localStorage.setItem("dd:medicals", JSON.stringify(MEDICALS)); } catch (e) {}
    renderActive();
    postIntel({ kind:"medical", player_name:clientName(key), note:val }, true);   // share (best-effort)
  };

  // Known landing range (your intel) — HARD lock: a player can't be drafted before
  // range.lo and is taken by range.hi, in projections AND mocks.
  let RANGES = {};   // normName -> { lo, hi }  (pick numbers)
  try { RANGES = JSON.parse(localStorage.getItem("dd:ranges") || "{}"); } catch (e) {}
  // Effective hard-range for the engine: local manual range wins; else a captured strike window.
  // Accepts a comp/client record (anything with .name) or a bare normName key — unranked
  // clients (comp:null) resolve by key, so their manual ranges/strike windows still surface.
  const rangeOf = (comp) => {
    if (!comp) return null;
    const k = typeof comp === "string" ? comp : normName(comp.name);
    if (RANGES[k]) return RANGES[k];
    const s = (typeof INTEL !== "undefined" && INTEL.byKey) ? INTEL.byKey.get(k) : null;
    return (s && s.window && (s.window.lo || s.window.hi)) ? { lo: s.window.lo, hi: s.window.hi } : null;
  };
  // Effective landing window wherever interest is DISPLAYED: manual range / strike window
  // first, else the engine's estimate around his rank (est:true). The mock engine's hard
  // locks keep reading rangeOf directly — an estimate must never force a pick.
  // No rank (unranked client / bare key) → no estimate: window exists only if set.
  const effRangeOf = (comp) => {
    const rg = rangeOf(comp);
    if (rg && (rg.lo || rg.hi)) return { lo: rg.lo || 1, hi: rg.hi || 9999, est: false };
    const rank = (comp && typeof comp === "object") ? comp.rank : null;
    return rank ? { lo: Math.max(1, rank - 7), hi: rank + 45, est: true } : null;
  };
  const roundSpan = (r) => { const ps=(ORDER?.picks||[]).filter(p=>String(p.round)===String(r)); return ps.length?{first:Math.min(...ps.map(p=>p.overall)), last:Math.max(...ps.map(p=>p.overall))}:null; };
  const roundOfPick = (n) => (ORDER?.picks||[]).find(p=>p.overall===n)?.round;
  function saveRanges(key) { try { localStorage.setItem("dd:ranges", JSON.stringify(RANGES)); } catch (e) {}
    renderActive(); }
  window.setRange = (key, lo, hi) => {
    lo = parseInt(lo,10) || null; hi = parseInt(hi,10) || null;
    if (!lo && !hi) delete RANGES[key]; else RANGES[key] = { lo, hi };
    saveRanges(key);
    // Share as a strike_window (an allowed kind rangeOf already reads) so teammates get the window.
    postIntel({ kind:"strike_window", player_name:clientName(key), window_lo:lo, window_hi:hi }, true);
  };
  window.setRangeByRound = (key, rLo, rHi) => { const a=roundSpan(rLo), b=roundSpan(rHi); if(a&&b) window.setRange(key, a.first, b.last); };
  window.clearRange = (key) => { delete RANGES[key]; saveRanges(key);
    postIntel({ kind:"strike_window", player_name:clientName(key), window_lo:null, window_hi:null }, true); };

  // Representing agency (non-SV clients) — a war-room-editable override on the fed comp.agent,
  // shared like medical/range: local override wins, else the value from the data feed.
  let AGENCIES = {};   // normName -> agency string
  try { AGENCIES = JSON.parse(localStorage.getItem("dd:agencies") || "{}"); } catch (e) {}
  const agentOf = (comp) => comp ? (AGENCIES[normName(comp.name)] || comp.agent || "") : "";
  const escAttr = (s) => String(s==null?"":s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  // Inline-editable agency cell: renders a click-to-edit chip; used on the player cards and
  // the Best Available table. `key` must already be quote-escaped by the caller.
  const agEditCell = (key, comp) => {
    const v = agentOf(comp);
    return `<span class="ag-edit" title="Click to edit agency" onclick="beginAgencyEdit(this,'${key}',event)">`
      + `<span class="ag-val">${v ? escAttr(v) : "—"}</span> <span class="ag-pencil">✎</span></span>`;
  };
  // Click → swap the chip for an inline input in place (no popup). Enter/blur commits, Esc cancels.
  // stopPropagation keeps a table row's click-to-open from firing while editing.
  window.beginAgencyEdit = (el, key, e) => {
    if (e) e.stopPropagation();
    if (el.querySelector("input")) return;             // already editing
    const cur = AGENCIES[key] || (DATA.compByName.get(key)?.agent) || "";
    el.classList.add("editing");
    el.innerHTML = `<input class="ag-input" value="${escAttr(cur)}" placeholder="agency" spellcheck="false">`;
    const inp = el.querySelector("input");
    inp.focus(); inp.select();
    inp.onclick = (ev) => ev.stopPropagation();
    inp.onkeydown = (ev) => {
      ev.stopPropagation();
      if (ev.key==="Enter") inp.blur();
      else if (ev.key==="Escape") { inp.dataset.cancel="1"; inp.blur(); }
    };
    inp.onblur = () => { if (inp.dataset.cancel) { renderActive(); return; } commitAgency(key, inp.value); };
  };
  function commitAgency(key, val) {
    val = (val||"").trim();
    const prev = AGENCIES[key] || "";
    if (val) AGENCIES[key] = val; else delete AGENCIES[key];
    try { localStorage.setItem("dd:agencies", JSON.stringify(AGENCIES)); } catch (e) {}
    renderActive();
    if (val !== prev) postIntel({ kind:"agency", player_name:clientName(key), note:val }, true);  // share (best-effort)
  }
  const TEAMINTEL_URL = "https://sv-teamintel.vercel.app/teamintel.json";
  // sv-teamintel's shared per-pick "in play" checkboxes (Draft Card `pk|player|team` overrides):
  // key ABSENT = in play at every one of that team's picks; present = whitelist of pick numbers.
  const TI_OVERRIDES_URL = "https://sv-teamintel.vercel.app/api/overrides";
  async function loadPickInPlay(rerender) {
    try {
      const d = await fetch(TI_OVERRIDES_URL, { cache:"no-store" }).then(r=>r.json());
      const v = d.values || d, m = new Map();
      for (const k in v) {
        if (!k.startsWith("pk|")) continue;
        const parts = k.split("|"); if (parts.length < 3) continue;
        m.set(normName(parts[1]) + "|" + teamAlias(parts[2]), new Set(Array.isArray(v[k]) ? v[k] : []));
      }
      DATA.pickInPlay = m;
      if (rerender) renderActive();
    } catch (e) {}
  }
  // In play for THIS pick: not ruled out in our store (team-wide or at this pick), and inside the
  // sv-teamintel per-pick whitelist when one exists.
  // Is this pick inside the client's plausible landing band? Locked range / strike window
  // when set, else the engine window around his rank — mirrors the Our Clients Range column.
  // Unranked clients: manual range / strike window only (no rank → no estimate), else no window.
  function inRangeAt(key, overall) {
    const comp = DATA.compByName.get(key);
    const rg = effRangeOf(comp || key); if (!rg) return true;
    return overall >= (rg.lo || 1) && overall <= (rg.hi || 9999);
  }
  function tiInPlayAt(key, team, overall) {
    if (!inRangeAt(key, overall)) return false;   // out of his landing window -> never in play here
    const cap = intelFor(key);
    if (cap && cap.ruleOuts && cap.ruleOuts.some(r => r.team===team && (!r.pick || r.pick===overall))) return false;
    const wl = DATA.pickInPlay && DATA.pickInPlay.get(key + "|" + team);
    return !wl || wl.has(overall);
  }
  // The board's initials rule (teamintel-only, no heat scores): our undrafted clients whose LIVE
  // teamintel color with this team is green/light green AND who are in play at this specific pick.
  function tiClientsAt(pk, state) {
    const drafted = new Set(state.picks.filter(x=>x.isDrafted&&x.player).map(x=>normName(x.player)));
    return DATA.clientList.filter(c => (c.comp || rangeOf(c.key)) && !drafted.has(c.key)
        && intelColorRank(c.key, pk.team) <= 1
        && tiInPlayAt(c.key, pk.team, pk.overall))
      .sort((a,b)=> intelColorRank(a.key,pk.team)-intelColorRank(b.key,pk.team) || (a.comp?.rank ?? 1e9)-(b.comp?.rank ?? 1e9));
  }
  // Historical draft-slot signings (2018–25): per-pick bonus vs slot. CORS-open, so fetch directly.
  const SLOT_HISTORY_URL = "https://mdecicco-sv.github.io/draft-slot-tracker/data.csv";
  const posGroupOf = (pos) => { const p=(pos||"").toUpperCase();
    if (/P|RHP|LHP|SP|RP/.test(p)) return "P"; if (p==="C") return "C";
    if (/1B|2B|3B|SS|IF|INF/.test(p)) return "IF"; if (/OF|CF|LF|RF/.test(p)) return "OF"; return "?"; };
  // every group a multi-listed position covers ("1B/OF" -> IF+OF) — posGroupOf alone keeps
  // only the first bucket, which drops the OF half of two-way listings in position matching
  const posGroupsOf = (pos) => { const s=new Set();
    String(pos||"").toUpperCase().split(/[\/,+\s]+/).forEach(t=>{ const g=posGroupOf(t); if(g!=="?") s.add(g); }); return s; };
  function parseCsvLine(line) {
    const out=[]; let cur="", q=false;
    for (let i=0;i<line.length;i++){ const ch=line[i];
      if (q) { if (ch==='"'){ if(line[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=ch; }
      else { if (ch===","){out.push(cur);cur="";} else if (ch==='"'){q=true;} else cur+=ch; } }
    out.push(cur); return out;
  }
  // The tracker's level column is only HS/C — JuCos hide inside C. Classify from the
  // LAST school in the education chain (the school he was drafted out of): explicit
  // CC/JC/Community/Junior patterns, plus "X College"-style names that are JuCos in
  // practice, minus the known four-year "College" programs that produce draftees.
  const JUCO_4YR = new Set(["boston college","college of charleston","eckerd college","canisius college",
    "presbyterian college","belmont abbey college","mesa state college","master's college","jamestown college",
    "lenoir-rhyne college","lewis-clark state college","manhattan college","menlo college","mississippi college",
    "montreat college","north central college","notre dame college","peru state college","siena college",
    "st. john fisher college","st. mary's college","tusculum college","union college","waynesburg college",
    "westmont college","skidmore college","georgetown college","baldwin-wallace college","holy names college"]);
  function isJucoSchool(chain) {
    const parts = String(chain||"").split(",").map(x=>x.trim()).filter(Boolean);
    const L = parts.length ? parts[parts.length-1] : "";
    if (!L) return false;
    if (/\b(CC|JC)\b|J\.C\.|Community College|Junior College|Jr\.? College/i.test(L)) return true;
    if (!/\bCollege\b/i.test(L)) return false;
    return !JUCO_4YR.has(L.toLowerCase().replace(/\s*\([^)]*\)\s*/g," ").replace(/\s+/g," ").trim());
  }
  async function loadSlotHistory() {
    if (DATA.slotHistory.length) return;
    try {
      const [txt, hi, svr] = await Promise.all([
        fetch(SLOT_HISTORY_URL, { cache:"force-cache" }).then(r=>r.text()),
        fetch("/data/hilevel.json").then(r=>r.ok?r.json():{}).catch(()=>({})),   // mlbid → highest pro level (build_hilevel.py)
        fetch("/data/svregistry.json").then(r=>r.ok?r.json():null).catch(()=>null),   // SV registry names for the history-card badge (build_svregistry.js)
      ]);
      DATA.hiLevel = hi || {};
      DATA.svReg = new Set(Object.keys((svr && svr.names) || {}));
      const lines = txt.split(/\r?\n/);
      const num = s => { const n=parseFloat((s||"").replace(/[",]/g,"")); return Number.isFinite(n)?n:null; };
      const rows=[];
      for (let i=1;i<lines.length;i++){ if(!lines[i].trim()) continue; const f=parseCsvLine(lines[i]); if(f.length<23) continue;
        const bonus=num(f[20]), slot=num(f[21]);
        rows.push({ year:+f[1], round:f[2], overall:num(f[3]), mlbid:f[5]||"", first:f[6], last:f[7], pos:f[8], group:posGroupOf(f[8]),
          level:(f[13]==="HS"?"HS":(isJucoSchool(f[14])?"JuCo":"College")), school:f[14], team:f[17], bonus, slot,
          bats:f[9]||"", throws:f[10]||"", born:f[15]||"", ht:f[18]||"", wt:num(f[19]), full:f[16]||"",
          homeplace:(f[12]||"").trim(), hst:((/,\s*([A-Z]{2})\s*$/.exec(f[12]||"")||[])[1]||""),
          diff:(f[22]!==""&&f[22]!=null?num(f[22]):(bonus!=null&&slot!=null?bonus-slot:null)) });
      }
      DATA.slotHistory = rows;
      leagueTendencies();
      // name index for looking up a specific player's signing — index first+last AND the CSV's
      // fullName (nicknames differ: "Perry Morlando" is listed as "PJ Morlando" in fullName)
      DATA.slotByName = new Map();
      const idx = (k, r) => { if (!k) return; if (!DATA.slotByName.has(k)) DATA.slotByName.set(k, []); DATA.slotByName.get(k).push(r); };
      for (const r of rows) {
        const a = normName(r.first + " " + r.last), b = normName(r.full);
        idx(a, r); if (b && b !== a) idx(b, r);
      }
      if (cardPick!=null) renderTeamCard(currentState);
      if (VIEW==="research") renderResearch();
      else if (VIEW==="fit") renderResFit();
    } catch (e) {}
  }
  // Renamed franchises alias forward so 2018-25 tracker rows pool under today's name.
  const NAME_FWD = { "Cleveland Indians":"Cleveland Guardians", "Oakland Athletics":"Athletics" };
  // Standardized position display for tracker rows: ALL CAPS, pitchers carry handedness
  // (RHP/LHP from the throws column when the pos cell doesn't already say so).
  function posDisp(r) {
    const p = String(r.pos||"").toUpperCase();
    if (r.group !== "P") return p;
    const m = p.match(/[LR]HP/); if (m) return m[0];
    return r.throws==="L" ? "LHP" : r.throws==="R" ? "RHP" : "P";
  }
  // Table-cell variant: hitters also carry their bat side (S for switch) as a small mark.
  function posDispB(r) {
    if (r.group === "P") return posDisp(r);
    const b = (r.bats||"").toUpperCase().replace("B","S");
    return posDisp(r) + (b ? ` <span class="posb">${b}</span>` : "");
  }
  // Position display for live/mock feed picks (p.pos + composite record): pitchers get
  // handedness from the comp's throws, hitters get their bat side.
  function pickPos(p, comp) {
    const raw = String(p.pos || (comp && comp.pos) || "").toUpperCase();
    if (!raw) return "";
    const m = raw.match(/[LR]HP/); if (m) return m[0];
    if (isPitcher(raw)) return comp && comp.throws ? (comp.throws==="L" ? "LHP" : "RHP") : raw;
    const b = comp && comp.bats ? String(comp.bats).toUpperCase().replace("B","S") : "";
    return raw + (b ? ` <span class="posb">${b}</span>` : "");
  }
  // Tracker rows carry full team names; map to the feed's abbrevs (built lazily from the
  // live pick list), falling back to the nickname for any unmapped name.
  function teamAbbrevOf(fullName) {
    const n = NAME_FWD[fullName] || fullName;
    if (!DATA.nameToAbbr && currentState) DATA.nameToAbbr = new Map(currentState.picks.map(p=>[p.teamName, p.team]));
    return (DATA.nameToAbbr && DATA.nameToAbbr.get(n)) || n.split(" ").slice(-1)[0];
  }
  // Team-wide 2018-25 draft tendencies (P% / HS%) per team + league averages and ranks,
  // computed once after the slot CSV lands. Powers the card's vs-league vitals.
  function leagueTendencies() {
    const byTeam = new Map();
    for (const r of DATA.slotHistory) {
      const t = NAME_FWD[r.team] || r.team;
      const v = byTeam.get(t) || { n:0, p:0, hs:0, hsHit:0, hsP:0, colHit:0, colP:0 };
      v.n++; if (r.group==="P") v.p++; if (r.level==="HS") v.hs++;
      // 4-way HS/COL × Hitter/Pitcher (JuCo folds into College, matching hsPct's framing)
      const isHS = r.level==="HS", isP = r.group==="P";
      if (isHS && !isP) v.hsHit++; else if (isHS && isP) v.hsP++;
      else if (!isHS && !isP) v.colHit++; else v.colP++;
      byTeam.set(t, v);
    }
    const teams = [...byTeam.entries()].map(([t,v]) => ({ t, pPct:100*v.p/v.n, hsPct:100*v.hs/v.n, n:v.n,
      hsHit:v.hsHit, hsP:v.hsP, colHit:v.colHit, colP:v.colP }));
    const mean = f => teams.length ? teams.reduce((s,x)=>s+f(x),0)/teams.length : null;
    DATA.leagueTend = {
      byTeam: new Map(teams.map(x=>[x.t, x])),
