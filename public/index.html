    h += `<div class="ot-row"><span>Interest</span><b>${colorRec?colorRec.color:"—"}</b></div>`;
    h += `<div class="ot-row"><span>Source</span><b>${msgRec.tier_label?msgRec.tier_label+" · ":""}${src}</b></div>`;
    if (msg) h += `<div class="ot-sec">Latest message${msgRec!==latest&&msgRec.date?` · ${msgRec.date}`:""}</div><div style="color:#ddd;white-space:pre-wrap">${_esc(msg)}</div>`;
    return h;
  }
  // Aggregate a team's interest in a client across the FULL intel history — recency- and
  // source-tier-weighted, with a small boost for sustained volume. Returns strength 0..1.
  // (Months of repeated, recent, director-level interest should outweigh one stale score.)
  const _tiCache = new Map();
  function teamInterest(clientKey, team) {
    const ck = clientKey + "|" + team;
    if (_tiCache.has(ck)) return _tiCache.get(ck);
    const recs = DATA.intel.filter(r => teamAlias(r.team)===team && normName(r.player)===clientKey);
    let out;
    if (!recs.length) out = { strength:0, n:0, max:0, latest:null };
    else {
      const now = Date.now();
      let wsum=0, w=0, max=0, latest=null;
      for (const r of recs) {
        const score = (r.score!=null ? r.score : 0);
        if (score>max) max=score;
        if (!latest || (r.date||"")>(latest.date||"")) latest=r;
        const days = r.date ? Math.max(0,(now - Date.parse(r.date))/86400000) : 150;
        const recW = Math.exp(-days/90);                      // ~90-day decay; near-draft intel dominates
        const tierW = Math.sqrt(r.tier_multiplier || 1);      // a scouting director outweighs an area scout
        const wt = recW * tierW;
        wsum += score*wt; w += wt;
      }
      const wavg = w ? wsum/w : 0;
      const vol = Math.min(1.2, 1 + Math.log10(recs.length+1)*0.12);   // sustained-interest boost
      const strength = Math.max(0, Math.min(1, ((wavg*0.6 + max*0.4)/6) * vol));
      out = { strength, n:recs.length, max, latest };
    }
    _tiCache.set(ck, out);
    return out;
  }
  function teamNextPick(state, team) { return state.picks.find(p => p.team===team && !p.isDrafted) || null; }
  // The team's most relevant upcoming pick for a player: with a known range set, the earliest
  // undrafted pick inside it (where he could actually land for this team); else the next pick.
  function teamPickInRange(state, team, rg) {
    const picks = state.picks.filter(p => p.team===team && !p.isDrafted).sort((a,b)=>a.overall-b.overall);
    if (rg && (rg.lo || rg.hi)) { const lo=rg.lo||1, hi=rg.hi||9999; return picks.find(p => p.overall>=lo && p.overall<=hi) || null; }
    return picks[0] || null;
  }

  // landing-spot fit FOR the client: interest 45 / dev 20 / type 15 / money 20, where
  // interest is the full-history aggregate (teamInterest). Interest-dominant by design.
  function fit(comp, team, clientKey, state) {
    const o = DATA.orgs[team] || {};
    const interestN = clientKey ? teamInterest(clientKey, team).strength : 0;
    const devN = o.orgRank != null ? Math.max(0, (31 - o.orgRank)/30) : 0.5;
    let typeN = 0.5;
    if (comp) {
      const lean = (o.earlyPitcherPct!=null?o.earlyPitcherPct:50)/100;
      const posN = isPitcher(comp.pos) ? lean : (1-lean);
      let lvlN = 0.5;
      if (comp.level==="HS" && o.hsPct!=null) lvlN = o.hsPct/100;
      else if (comp.level==="College" && o.collegePct!=null) lvlN = o.collegePct/100;
      typeN = (posN + lvlN)/2;
    }
    const pool = state.poolsMap[team];
    const moneyN = pool && pool.ceiling ? Math.max(0, Math.min(1, pool.room/pool.ceiling)) : 0.5;
    const gradeOf = (s)=> s>=85?"A+":s>=75?"A":s>=66?"B+":s>=56?"B":s>=46?"C":"D";
    const colorOf = (s)=> s>=75?"#1a7f37":s>=56?"#3949ab":s>=46?"#e8820e":"#9aa0a6";
    const score = Math.round(100*(0.45*interestN + 0.20*devN + 0.15*typeN + 0.20*moneyN));
    // org fit = interest/dev/type only (money excluded), renormalized — lets a strong intel/org
    // fit surface at a slot even when the team's money doesn't work.
    const orgScore = Math.round(100*(0.45*interestN + 0.20*devN + 0.15*typeN)/0.80);
    return { score, grade:gradeOf(score), color:colorOf(score),
             orgScore, orgGrade:gradeOf(orgScore), color2:colorOf(orgScore),
             interestN, devN, typeN, moneyN };
  }

  // ---------- VIEW: OUR CLIENTS ----------
  function renderClients(state) {
    const drafted = new Map(); // key -> pick
    state.picks.forEach(p => { if (p.isDrafted && p.player) drafted.set(normName(p.player), p); });
    const dCount = DATA.clientList.filter(c => drafted.has(c.key)).length;
    const secured = DATA.clientList.reduce((s,c)=>{ const pk = drafted.get(c.key); return s + (pk?.slot || 0); }, 0);
    $("clientSummary").innerHTML = [
      ["Clients tracked", DATA.clientList.length],
      ["Drafted", dCount],
      ["Still on board", DATA.clientList.length - dCount],
      ["Slot $ secured", fmtM(secured)],
    ].map(([k,v]) => `<div><div class="k">${k}</div><div class="v">${v}</div></div>`).join("");

    if (!DATA.clientList.length) { $("clientRows").innerHTML = `<tr><td colspan="10"><div class="placeholder">No client data — is sv-teamintel reachable?</div></td></tr>`; return; }

    // One scannable row per client: still-on-board first (rank order — that's the working set
    // mid-draft), drafted after (pick order). All depth lives on the player page (row click).
    const rows = [...DATA.clientList].sort((a,b) => {
      const pa = drafted.get(a.key), pb = drafted.get(b.key);
      if (!!pa !== !!pb) return pa ? 1 : -1;
      if (pa && pb) return pa.overall - pb.overall;
      return (a.comp?.rank ?? 1e9) - (b.comp?.rank ?? 1e9);
    });
    $("clientRows").innerHTML = rows.map(c => {
      const comp = c.comp, pk = drafted.get(c.key);
      // Interest: strongest color first; ties broken by who's up soonest INSIDE his landing
      // window (locked range / strike window) — teams with no pick in the window sort last.
      // Every pill has the same shape (dot · team · pick slot); no pick in window → "—",
      // so rows scan as a repeated unit. Hover a dot for the latest intel.
      const rgW = comp ? rangeOf(comp) : null;
      const teams = [...new Set(DATA.intel.filter(r=>normName(r.player)===c.key).map(r=>teamAlias(r.team)))]
        .map(t => ({ t, cr: intelColorRank(c.key,t), nx: teamPickInRange(state, t, rgW) }))
        .sort((a,b)=> (a.cr-b.cr) || (!!b.nx-!!a.nx) || ((a.nx?a.nx.overall:1e9)-(b.nx?b.nx.overall:1e9)));
      const interest = teams.length
        ? `<div class="cl-intw">` + teams.slice(0,3).map(x=>{
            const hasPk = x.nx && !pk;
            return `<span class="cl-int">${intelDot(c.key,x.t)}${x.t}<span class="cl-pk${hasPk?"":" na"}">${hasPk?`#${x.nx.overall}`:"—"}</span></span>`;
          }).join("")
          + (teams.length>3?`<span class="cl-int cl-more">+${teams.length-3}</span>`:"") + `</div>`
        : `<span class="cl-none">—</span>`;
      // Range: locked intel range when we have one, else the engine's window around his rank.
      const rg = comp ? rangeOf(comp) : null;
      const range = pk ? `<span class="cl-none">—</span>`
        : rg && (rg.lo||rg.hi) ? `<span class="tg fit" title="known range — your intel (hard lock)">🔒 #${rg.lo||"?"}–${rg.hi||"?"}</span>`
        : comp ? `<span class="cl-rng" title="engine window around his rank — no intel range set">~#${Math.max(1,comp.rank-7)}–${Math.min(state.picks.length||comp.rank+45, comp.rank+45)}</span>`
        : `<span class="cl-none">—</span>`;
      const status = pk
        ? `<span class="cl-dr">DRAFTED #${pk.overall} · ${pk.team}</span>`
        : `<span class="cl-av">On board</span>`;
      const dem = comp ? demandFor(comp) : null;
      const money = pk ? (moneyCell(pk) || "—") : (dem!=null ? `est ~${fmt$(dem)}` : "—");
      return `<tr class="clickrow ${pk?"cl-done":""}" onclick="openPlayer('${c.key.replace(/'/g,"\\'")}')">
        <td class="rk">${comp?`#${comp.rank}`:"NR"}</td>
        <td class="cl-nm">${c.name}</td>
        <td>${comp?.pos || "—"}</td>
        <td>${comp?`<span class="lvl ${comp.level}">${comp.level}</span>`:"—"}</td>
        <td class="hide-sm">${schoolShort(comp?.school) || "—"}</td>
        <td class="hide-sm">${fmtAge(comp?.age) || "—"}</td>
        <td class="cl-ints">${interest}</td>
        <td class="hide-sm">${range}</td>
        <td>${status}</td>
        <td class="cl-money">${money}</td></tr>`;
    }).join("");
  }
  // rough slot for a board rank: use the order's slot at that overall pick (approx draft stock -> $)
  function slotForRank(rank) {
    if (!ORDER || !ORDER.picks) return null;
    const pk = ORDER.picks.find(p => p.overall === rank);
    return pk ? pk.slot : null;
  }

  // ---------- VIEW: BEST AVAILABLE ----------
  function renderBest() {
    if (!currentState) return;
    const drafted = new Set(currentState.picks.filter(p=>p.isDrafted&&p.player).map(p=>normName(p.player)));
    const lvl = $("fLevel").value, pos = $("fPos").value, svOnly = $("fSv").checked, q = normName($("fQuery").value);
    const clickable = MODE==="mock" && !mock.running && currentState.onClock;
    const rows = DATA.composite.filter(p => {
      if (drafted.has(normName(p.name))) return false;
      if (lvl!=="All" && p.level!==lvl) return false;
      if (pos!=="All" && p.posGroup!==pos) return false;
      if (svOnly && !DATA.clients.has(normName(p.name))) return false;
      if (q && !(normName(p.name).includes(q) || normName(p.school).includes(q))) return false;
      return true;
    });
    $("baCount").textContent = `${rows.length} available${clickable?" · mock paused: use a row's Draft button":""}`;
    // Row click opens the player profile — drafting is only ever the explicit Draft button
    // (shown when a paused mock is on the clock), so a stray click can't take a player.
    $("baBody").innerHTML = rows.map(p => {
      const ours = DATA.clients.has(normName(p.name)), qn = p.name.replace(/'/g,"\\'");
      return `<tr class="${ours?"sv":""} clickrow" onclick="openPlayer('${normName(p.name).replace(/'/g,"\\'")}')">
        <td class="rk">#${p.rank}</td><td>${p.name} ${ours?'<span class="svtag">SV</span>':""}${MOBILE.matches&&p.school?`<div class="ba-sub">${p.school}</div>`:""}</td>
        <td>${p.pos}</td><td><span class="lvl ${p.level}">${p.level}</span></td>
        <td class="hide-sm">${p.school||""}</td><td class="hide-sm">${p.commit||"—"}</td><td class="hide-sm">${p.agent||"—"}</td><td class="hide-sm">${fmtAge(p.age)}</td><td>${fmtBT(p)}</td>
        <td class="sr-col">${p.ba!=null?"#"+p.ba:"—"}</td>
        <td class="sr-col">${p.mlb!=null?"#"+p.mlb:"—"}</td>
        <td class="sr-col">${p.overslot!=null?"#"+p.overslot:"—"}</td>
        <td class="sr-col">${p.espn!=null?"#"+p.espn:"—"}</td>
        <td class="sr-col">${p.pbr!=null?"#"+p.pbr:"—"}</td>
        <td class="sr-col">${p.ath!=null?"#"+p.ath:"—"}</td>
        <td class="hide-sm">${trendCell(p)}</td>
        <td class="ba-draft">${clickable?`<button class="ctl ba-draft-btn" onclick="event.stopPropagation();draftManual('${qn}')">Draft</button>`:""}</td></tr>`;
    }).join("") || `<tr><td colspan="17" style="color:#9aa0a6;padding:14px">No players match these filters.</td></tr>`;
  }
  // Composite-rank trend across ranking editions (baked from rank_history.json; the point
  // dates live in meta.json histDates). Lower rank = better, so the spark draws rank #1 at
  // the top and the Δ is vs the previous edition: ▲3 = climbed three composite spots.
  function trendCell(p) {
    const t = p.trend, pts = (t||[]).map((v,i)=>({v,i})).filter(x=>x.v!=null);
    if (!pts.length) return `<span class="cl-none">—</span>`;
    if (pts.length === 1) return `<span class="trend flat"><span class="new">NEW</span></span>`;
    const last = pts[pts.length-1].v, prev = pts[pts.length-2].v, d = prev - last;
    const cls = d>0?"up":d<0?"down":"flat", arrow = d>0?"▲":d<0?"▼":"·";
    const dates = DATA.meta?.histDates||[];
    const tip = pts.map(x=>`${dates[x.i]?dates[x.i].slice(5).replace("-","/"):""} #${x.v}`).join(" → ");
    return `<span class="trend ${cls}" title="composite rank by edition: ${tip}">${spark(pts.map(x=>x.v))}<span class="delta">${arrow}${d?Math.abs(d):""}</span></span>`;
  }
  function spark(vals) {
    const w=56, h=16, n=vals.length;
    const lo=Math.min(...vals), hi=Math.max(...vals), sp=(hi-lo)||1;
    const xy=(v,i)=>[ (i/(n-1))*(w-4)+2, ((v-lo)/sp)*(h-6)+3 ];
    const d = vals.map((v,i)=>`${i?"L":"M"}${xy(v,i).map(z=>z.toFixed(1)).join(",")}`).join("");
    const [cx,cy]=xy(vals[n-1],n-1);
    return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><path d="${d}"/><circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="2"/></svg>`;
  }

  // ---------- VIEW: BOARD (running log + card grid) ----------
  const roundLabel = (r) => /^\d+$/.test(String(r)) ? `Round ${r}` : String(r); // "1"->Round 1, "CB-A"->CB-A
  const surnameOf = (name) => { const last = (name||"").trim().split(/\s+/).pop()||""; return last.length>9 ? last.slice(0,9)+"…" : last; };
  // Initials for a card dot, e.g. "M. Williams" -> "MW", "Kade Higgins" -> "KH".
  function initials(name) {
    const parts = (name||"").trim().split(/\s+/).filter(Boolean);
    if (!parts.length) return "?";
    const f = parts[0][0]||"", l = parts.length>1 ? (parts[parts.length-1][0]||"") : "";
    return (f+l).toUpperCase();
  }
  // Which of our clients are "in play" for a given (undrafted) pick — the set the pick card's
  // dot cluster and the expand panel both draw from. In play = we've captured team-specific intel
  // (interest/offer/rule-out), OR he's a genuine org fit within a plausible reach of this slot.
  function clientsInPlay(pk, state) {
    const team = pk.team, pool = state.poolsMap[team];
    const drafted = new Set(state.picks.filter(p=>p.isDrafted&&p.player).map(p=>normName(p.player)));
    return DATA.clientList.filter(c=>c.comp && !drafted.has(c.key)).map(c=>{
      const rec = latestIntel(c.key, team);
      const cap = intelFor(c.key);
      const f = fit(c.comp, team, c.key, state);
      const bonus = negBonus(c.comp, pk.slot, pk.overall);
      const ou = bonus - pk.slot;
      const moneyFits = pool ? pool.room >= bonus : true;     // does the team's pool actually accommodate him
      // talent reach: don't surface a player far outside a plausible window for this slot
      // (rank-7 floor keeps a top guy off picks that would be an implausibly early reach).
      const reachOk = pk.overall >= c.comp.rank - 7 && pk.overall <= c.comp.rank + 45;
      const ruledHere = !!(cap && cap.ruleOuts && cap.ruleOuts.some(r => r.team===team || r.pick===pk.overall));
      return { c, rec, cap, f, ou, bonus, moneyFits, reachOk, ruledHere };
    }).filter(x => {
      const teamCap = x.cap && (
        [...x.cap.interest.values()].some(v => v.team===team) ||
        (x.cap.offers||[]).some(o => o.team===team) ||
        (x.cap.ruleOuts||[]).some(r => r.team===team)
      );
      // orgScore is interest-dominant (full intel history), so a bare feed record doesn't count.
      return teamCap || (x.reachOk && x.f.orgScore>=52);
    }).sort((a,b)=> b.f.orgScore-a.f.orgScore);
  }
  function renderBoard(state) {
    if (!state) return;
    $("boardCount").textContent = `${state.madeCount} of ${state.picks.length} picks made`;
    renderBoardPlayers(state);
    renderBoardGrid(state);
    renderBoardFeed(state);
  }

  // ---------- Client evaluation module: Recent Draft Comparisons (Our Clients view) ----------
  // "If this team comes with interest, what should we look at for X?" — baseball comps that
  // anchor evaluation, in live and mock alike. Curated lists come from the SV deck; drafted
  // slot/bonus facts hydrate live from the slot tracker. No curated list → cold auto-comps.
  const DRAFT_COMPS = {   // client key -> comp names (slot-tracker spelling)
    "trevor condon": ["Dillon Head","Slade Caldwell","Jonny Farmelo","Braylon Payne","Slater de Brun"],
    "taj marchand":  ["Myles Naylor","Carson Williams","Sammy Stafura","Coy James"],
    "bo lowrance":   ["Colson Montgomery","PJ Morlando","Brett Baty","Xavier Neyens"],
  };
  const compAge = (born, year) => {   // age on draft day (~Jul 14) from the CSV's m/d/yyyy borndate
    const t = Date.parse(born); if (!Number.isFinite(t)) return null;
    return (((Date.UTC(year,6,14) - t) / 31557600000)).toFixed(1);
  };
  const fmtHtWt = (r) => (r.ht && r.wt) ? `${r.ht.replace("-","'")}" / ${r.wt}` : "—";
  // B/T display: feed marks switch-hitters "B" — show the slot-tracker's "S" convention
  const fmtBT = (r) => (r && (r.bats || r.throws)) ? `${(r.bats||"?").replace("B","S")}/${r.throws||"?"}` : "—";
  // Manual batting-side overrides (normName -> "L" | "R" | "S"). The composite feed now
  // bakes Bats/Throws for nearly everyone — this is only an escape hatch for feed errors.
  const CLIENT_BATS = {};
  // Same-hand rule for comps: pitchers match throwing hand, hitters match batting side.
  // The feed marks switch-hitters "B"; slot-tracker history uses "S" — normalize to "S".
  function handOf(comp) {
    if (!comp) return null;
    if (isPitcher(comp.pos)) {
      const m = String(comp.pos).match(/([LR])HP/);
      const side = m ? m[1] : (comp.throws||"")[0];
      return side ? { field:"throws", side } : null;
    }
    const b = CLIENT_BATS[normName(comp.name)] || comp.bats;
    if (!b) return null;
    const side = String(b)[0].toUpperCase();
    return { field:"bats", side: side==="B" ? "S" : side };
  }
  // A hitter with one defined position comps against that exact position (an SS comps to
  // SSs, not the whole infield); generic listings (IF/OF) and pitchers keep group matching.
  const compExactPos = (comp) => { const p = String(comp?.pos||"").toUpperCase();
    return (!isPitcher(comp?.pos) && /^(C|1B|2B|3B|SS|LF|CF|RF)$/.test(p)) ? p : null; };
  // Auto comps: same level × exact position (hitters) or position group, drafted nearest the
  // client's composite rank, deduped, most recent first on ties. Hand: pitchers hard-match
  // throwing hand (RHP -> RHPs); hitters PREFER the same batting side — an off-side comp only
  // makes the table if it's >25 picks closer to his rank than the next same-side option.
  function autoComps(comp) {
    const lvl = comp.level==="HS" ? "HS" : "College", grp = comp.posGroup || posGroupOf(comp.pos);
    const hand = handOf(comp), xp = compExactPos(comp);
    // primary listed position must match: "SS-3B" is an SS comp, "P-SS"/"2b-ss" are not
    const posHit = (r) => (String(r.pos||"").toUpperCase().split(/[^A-Z0-9]+/)[0]||"") === xp;
    const sameHand = (r) => !hand || (r[hand.field]||"").toUpperCase().startsWith(hand.side);
    const seen = new Set(), out = [];
    const rows = DATA.slotHistory.filter(r => r.bonus!=null && r.level===lvl
        && (xp ? posHit(r) : r.group===grp)
        && (isPitcher(comp.pos) ? sameHand(r) : true))
      .sort((a,b) => (Math.abs(a.overall-comp.rank) + (sameHand(a)?0:25))
                   - (Math.abs(b.overall-comp.rank) + (sameHand(b)?0:25)) || b.year-a.year);
    for (const r of rows) { const k = r.first+" "+r.last; if (seen.has(k)) continue; seen.add(k); out.push(r); if (out.length>=5) break; }
    return out;
  }
  // Comps table for ONE client, rendered on his player page (the Our Clients list stays
  // flat; this is part of the "ton of information" behind the row click).
  function compsTableHtml(c) {
    const comp = c.comp; if (!comp) return `<div class="placeholder">Unranked — no comp profile.</div>`;
    if (!DATA.slotHistory.length) { loadSlotHistory(); return `<div class="placeholder">Loading historical signings…</div>`; }
    const curated = DRAFT_COMPS[c.key];
    const rows = curated ? curated.map(n=>slotSign(n)).filter(Boolean) : autoComps(comp);
    const rowsH = rows.map(r=>`<tr>
        <td class="cmp-nm">${r.full || (r.first+" "+r.last)}</td>
        <td>${r.pos}</td><td>${r.bats&&r.throws?`${r.bats}/${r.throws}`:"—"}</td>
        <td>${fmtHtWt(r)}</td>
        <td>${compAge(r.born, r.year)??"—"}</td>
        <td class="cmp-dr"><b>${r.year}</b><br><span>${roundLabel(r.round)} · #${r.overall} · ${r.team}</span></td>
        <td class="cmp-bn">${r.bonus!=null?fmt$(r.bonus):"—"}${r.diff!=null?`<br><span class="tg ${r.diff>0?'over':r.diff<0?'under':'fit'}" style="font-size:9px">${r.diff>0?"+":""}${fmtM(r.diff)} vs slot</span>`:""}</td>
      </tr>`).join("");
    const wd = rows.filter(r=>r.bonus!=null);
    const lo = wd.length?Math.min(...wd.map(r=>r.bonus)):null, hi = wd.length?Math.max(...wd.map(r=>r.bonus)):null;
    const avg = wd.length ? wd.reduce((s,r)=>s+r.bonus,0)/wd.length : null;
    return `
      <table class="cmp-table"><thead><tr><th>Player</th><th>Pos</th><th>B/T</th><th>HT / WT</th><th>Age</th><th>Drafted</th><th>Bonus</th></tr></thead>
      <tbody>
        <tr class="cmp-us"><td class="cmp-nm">${c.name}</td><td>${comp.pos}</td><td>${fmtBT(comp)}</td><td>${fmtHtWt(comp)}</td><td>${fmtAge(comp.age)||"—"}</td>
          <td class="cmp-dr"><b>2026</b><br><span>TBD${comp.rank?` · ranked #${comp.rank}`:""}</span></td><td class="cmp-bn">—</td></tr>
        ${rowsH || `<tr><td colspan="7"><div class="placeholder">No comps found for this profile.</div></td></tr>`}
      </tbody></table>
      <div class="cmp-foot">${curated?"Presented comps (already shared)":(()=>{const hd=handOf(comp), xp=compExactPos(comp);
        const hdTxt = !hd ? "" : hd.field==="throws" ? ` × ${hd.side==="L"?"lefty":"righty"} (throws)`
          : hd.side==="S" ? " · switch-hitters preferred" : ` · ${hd.side}HH preferred`;
        return `Auto comps — same level × ${xp||"position"}${hdTxt}, drafted nearest his rank`;})()}${avg!=null?` · comp bonuses ${fmtM(lo)}–${fmtM(hi)} · avg <b>${fmt$(Math.round(avg))}</b>`:""}</div>`;
  }

  // Historical precedent search over the FULL 2018-25 slot-tracker database: same-profile
  // signings scored against a live context lens (pick band, $ band, team) — recency breaks ties.
  function precedentRows(comp, ctx) {
    const lvl = comp.level==="HS" ? "HS" : "College", grp = comp.posGroup || posGroupOf(comp.pos);
    const rows = DATA.slotHistory.filter(r => r.bonus!=null && r.level===lvl && r.group===grp);
    const score = (r) => {
      let s = 0;
      if (ctx.pickLo!=null) s += (r.overall>=ctx.pickLo && r.overall<=ctx.pickHi) ? 0
        : Math.min(Math.abs(r.overall-ctx.pickLo), Math.abs(r.overall-ctx.pickHi));
      if (ctx.amtLo!=null) { const m=(ctx.amtLo+ctx.amtHi)/2;
        s += (r.bonus>=ctx.amtLo && r.bonus<=ctx.amtHi) ? 0 : Math.abs(r.bonus-m)/m*30; }
      if (ctx.teamName && r.team===ctx.teamName) s -= 25;   // same-team precedent is gold
      return s;
    };
    return rows.map(r=>({r, s:score(r)})).sort((a,b)=> a.s-b.s || b.r.year-a.r.year)
      .slice(0,5).map(x=>x.r);
  }

  // Emerging context — as the draft develops, what's the reasonable HISTORICAL precedent for
  // this client given the live situation: logged offers, his strike window, prospective team
  // fits. Presented comps are highlighted when they "pop" into the current context.
  function renderEmerging(state, c, comp) {
    const lvl = comp.level==="HS" ? "HS" : "College", grp = comp.posGroup || posGroupOf(comp.pos);
    const last = tcInitialName(c.name).split(" ").slice(-1)[0];
    const presented = new Set((DRAFT_COMPS[c.key]||[]).map(normName));
    const teamNameOf = (ab) => (state.picks.find(p=>p.team===ab)||{}).teamName || null;
    const cap = intelFor(c.key);
    let h = "";

    // Upcoming opportunities in his talent window (also feeds the fit lens below).
    const dpk = state.picks.find(p=>p.isDrafted && normName(p.player||"")===c.key);
    const ops = [];
    if (!dpk) for (const p of state.picks) {
      if (p.isDrafted) continue;
      if (p.overall < comp.rank-7 || p.overall > comp.rank+45) continue;
      const team = p.team, o = DATA.orgs[team] || {};
      const intel = intelColorRank(c.key, team) <= 1 && tiInPlayAt(c.key, team, p.overall);
      const lvlLean = lvl==="HS" ? (o.hsPct!=null && o.hsPct>=30) : (o.collegePct!=null && o.collegePct>=75);
      const posLean = isPitcher(comp.pos) ? (o.earlyPitcherPct!=null && o.earlyPitcherPct>=55)
                                          : (o.earlyPitcherPct!=null && o.earlyPitcherPct<=45);
      const pool = state.poolsMap[team];
      const money = pool ? pool.room >= negBonus(comp, p.slot, p.overall) : true;
      const habit = lvlLean && posLean && money && tiInPlayAt(c.key, team, p.overall);
      if (intel || habit) ops.push({ p, intel, why: intel ? (habit?"intel + habit":"live intel") : "habit + $" });
      if (ops.length >= 6) break;
    }

    // Assemble context lenses (priority: drafted > offers > window > fits > rank fallback).
    const contexts = [];
    if (dpk) {
      contexts.push({ title:`Drafted lens · #${dpk.overall} ${dpk.team}`,
        ctx:{ pickLo:Math.max(1,dpk.overall-8), pickHi:dpk.overall+8, teamName:dpk.teamName||teamNameOf(dpk.team) } });
    } else {
      for (const o of (cap?.offers||[]).slice(0,2)) {
        const loA = o.lo!=null ? o.lo : (o.amount!=null ? o.amount*0.8 : null);
        const hiA = o.hi!=null ? o.hi : (o.amount!=null ? o.amount*1.2 : null);
        if (loA==null) continue;
        contexts.push({ title:`Offer lens · ${o.team||"?"} · ${o.amount!=null?fmtM(o.amount):`${fmtM(o.lo)}–${fmtM(o.hi)}`}`,
          ctx:{ amtLo:loA, amtHi:hiA, teamName:teamNameOf(o.team) } });
      }
      const win = cap?.window || RANGES[c.key];
      if (win && (win.lo || win.hi)) {
        const wl = win.lo||1, wh = win.hi||(win.lo+20);
        contexts.push({ title:`Range lens · #${wl}–#${wh}`, ctx:{ pickLo:wl, pickHi:wh } });
      }
      for (const x of ops.filter(o=>o.intel).slice(0, 2 - Math.min(1, contexts.length))) {
        contexts.push({ title:`Fit lens · ${x.p.team} at #${x.p.overall}`,
          ctx:{ pickLo:Math.max(1,x.p.overall-8), pickHi:x.p.overall+8, teamName:x.p.teamName||teamNameOf(x.p.team) } });
      }
    }
    if (!contexts.length) contexts.push({ title:`Rank lens · around #${comp.rank}`,
      ctx:{ pickLo:Math.max(1,comp.rank-10), pickHi:comp.rank+10 } });

    // Render precedent blocks — pop-highlight presented comps that surface naturally.
    for (const blk of contexts.slice(0,3)) {
      const rows = precedentRows(comp, blk.ctx);
      const pops = rows.filter(r=>presented.has(normName(r.full || (r.first+" "+r.last))));
      h += `<div class="cmp-emh">Historical precedent — ${blk.title}</div>`;
      if (pops.length) h += `<div class="cmp-popnote">★ Presented comp pops here: <b>${pops.map(r=>r.full||(r.first+" "+r.last)).join(", ")}</b></div>`;
      h += rows.length ? rows.map(r=>{
        const pop = presented.has(normName(r.full || (r.first+" "+r.last)));
        return `<div class="cmp-em-row ${pop?'cmp-pop':''}">
          <span class="rr-no">'${String(r.year).slice(2)}</span>
          <span class="cmp-em-nm">${r.full||(r.first+" "+r.last)}${pop?' <span class="cmp-popbadge">★ presented</span>':''}</span>
          <span class="cmp-em-meta">${r.pos} · #${r.overall} · ${r.team}</span>
          <span class="cmp-em-val">${fmt$(r.bonus)}${r.diff!=null?` <span class="tg ${r.diff>0?'over':r.diff<0?'under':'fit'}">${r.diff>0?"+":""}${fmtM(r.diff)} vs slot</span>`:""}</span></div>`;
      }).join("") : `<div class="placeholder">No same-profile precedent in this context.</div>`;
    }
    if (dpk) {
      const deb = effectiveBonus(dpk);
      return h + `<div class="cmp-foot">${last} drafted #${dpk.overall} by ${dpk.team}${deb.bonus!=null?` · ${fmtM(deb.bonus)}`:""} — precedent above frames the signing conversation.</div>`;
    }

    h += `<div class="cmp-emh">Emerging opportunities — where ${last} could land <span class="exp-hint">live intel + team-habit fits in his window · click for the team card</span></div>`;
    h += ops.length ? ops.map(x=>`<div class="cmp-em-row" onclick="expandPick(${x.p.overall})">
        <span class="rr-no">#${x.p.overall}</span>${teamLogo(x.p.team,14)}<span class="cmp-em-tm">${x.p.team}</span>
        <span class="cmp-em-nm">${x.p.slot>0?fmtM(x.p.slot):"—"}</span>
        <span class="cmp-em-meta">${roundLabel(x.p.round)}</span>
        <span class="cmp-em-val"><span class="tg ${x.why.includes("intel")?"over":"late"}">${x.why}</span></span></div>`).join("")
      : `<div class="placeholder">No open picks in his window fit yet.</div>`;
    return h;
  }
  // Readable text color for a filled intel-color card.
  function textOn(hex) {
    const h=(hex||"").replace("#",""); if (h.length<6) return "#111";
    const r=parseInt(h.slice(0,2),16), g=parseInt(h.slice(2,4),16), b=parseInt(h.slice(4,6),16);
    return (0.299*r+0.587*g+0.114*b)/255 > 0.62 ? "#111" : "#fff";
  }

  // Dropdown multi-select. Empty selection = "Big Board" (every pick shows its full in-play
  // cluster). One selected → full-color heat board; 2+ → filtered dots. Clicking items keeps
  // the menu open (multi-select); it closes on outside-click.
  function renderBoardPlayers(state) {
    const el = $("boardPlayers"); if (!el) return;
    const sel = boardSelClients, bigOn = sel.size===0;
    const drafted = new Set(state.picks.filter(p=>p.isDrafted&&p.player).map(p=>normName(p.player)));
    const clients = DATA.clientList.filter(c=>c.comp).sort((a,b)=>a.comp.rank-b.comp.rank);
    const value = bigOn ? "All" : `${sel.size} player${sel.size>1?"s":""}`;
    const big = `<div class="pdrop-item ${bigOn?'on':''}" onclick="clearBoardClients(event)">
      <span class="pi-ck">${bigOn?'☑':'☐'}</span><span class="pi-nm">▦ Big Board (all)</span></div><div class="pdrop-sep"></div>`;
    const list = clients.map(c=>{
      const dr=drafted.has(c.key), on=sel.has(c.key);
      return `<div class="pdrop-item ${on?'on':''} ${dr?'dr':''}" onclick="toggleBoardClient('${c.key.replace(/'/g,"\\'")}',event)">
        <span class="pi-ck">${on?'☑':'☐'}</span><span class="pi-nm">${c.name}</span><span class="pi-rk">#${c.comp.rank}</span></div>`;
    }).join("");
    el.innerHTML = `<div class="pdrop">
        <button class="pdrop-btn" onclick="togglePlayerMenu(event)">
          <span class="pdrop-txt"><span class="pdrop-t">Players</span><span class="pdrop-v ${bigOn?'':'sel'}">${value}</span></span>
          <span class="caret">▾</span></button>
        <div class="pdrop-menu" style="display:${playerMenuOpen?'block':'none'}">${big}${list}</div>
      </div>`;
    // Selected players' last names inline in the toolbar's open space.
    const names = clients.filter(c=>sel.has(c.key)).map(c=>(c.name||"").trim().split(/\s+/).pop());
    const sn = $("boardSelNames"); if (sn) sn.textContent = names.join(", ");
  }
  window.togglePlayerMenu = (e) => { if(e) e.stopPropagation(); playerMenuOpen = !playerMenuOpen; renderBoardPlayers(currentState); };
  document.addEventListener("click", (e) => {
    if (playerMenuOpen && !(e.target.closest && e.target.closest(".pdrop"))) { playerMenuOpen = false; renderBoardPlayers(currentState); }
  });
  window.toggleBoardClient = (key, e) => {
    if (e) e.stopPropagation();
    if (boardSelClients.has(key)) boardSelClients.delete(key); else boardSelClients.add(key);
    renderBoard(currentState);
  };
  window.clearBoardClients = (e) => { if (e) e.stopPropagation(); boardSelClients.clear(); renderBoard(currentState); };

  // The dot cluster for one undrafted pick: {key,name,rank,hex} per player to show.
  // Teamintel-only (no heat scores): Big Board mode → every client with live green/light-green
  // teamintel for this team who is in play at THIS pick (sv-teamintel checkboxes + our rule-outs).
  // Focus mode → the selected clients, any logged color, still gated by per-pick in-play.
  function pickDots(pk, state) {
    const team = pk.team, sel = boardSelClients;
    const mk = (c) => ({ key:c.key, name:c.name, rank:intelColorRank(c.key,team), hex:intelColorHex(c.key,team) });
    let entries;
    if (sel.size===0) entries = tiClientsAt(pk, state).map(mk);
    else entries = [...sel].map(k=>DATA.clientList.find(c=>c.key===k)).filter(c=>c&&c.comp)
      .filter(c => intelColorRank(c.key,team)<5 && tiInPlayAt(c.key, team, pk.overall))
      .map(mk);
    return entries.sort((a,b)=> a.rank-b.rank || a.name.localeCompare(b.name));
  }

  function renderBoardGrid(state) {
    const svOnly = $("bSv").checked, focus = boardSelClients.size>0, CAP = 6;
    // Exactly one player selected → full intel-color "heat" board around that player.
    const single = boardSelClients.size===1 ? [...boardSelClients][0] : null;
    const singleC = single ? DATA.clientList.find(c=>c.key===single) : null;
    // One continuous flex grid; full-width round headers force a wrap. Dedupe by
    // round so interleaved comp/PPI picks don't re-emit "Round 1" repeatedly.
    let html = `<div class="board-grid">`;
    const seenRounds = new Set();
    for (const p of state.picks) {
      const ours = p.isDrafted && DATA.clients.has(normName(p.player||""));
      if (svOnly && !ours) continue;
      if (!seenRounds.has(p.round)) { seenRounds.add(p.round); html += `<div class="bc-rnd">${roundLabel(p.round)}</div>`; }
      const onclock = state.onClock && state.onClock.overall === p.overall;
      let cardCls = `bcard ${ours?"sv":""} ${onclock?"oc":""}`, dotsHtml = "", body, cardStyle = "";
      if (p.isDrafted) {
        // Selected player: one line per vital — position, school (denotes level), agency,
        // bonus, slot diff. No hometown on tiles.
        body = (p.player||"—") + (ours?' <span class="svtag">SV</span>':"");
        const comp = DATA.compByName.get(normName(p.player||""));
        const eb = effectiveBonus(p);
        // mobile tiles are rows, not columns — meta joins onto one line, money onto another
        const metaParts = [p.pos, schoolShort(comp?.school || p.school), comp?.agent].filter(Boolean);
        const lines = MOBILE.matches
          ? (metaParts.length ? [`<div class="bc-meta">${metaParts.join(" · ")}</div>`] : [])
          : metaParts.map(v=>`<div class="bc-meta">${v}</div>`);
        if (eb.bonus!=null && (p.bonus!=null || eb.src)) {   // facts only on tiles — no model estimates
          const amt = `${fmtM(eb.bonus)}${eb.src?` <span class="bc-src">${eb.src==="confirmed"?"✓":eb.src.slice(0,3)}</span>`:""}`;
          const ou = p.slot>0 ? eb.bonus-p.slot : null;
          const tag = ou!=null ? `<span class="tg ${ou>50000?'over':ou<-50000?'under':'fit'}">${ou>50000?"+":""}${Math.abs(ou)>50000?fmtM(ou)+" vs slot":"at slot"}</span>` : "";
          if (MOBILE.matches) lines.push(`<div class="bc-bonus">${amt}${tag?` ${tag}`:""}</div>`);
          else { lines.push(`<div class="bc-bonus">${amt}</div>`); if (tag) lines.push(`<div class="bc-bonus">${tag}</div>`); }
        }
        dotsHtml = lines.join("");
      } else if (single) {
        // Full-color heat card for the one selected player — mirrors the sv-teamintel Draft Card:
        // a pick unchecked there (not in play) paints RED regardless of the team's intel color.
        const team = p.team, rank = intelColorRank(single, team);
        const inPlay = tiInPlayAt(single, team, p.overall);
        if (rank>=5 && inPlay) { cardCls += " bc-dim"; body = onclock ? "⏱ OTC" : "—"; }
        else {
          const hex = inPlay ? intelColorHex(single, team) : COLOR_HEX.red, txt = textOn(hex);
          const f = singleC && singleC.comp ? fit(singleC.comp, team, single, state) : null;
          cardCls += " bc-heat"; cardStyle = ` style="background:${hex};color:${txt}"`;
          body = onclock ? "⏱ OTC" : "";
          dotsHtml = `<div class="bc-heatlab">${f?`<span class="grade" data-org="${team}" style="background:rgba(255,255,255,.9);color:#111">${f.grade}</span>`:""}${contactBadges(single,team)}</div>`;
        }
      } else {
        const entries = pickDots(p, state), shown = entries.slice(0, CAP);
        if (focus && !entries.length) cardCls += " bc-dim";
        if (shown.length) dotsHtml = `<div class="bc-dots">${shown.map(e=>
          `<span class="bc-pd" data-intel-key="${e.key}" data-intel-team="${p.team}"><span class="idot" style="background:${e.hex}"></span><span class="bc-in">${initials(e.name)}</span></span>`
        ).join("")}${entries.length>CAP?`<span class="bc-more">+${entries.length-CAP}</span>`:""}</div>`;
        body = onclock ? "⏱ OTC" : (shown.length ? "" : "—");
      }
      const onclick = p.isDrafted ? `openPlayer('${normName(p.player||"").replace(/'/g,"\\'")}')` : `expandPick(${p.overall})`;
      const expSel = cardPick===p.overall ? " expanded" : "";
      const land = landOverall===p.overall && Date.now()<landUntil ? " bc-land" : "";
      html += `<div class="${cardCls.trim().replace(/\s+/g," ")}${expSel}${land}"${cardStyle} data-overall="${p.overall}" ${onclock?'id="ocRow"':""} onclick="${onclick}">
        <div class="bc-no">#${p.overall}</div>
        <div class="bc-team">${teamLogo(p.team,15)}${p.team||"—"}</div>
        <div class="bc-slot">${p.slot>0?fmtM(p.slot):"—"}</div>
        <div class="bc-player">${body}</div>${dotsHtml}</div>`;
    }
    html += `</div>`;
    $("boardList").innerHTML = html === `<div class="board-grid"></div>` ? `<div class="placeholder">No picks.</div>` : html;
  }

  // Right-hand running pick feed: every pick in order, live/upcoming state, click to focus.
  function renderBoardFeed(state) {
    const el = $("boardFeed"); if (!el) return;
    let rows = "", lastRound = null;
    for (const p of state.picks) {
      if (p.round !== lastRound) { lastRound = p.round; rows += `<div class="feed-rnd">${roundLabel(p.round)}</div>`; }
      const ours = p.isDrafted && DATA.clients.has(normName(p.player||""));
      const onclock = state.onClock && state.onClock.overall === p.overall;
      const comp = p.isDrafted ? DATA.compByName.get(normName(p.player||"")) : null;
      let cls = "feed-row", who, sub;
      if (p.isDrafted) {
        who = p.player || "—";
        sub = [p.pos, comp?.agent, schoolShort(comp?.school || p.school)].filter(Boolean).join(" · ");
        if (ours) cls += " sv";
      } else if (onclock) { cls += " oc"; who = "On the clock"; sub = "● NOW"; }
      else { cls += " up"; who = "Upcoming"; sub = ""; }
      const onclick = p.isDrafted ? `openPlayer('${normName(p.player||"").replace(/'/g,"\\'")}')` : `expandPick(${p.overall})`;
      // Drafted rows show known money only (official > confirmed > reported/estimated log) —
      // model estimates stay off the feed; they surface as the suggestion in the entry form.
      let val = p.slot>0?fmtM(p.slot):"—";
      if (p.isDrafted) {
        const eb = effectiveBonus(p);
        if (eb.bonus!=null && (p.bonus!=null || eb.src)) val = `${fmtM(eb.bonus)}${eb.src?` <span class="fr-src">${eb.src==="confirmed"?"✓":eb.src.slice(0,3)}</span>`:""}`;
      }
      rows += `<div class="${cls}" onclick="${onclick}">
        <span class="fr-no">#${p.overall}</span><span class="fr-tm">${teamLogo(p.team,16)}${p.team||"—"}</span>
        <div class="fr-body"><div class="fr-who">${who}${ours?' <span class="svtag">SV</span>':""}</div>${sub?`<div class="fr-sub">${sub}</div>`:""}</div>
        <span class="fr-val">${val}</span></div>`;
    }
    el.innerHTML = `<div class="feed-hd"><span class="live"></span>Live Pick Feed</div><div class="feed-scroll">${rows}</div>`;
  }

  function jumpCurrent() { document.getElementById("ocRow")?.scrollIntoView({ block:"center", behavior:"smooth" }); }
  // ---------- VIEW: BONUS POOLS ----------
  const POOL_COLS = [["team","Team"],["pool","Pool"],["picksMade","Picks"],["committedSlot","Committed slot"],
                     ["poolCharge","Spent"],["overUnder","Over/Under"],["room","Room"],["overage","Overage"],["pctNum","%"]];
  let poolSort = { key:"pctNum", dir:-1 };   // dir: -1 desc, 1 asc
  window.sortPools = (key) => {
    if (poolSort.key === key) poolSort.dir *= -1;
    else poolSort = { key, dir: key==="team" ? 1 : -1 };
    renderPools();
  };
  function renderPools() {
    if (!currentState) return;
    $("poolHead").innerHTML = "<tr>" + POOL_COLS.map(([k,label]) => {
      const arrow = poolSort.key===k ? (poolSort.dir<0 ? " ▾" : " ▴") : "";
      const cls = (k==="picksMade"||k==="committedSlot") ? "hide-sm" : "";
      return `<th class="sortable ${cls}" onclick="sortPools('${k}')">${label}${arrow}</th>`;
    }).join("") + "</tr>";
    const { key, dir } = poolSort;
    const pools = currentState.pools.slice().sort((a,b) =>
      key==="team" ? dir*a.team.localeCompare(b.team) : dir*(((a[key]??0)) - ((b[key]??0))));
    $("poolNote").textContent = currentState.poolsEst
      ? "Spent is estimated from the model until signing bonuses are reported"
      : `${currentState.madeCount} picks in`;
    // phone columns are narrow — compact money ("$9.25M") and a signed over/under badge
    const money = MOBILE.matches ? fmtM : fmt$;
    const ou = MOBILE.matches ? (n => !n ? "slot" : (n>0?"+":"−")+fmtM(Math.abs(n))) : fmtOU;
    $("poolBody").innerHTML = pools.map(t => {
      const ouCls = t.overUnder>50000 ? "over" : t.overUnder<-50000 ? "under" : "atslot";
      const pctCls = t.pctNum>=4.8 ? "over" : t.pctNum<0 ? "under" : "atslot";
      return `<tr class="clickable" onclick="openTeam('${t.team}')">
        <td><b>${t.team}</b></td>
        <td>${money(t.pool)}</td>
        <td class="hide-sm">${t.picksMade}/${t.picksTotal}</td>
        <td class="hide-sm">${money(t.committedSlot)}</td>
        <td>${money(t.poolCharge)}${t.hasEst?' <span class="outag est atslot">est</span>':""}</td>
        <td><span class="outag ${ouCls}">${ou(t.overUnder)}</span></td>
        <td>${money(t.room)}</td>
        <td>${money(t.overage)}</td>
        <td><span class="outag ${pctCls}">${t.pctNum>=0?"+":""}${t.pctNum.toFixed(1)}%</span></td>
      </tr>`;
    }).join("");
  }

  // ---------- DETAIL: player / team drill-down ----------
  const teamUpcoming = (state, t) => state.picks.filter(p => p.team===t && !p.isDrafted).sort((a,b)=>a.overall-b.overall);
  const teamMade = (state, t) => state.picks.filter(p => p.team===t && p.isDrafted).sort((a,b)=>a.overall-b.overall);

  const pctOf = (arr,p) => { if(!arr.length) return null; const s=arr.slice().sort((a,b)=>a-b); return s[Math.min(s.length-1, Math.max(0, Math.round(p*(s.length-1))))]; };

  // ---------- LIVE INTEL CAPTURE (Supabase via /api/intel) ----------
  let INTEL = { events: [], byKey: new Map(), loadedAt: 0 };
  let armed = null;   // inline capture form currently open: { key, name, kind }
  const agentName = () => { try { return localStorage.getItem("dd:agent") || ""; } catch (e) { return ""; } };
  window.setAgent = (v) => { try { localStorage.setItem("dd:agent", v||""); } catch (e) {} renderActive(); };

  async function loadIntel() {
    try {
      const r = await fetch("/api/intel", { cache:"no-store" });
      if (!r.ok) throw new Error(r.status);
      const d = await r.json();
      INTEL.events = Array.isArray(d.events) ? d.events : [];
      INTEL.loadedAt = Date.now();
      deriveIntel();
      renderActive();
    } catch (e) { /* best-effort; keep prior state */ }
  }
  // Collapse the append-only log into current state per player key (events come newest-first).
  function deriveIntel() {
    const byKey = new Map();
    for (const ev of INTEL.events) {
      const key = normName(ev.player_name||""); if (!key) continue;
      let s = byKey.get(key);
      if (!s) { s = { interest:new Map(), ruleOuts:[], window:null, offers:[], bonuses:[], events:[] }; byKey.set(key, s); }
      s.events.push(ev);
      const team = ev.team || null;
      if (ev.kind==="interest_sought" || ev.kind==="interest_received") {
        const mk = (team||"") + "|" + ev.kind;
        if (!s.interest.has(mk)) s.interest.set(mk, { team, dir: ev.kind==="interest_sought"?"sought":"received", strength: ev.strength, color: ev.color, date: ev.created_at });
      } else if (ev.kind==="rule_out" && ev.status==="active") {
        s.ruleOuts.push({ team, pick: ev.pick_overall, date: ev.created_at });
      } else if (ev.kind==="strike_window" && ev.status==="active") {
        if (!s.window) s.window = { lo: ev.window_lo, hi: ev.window_hi, date: ev.created_at };
      } else if (ev.kind==="offer") {
        s.offers.push({ team, type: ev.offer_type, amount: ev.amount, lo: ev.amount_lo, hi: ev.amount_hi, pick: ev.pick_overall, status: ev.status, date: ev.created_at });
      } else if (ev.kind==="bonus") {                   // reported/confirmed/estimated signing bonus (newest first)
        s.bonuses.push({ team, kind: ev.offer_type||"reported", amount: ev.amount, pick: ev.pick_overall, note: ev.note, date: ev.created_at });
      } else if (ev.kind==="medical") {                 // newest-first, so first seen wins
        if (s.medical===undefined) s.medical = ev.note || "unknown";
      } else if (ev.kind==="range") {
        if (s.range===undefined) s.range = (ev.window_lo || ev.window_hi) ? { lo: ev.window_lo, hi: ev.window_hi } : null;
      }
    }
    INTEL.byKey = byKey;
    // Overlay shared settings onto local caches so medical/range sync across the war room.
    // (shared wins; local-only values not present in the feed are left intact)
    for (const [key, s] of byKey) {
      if (s.medical!==undefined) { if (s.medical && s.medical!=="unknown") MEDICALS[key]=s.medical; else delete MEDICALS[key]; }
      if (s.range!==undefined) { if (s.range) RANGES[key]=s.range; else delete RANGES[key]; }
    }
    try { localStorage.setItem("dd:medicals", JSON.stringify(MEDICALS)); localStorage.setItem("dd:ranges", JSON.stringify(RANGES)); } catch (e) {}
  }
  const intelFor = (key) => INTEL.byKey.get(key) || null;
  // Best-known signing bonus for a player, across war-room captures AND the teamintel feed:
  // any confirmed beats any rumor; within a tier, war-room capture wins.
  function bonusFor(key) {
    const s = intelFor(key);
    const logged = s && s.bonuses && s.bonuses.length
      ? (s.bonuses.find(b=>b.kind==="confirmed" && b.amount!=null) || s.bonuses.find(b=>b.amount!=null) || null) : null;
    const feed = DATA.feedBonuses ? (DATA.feedBonuses.get(key) || null) : null;
    if (logged && feed) return (feed.kind==="confirmed" && logged.kind!=="confirmed") ? feed : logged;
    return logged || feed || null;
  }

  async function postIntel(ev, silent) {
    ev.agent = ev.agent || agentName() || "console";
    try {
      const r = await fetch("/api/intel", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(ev) });
      if (!r.ok) throw new Error(await r.text());
      await loadIntel();
      return true;
    } catch (e) { if (!silent) alert("Could not save intel: " + e.message); return false; }
  }

  // ---------- VIEW: BOARD — team-card modal (opens on a board tile click) ----------
  const pickByOverall = (state, ov) => (state.picks||[]).find(p=>p.overall===ov) || null;
  window.expandPick = (ov) => openTeamCard(ov);
  window.openTeamCard = (ov) => {
    if (TV && !tvShowCard) return;   // TV screens stay a passive market map by default
    const st = currentState; if (!st) return;
    const pk = pickByOverall(st, ov); if (!pk || pk.isDrafted) return;
    cardPick = ov; armed = null; tcMenuOpen = false; tcNavMenu = null; tcRangeMode = "profile";
    // Team-profile mode by default — but a board filtered to a player opens on him
    // (renderTeamCard drops the preselect if he's not on the card's roster).
    evalPlayer = null;
    if (boardSelClients.size) {
      const drafted = new Set(st.picks.filter(p=>p.isDrafted&&p.player).map(p=>normName(p.player)));
      evalPlayer = [...boardSelClients].find(k=>!drafted.has(k)) || null;
    }
    loadSlotHistory();   // lazy-load historical signings for Q4 (no-op once cached)
    renderTeamCard(st);
    const bd = $("teamCard"); if (bd) { bd.classList.add("on"); bd.scrollTop = 0; }
    document.body.style.overflow = "hidden";
  };
  window.closeTeamCard = () => {
    cardPick = null; evalPlayer = null; armed = null; tcMenuOpen = false; tcNavMenu = null;
    if (tcAdvance) { clearTimeout(tcAdvance.timer); tcAdvance = null; }
    const bd = $("teamCard"); if (bd) { bd.classList.remove("on"); bd.innerHTML = ""; }
    document.body.style.overflow = "";
  };
  window.closeExpand = () => window.closeTeamCard();   // legacy alias
  // Retarget the open card to another undrafted pick (drafted picks can't render here).
  // evalPlayer intentionally survives so a selected player stays under evaluation while
  // stepping across picks (renderTeamCard drops it only if he's off the new roster).
  function goCardPick(ov, keepNavMenu) {
    const st = currentState; if (!st) return;
    const pk = pickByOverall(st, ov); if (!pk || pk.isDrafted) return;
    cardPick = ov; armed = null; tcMenuOpen = false; tcRangeMode = "profile";
    tcNavMenu = keepNavMenu || null;
    if (tcAdvance) { clearTimeout(tcAdvance.timer); tcAdvance = null; }
    renderTeamCard(st);
    const bd = $("teamCard"); if (bd) bd.scrollTop = 0;
  }
  // Step to the adjacent undrafted pick
  window.navCardPick = (dir) => {
    const st = currentState; if (!st || cardPick==null) return;
    const up = st.picks.filter(p=>!p.isDrafted).sort((a,b)=>a.overall-b.overall);
    const i = up.findIndex(p=>p.overall===cardPick);
    const tgt = i<0 ? null : up[i+dir];
    if (tgt) goCardPick(tgt.overall);
  };
  window.toggleTcNavMenu = (which, e) => { if (e) e.stopPropagation(); tcNavMenu = tcNavMenu===which?null:which; renderTeamCard(currentState); };
  // Round jump lands on the round's first available pick and opens the pick list
  // so the selecting team can be chosen in the same motion.
  window.tcNavGoRound = (r, e) => {
    if (e) e.stopPropagation();
    const st = currentState; if (!st) return;
    const tgt = st.picks.filter(p=>!p.isDrafted && String(p.round)===String(r)).sort((a,b)=>a.overall-b.overall)[0];
    if (tgt) goCardPick(tgt.overall, "pick");
  };
  window.tcNavGoPick = (ov, e) => { if (e) e.stopPropagation(); goCardPick(ov); };
  window.selectEval = (key, e) => { if (e) e.stopPropagation(); evalPlayer = key || null; armed = null; tcMenuOpen = false; tcRangeMode = "profile"; renderTeamCard(currentState); };
  window.toggleTcMenu = (e) => { if (e) e.stopPropagation(); tcMenuOpen = !tcMenuOpen; renderTeamCard(currentState); };
  document.addEventListener("click", (e) => {
    if (tcMenuOpen && cardPick!=null && !(e.target.closest && e.target.closest(".tc-pdrop"))) { tcMenuOpen = false; renderTeamCard(currentState); }
    if (tcNavMenu && cardPick!=null && !(e.target.closest && e.target.closest(".tc-nav"))) { tcNavMenu = null; renderTeamCard(currentState); }
  });
  window.armAction = (key, name, kind) => { armed = { key, name, kind }; cardPick!=null ? renderTeamCard(currentState) : renderBoard(currentState); };
  window.cancelArmed = () => { armed = null; cardPick!=null ? renderTeamCard(currentState) : renderBoard(currentState); };
  window.quickRuleOut = (key, name, team, overall) => {
    postIntel({ kind:"rule_out", player_name:name, team, pick_overall:overall, status:"active", note:"ruled out at slot" });
  };
  window.saveArmed = (team, overall) => {
    if (!armed) return;
    const k = armed.kind, ev = { kind:k, player_name:armed.name, team };
    const val = (id) => { const el=$(id); return el ? el.value : ""; };
    if (k==="interest_received" || k==="interest_sought") {
      ev.strength = parseInt(val("afStrength"),10); ev.color = val("afColor")||null; ev.note = val("afNote")||null;
    } else if (k==="strike_window") {
      ev.window_lo = parseInt(val("afLo"),10)||null; ev.window_hi = parseInt(val("afHi"),10)||null; ev.note = val("afNote")||null;
    } else if (k==="offer") {
      ev.offer_type = val("afType")||"formal"; ev.pick_overall = overall;
      if (ev.offer_type==="range") { ev.amount_lo = parseFloat(val("afLoAmt"))||null; ev.amount_hi = parseFloat(val("afHiAmt"))||null; }
      else { ev.amount = parseFloat(val("afAmount"))||null; }
      ev.note = val("afNote")||null;
    } else if (k==="bonus") {
      ev.offer_type = val("afBonusKind")||"reported"; ev.amount = parseFloat(val("afAmount"))||null;
      ev.pick_overall = parseInt(val("afPick"),10)||null; ev.note = val("afNote")||null;
    }
    armed = null; postIntel(ev);   // loadIntel() -> renderActive() refreshes the open card
  };

  // "Roch Cholowsky" -> "R. Cholowsky" for compact chips
  function tcInitialName(name) {
    const parts = (name||"").trim().split(/\s+/);
    return parts.length < 2 ? (name||"") : parts[0][0] + ". " + parts.slice(1).join(" ");
  }
  // Tiny inline-SVG line chart — no external lib, auto-scales y to the data range.
  // Each point is {v, hex}; segments are colored by the report's interest color at that time,
  // so the line literally shifts color (green→yellow→red…) as the signal changes over the window.
  function tcSparkline(points, fallback) {
    const W = 360, H = 90, pad = 7;
    if (!points || !points.length) return `<div class="placeholder" style="height:${H}px;display:flex;align-items:center;justify-content:center">No signal history.</div>`;
    let pts = points.map(p => (typeof p === "number") ? { v:p, hex:fallback } : p);
    if (pts.length === 1) pts = [pts[0], pts[0]];
    const vals = pts.map(p=>p.v);
    let lo = Math.min(...vals), hi = Math.max(...vals);
    if (hi === lo) { hi += 1; lo -= 1; }
    const n = pts.length;
    const x = i => pad + (i/(n-1))*(W-2*pad);
    const y = v => pad + (1-(v-lo)/(hi-lo))*(H-2*pad);
    const areaPts = `${pad.toFixed(1)},${(H-pad).toFixed(1)} ` + pts.map((p,i)=>`${x(i).toFixed(1)},${y(p.v).toFixed(1)}`).join(" ") + ` ${(W-pad).toFixed(1)},${(H-pad).toFixed(1)}`;
    let segs = "";
    for (let i=1;i<n;i++) segs += `<polyline points="${x(i-1).toFixed(1)},${y(pts[i-1].v).toFixed(1)} ${x(i).toFixed(1)},${y(pts[i].v).toFixed(1)}" fill="none" stroke="${pts[i].hex}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"></polyline>`;
    const dots = pts.map((p,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(p.v).toFixed(1)}" r="2.6" fill="${p.hex}"></circle>`).join("");
    return `<svg class="tc-spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <polyline points="${areaPts}" fill="${fallback}14" stroke="none"></polyline>
      ${segs}${dots}</svg>`;
  }
  const TC_TIER_COLORS = { DIRECTOR:"#7a1220", "ASST_DIRECTOR":"#c8102e", "CROSS_CHECKER":"#e8820e", CROSSCHECKER:"#e8820e", SCOUT:"#c9ccd1", GM:"#3949ab", MANUAL:"#9aa0a6" };
  const tcTierColor = (lbl) => TC_TIER_COLORS[(lbl||"").toUpperCase().replace(/[\s-]/g,"_")] || "#9aa0a6";

  // Landing fit for one player at one specific pick: is this a plausible slot for his talent,
  // and does the team's money work? Reuses the same reach window as clientsInPlay.
  function tcPickFit(comp, pick, state) {
    const rank = comp.rank;
    const early = pick.overall < rank - 7;      // reaching (taking him earlier than his value)
    const late  = pick.overall > rank + 45;     // he'd be a faller/steal — unlikely to last
    const bonus = negBonus(comp, pick.slot, pick.overall);
    const pool = state.poolsMap[pick.team];
    const moneyFits = pool ? pool.room >= bonus : true;
    let label, cls;
    if (early)          { label = "reach";     cls = "early"; }
    else if (late)      { label = "value";     cls = "late"; }
    else if (!moneyFits){ label = "over pool"; cls = "under"; }
    else                { label = "fits";      cls = "fit"; }
    return { reachOk: !early && !late, moneyFits, bonus, label, cls };
  }

  // The four fit drivers as compact bars (was the fit strip; now lives inside Team Intel).
  function tcDrivers(f) {
    const dcol = (v)=> v>=0.66?"#1a7f37":v>=0.4?"#e3b505":"#e8820e";
    const drivers = [["Interest", f.interestN], ["Org / dev", f.devN], ["Type", f.typeN], ["Money", f.moneyN]];
    return `<div class="tc-drivers">${drivers.map(([k,v])=>`<div class="tc-drv"><div class="dk">${k}</div><div class="db"><i style="width:${Math.round(v*100)}%;background:${dcol(v)}"></i></div></div>`).join("")}</div>`;
  }
  // The player's earliest realistic landing on this team (money-fitting pick preferred).
  function tcNextLanding(state, team, comp) {
    const up = teamUpcoming(state, team);
    return up.find(p => { const pf = tcPickFit(comp, p, state); return pf.reachOk && pf.moneyFits; })
        || up.find(p => tcPickFit(comp, p, state).reachOk) || null;
  }

  function renderTeamCard(state) {
    const bd = $("teamCard"); if (!bd || cardPick==null || !state) return;
    const pk = pickByOverall(state, cardPick);
    if (!pk) { closeTeamCard(); return; }
    // The open pick just got made — flash the selection, then advance to the next pick.
    if (pk.isDrafted) {
      if (!tcAdvance || tcAdvance.pick !== pk.overall) {
        if (tcAdvance) clearTimeout(tcAdvance.timer);
        tcAdvance = { pick: pk.overall, timer: setTimeout(() => {
          tcAdvance = null;
          const st = currentState;
          if (!st || cardPick !== pk.overall) return;
          const nxt = st.picks.filter(p=>!p.isDrafted && p.overall>pk.overall).sort((a,b)=>a.overall-b.overall)[0];
          if (nxt) goCardPick(nxt.overall); else closeTeamCard();
        }, 2000) };
      }
      const key = normName(pk.player||""), comp = DATA.compByName.get(key), ours = DATA.clients.has(key);
      const sub = [comp?comp.pos:(pk.pos||""), schoolShort(pk.school||(comp?comp.school:"")||""), pk.bonus!=null?fmtM(pk.bonus):""]
        .filter(Boolean).join(" · ");
      bd.innerHTML = `<div class="tc-card"><div class="tc-top">
          ${teamLogo(pk.team,30)}
          <span class="tc-abbr">${pk.team||"—"}</span>
          <span class="tc-ttl">Pick #${pk.overall} · ${pk.teamName||pk.team||""}</span>
          <span class="tc-live">● Pick made</span>
          <button class="tc-x" onclick="closeTeamCard()">✕</button></div>
        <div class="tc-made">
          ${teamLogo(pk.team,52)}
          <div class="tc-made-name">${pk.teamName||pk.team} selects <b>${pk.player||"—"}</b>${ours?' <span class="tk-sv">SV CLIENT</span>':''}</div>
          ${sub?`<div class="tc-made-sub">${sub}</div>`:""}
          <div class="tc-made-adv">advancing to the next pick…</div>
        </div></div>`;
      return;
    }
    if (tcAdvance) { clearTimeout(tcAdvance.timer); tcAdvance = null; }
    const team = pk.team, pool = state.poolsMap[team] || null, o = DATA.orgs[team] || {};
    const onClockHere = !!(state.onClock && state.onClock.overall === pk.overall);
    // Full roster of our undrafted clients, each scored against THIS team; in-play ones surface
    // first. "IN PLAY" = the teamintel rule: green/light-green + this pick not ruled out.
    const drafted = new Set(state.picks.filter(p=>p.isDrafted&&p.player).map(p=>normName(p.player)));
    const inPlayKeys = new Set(tiClientsAt(pk, state).map(c=>c.key));
    const roster = DATA.clientList.filter(c=>c.comp && !drafted.has(c.key)).map(c=>({
      c, f: fit(c.comp, team, c.key, state), inPlay: inPlayKeys.has(c.key)
    })).sort((a,b)=> (b.inPlay - a.inPlay) || (b.f.orgScore - a.f.orgScore));
    // evalPlayer null = team-profile mode; a set key = player-specific mode
    if (evalPlayer && !roster.some(x=>x.c.key===evalPlayer)) evalPlayer = null;
    const sel = evalPlayer ? (roster.find(x=>x.c.key===evalPlayer) || null) : null;

    // Round·pick navigator — steps through undrafted picks (the only ones this card can show)
    const navPicks = state.picks.filter(p=>!p.isDrafted);
    const navIdx = navPicks.findIndex(p=>p.overall===pk.overall);
    const hasPrev = navIdx > 0, hasNext = navIdx >= 0 && navIdx < navPicks.length-1;
    // Dropdowns off the round / pick numbers: round jumps rounds, pick lists that
    // round's remaining picks with the selecting team.
    const navRounds = [...new Set(navPicks.map(p=>String(p.round)))];
    let navMenu = "";
    if (tcNavMenu === "round") {
      navMenu = `<div class="pdrop-menu tc-nav-menu">${navRounds.map(r=>{
        const n = navPicks.filter(p=>String(p.round)===r).length;
        return `<div class="pdrop-item ${r===String(pk.round)?'on':''}" onclick="tcNavGoRound('${r}',event)">
          <span class="pi-nm">Round ${r}</span><span class="pi-rk">${n} pick${n===1?"":"s"} left</span></div>`;
      }).join("")}</div>`;
    } else if (tcNavMenu === "pick") {
      navMenu = `<div class="pdrop-menu tc-nav-menu">${navPicks.filter(p=>String(p.round)===String(pk.round)).map(p=>
        `<div class="pdrop-item ${p.overall===pk.overall?'on':''}" onclick="tcNavGoPick(${p.overall},event)">
          ${teamLogo(p.team,16)}<span class="pi-nm">Pick ${p.roundPick} <span class="pi-ovr">· #${p.overall} OVR</span></span><span class="pi-rk">${p.teamName||""}</span></div>`
      ).join("")}</div>`;
    }

    let h = `<div class="tc-card">`;
    h += `<div class="tc-top">
      ${teamLogo(team,30)}
      <span class="tc-abbr">${team||"—"}</span>
      <span class="tc-ttl">Pick #${pk.overall} · ${pk.teamName||team||""}</span>
      ${onClockHere?`<span class="tc-live">● On the clock</span>`:`<span class="tc-round">Round ${pk.round}</span>`}
      <div class="tc-nav">
        <button class="tc-nav-btn" onclick="navCardPick(-1)" ${hasPrev?"":"disabled"} title="Previous pick">‹</button>
        <span class="tc-nav-lbl">Round <button class="tc-nav-num ${tcNavMenu==='round'?'open':''}" onclick="toggleTcNavMenu('round',event)">${pk.round}<span class="nvc">▾</span></button><span class="sep">·</span>Pick <button class="tc-nav-num ${tcNavMenu==='pick'?'open':''}" onclick="toggleTcNavMenu('pick',event)">${pk.roundPick}<span class="nvc">▾</span></button></span>
        <button class="tc-nav-btn" onclick="navCardPick(1)" ${hasNext?"":"disabled"} title="Next pick">›</button>
        ${navMenu}
      </div>
      <button class="tc-x" onclick="closeTeamCard()">✕</button></div>`;

    const next = state.picks.find(p=>!p.isDrafted && p.overall>pk.overall);
    const clockMs = (onClockHere && timer.pick===pk.overall && timer.endsAt!=null) ? (timer.endsAt-Date.now()) : allotment(pk.round)*1000;
    const stats = [
      ["Next pick", next?`#${next.overall} ${next.team}`:"—", ""],
      ["On the clock", `<span id="tcClock">${fmtCountdown(clockMs)}</span>`, onClockHere?"time remaining":"time allotted"],
      ["Available pool", pool?fmt$(pool.room):"—", "team bonus pool"],
      ["Pick slot value", pk.slot>0?fmtM(pk.slot):"—", "slot value"],
      ["Team spent", pool?fmt$(pool.poolCharge)+(pool.hasEst?" est":""):"—", "spent to date"],
      ["Over / under", pool?fmtOU(pool.overUnder):"—", "vs slot"],
    ];
    // stats + player selector share one horizontal band (card fills the screen, no scrolling)
    let selHtml;
    if (roster.length) {
      const teamItem = `<div class="pdrop-item ${!sel?'on':''}" onclick="selectEval('',event)">
          <span class="tc-cdot" style="background:var(--ink)"></span>
          <span class="pi-nm">▦ Team overview (no player)</span></div><div class="pdrop-sep"></div>`;
      const items = roster.map(x=>{
        const on = x.c.key===evalPlayer, qk = x.c.key.replace(/'/g,"\\'");
        return `<div class="pdrop-item ${on?'on':''}" onclick="selectEval('${qk}',event)">
          <span class="tc-cdot" style="background:${intelColorHex(x.c.key, team)}"></span>
          <span class="pi-nm">${x.c.name}${x.inPlay?'<span class="tc-inplay">IN PLAY</span>':''}</span>
          <span class="pi-rk">#${x.c.comp.rank} ${x.c.comp.pos}</span></div>`;
      }).join("");
      selHtml = `<div class="tc-selrow"><div class="pdrop tc-pdrop">
          <button class="pdrop-btn" onclick="toggleTcMenu(event)">
            <span class="tc-cdot" style="background:${sel?intelColorHex(sel.c.key, team):'var(--ink)'}"></span>
            <span class="pdrop-txt"><span class="pdrop-t">Player to evaluate</span><span class="pdrop-v ${sel?'sel':''}">${sel?sel.c.name:'Team overview'}${sel&&sel.inPlay?'<span class="tc-inplay">IN PLAY</span>':''}</span></span>
            <span class="caret">▾</span></button>
          <div class="pdrop-menu" style="display:${tcMenuOpen?'block':'none'}">${teamItem}${items}</div>
        </div></div>`;
    } else {
      selHtml = `<div class="tc-selrow"><div class="placeholder">No undrafted clients on file.</div></div>`;
    }
    h += `<div class="tc-band">${selHtml}<div class="tc-stats">${stats.map(([k,v,sub])=>`<div class="tc-stat"><div class="k">${k}</div><div class="v">${v}</div>${sub?`<div class="sub">${sub}</div>`:""}</div>`).join("")}</div></div>`;

    h += `<div class="tc-panels">
      ${mobPanels(`${sel ? renderTcIntel(state, team, pk, sel) : renderTcMatrix(state, team, o, roster)}
      ${renderTcDraft(state, team, pk, pool, sel)}
      ${renderTcHabits(state, team, pk, pool, o, sel)}
      ${renderTcRangeHistory(state, team, pk, sel)}`)}
    </div>`;

    const qk = sel?sel.c.key.replace(/'/g,"\\'"):"", qn = sel?(sel.c.name||"").replace(/'/g,"\\'"):"";
    const dis = sel?"":"disabled";
    h += `<div class="tc-foot"><span class="tc-qa">Quick actions</span>
      <button class="ctl" ${dis} onclick="armAction('${qk}','${qn}','interest_received')">↕ Log Intel</button>
      <button class="ctl" ${dis} onclick="armAction('${qk}','${qn}','offer')">$ Offer</button>
      <button class="ctl" ${dis} onclick="armAction('${qk}','${qn}','bonus')">$ Bonus</button>
      <button class="ctl" ${dis} onclick="quickRuleOut('${qk}','${qn}','${team}',${pk.overall})">⊘ Rule Out</button>
      <span class="spacer"></span>
      <button class="ctl" ${dis} onclick="openPlayer('${qk}');closeTeamCard()">${MOBILE.matches?"Profile ↗":"View Player Profile ↗"}</button>
      <button class="ctl primary" onclick="closeTeamCard()">Close</button></div>`;
    h += `<div id="tcArmed">${(armed && sel && armed.key===sel.c.key)?renderArmedForm(team, pk):""}</div>`;
    h += `</div>`;
    bd.innerHTML = h;
  }

  // Panel 1 — Team Intel (reflexive to the selected player). Leads with the fit summary
  // (landing/org fit + the four drivers) that used to live in the standalone strip.
  function renderTcIntel(state, team, pk, sel) {
    let h = `<div class="tc-panel" data-q="intel"><h4><span class="n">1</span> Team Intel</h4>`;
    if (!sel) return h + `<div class="placeholder">Select a player to view interest intel.</div></div>`;
    const key = sel.c.key, f = sel.f, comp = sel.c.comp;
    h += `<div class="tc-fitline">
        <span class="tc-fitscore"><b>${f.score}</b><small>Landing · ${f.grade}</small></span>
        <span class="tc-fitscore"><b>${f.orgScore}</b><small>Org · ${f.orgGrade}</small></span>
        ${tcDrivers(f)}</div>`;
    const ti = teamInterest(key, team);
    const recs = DATA.intel.filter(r => teamAlias(r.team)===team && normName(r.player)===key)
                           .sort((a,b)=>(a.date||"").localeCompare(b.date||""));
    const score10 = ti.strength*10;
    const lbl = score10>=6?"Strong":score10>=3.5?"Moderate":score10>0?"Light":"Quiet";
    const latest = ti.latest, cf = contactFlags(key, team);
    const lastColored = [...recs].reverse().find(r=>r.color);   // newest record that carries a color
    // The panel accent reflects the LATEST logged interest color, not the strength magnitude.
    const col = lastColored ? (COLOR_HEX[(lastColored.color||"").toLowerCase()] || "#9aa0a6") : "#9aa0a6";
    // Build colored points: carry the last known color forward so note-only records keep the signal.
    let curHex = "#9aa0a6";
    const points = recs.map(r=>{
      if (r.color) curHex = COLOR_HEX[(r.color||"").toLowerCase()] || curHex;
      return { v: (r.score!=null?r.score:0), hex: curHex };
    });
    h += `<div class="tc-intel-grid"><div class="tc-score">
        <div class="big" style="color:${col}">${score10.toFixed(1)}</div>
        <div class="lbl" style="color:${col}">${lbl}${lastColored?` · ${lastColored.color}`:""}</div>
        <div class="tc-mini-k">Latest signal</div><div class="tc-mini-v" style="color:${col};text-transform:capitalize">${lastColored?lastColored.color:"—"}</div>
        <div class="tc-mini-k">Signals on file</div><div class="tc-mini-v">${ti.n}</div>
        <div class="tc-mini-k">Last updated</div><div class="tc-mini-v">${latest?.date||"—"}</div>
      </div><div>
        <div class="tc-chart-h">Interest strength over time <span style="font-weight:600;text-transform:none;letter-spacing:0">· line color = signal at that time</span></div>
        ${tcSparkline(points, col)}`;
    // Teamintel feed — the raw logged records for this player × team, newest first
    if (recs.length) {
      const FEED_CAP = 12;
      const feed = [...recs].reverse().slice(0, FEED_CAP);
      h += `<div class="tc-chart-h" style="margin-top:12px">Teamintel feed · ${team} × ${tcInitialName(sel.c.name)}</div><div class="tc-feed">`;
      h += feed.map((r, i) => {
        const hex = points[recs.length-1-i].hex;
        const src = r.is_manual ? "manual" : (r.channel ? "#"+r.channel : "");
        const meta = [r.date||"—", (r.tier_label||"").replace(/_/g," ").toLowerCase(), src].filter(Boolean).join(" · ");
        const raw = (r.note || r.full_text || "").trim();
        const note = raw.length > 220 ? raw.slice(0,220)+"…" : raw;
        const sig = [r.color?`signal: ${r.color}`:"", r.score!=null?`score ${r.score}`:""].filter(Boolean).join(" · ");
        return `<div class="tc-feed-row"><span class="tc-cdot" style="background:${hex};margin-top:3px"></span>
          <div class="tc-feed-body"><div class="tc-feed-meta">${meta}</div>
          ${note?`<div class="tc-feed-note">${_esc(note)}</div>`:(sig?`<div class="tc-feed-note" style="color:var(--muted)">${sig}</div>`:"")}</div></div>`;
      }).join("");
      if (recs.length > FEED_CAP) h += `<div class="tc-feed-more">+ ${recs.length-FEED_CAP} earlier records</div>`;
      h += `</div>`;
    }
    const tiers = {};
    for (const r of recs) { const t=(r.tier_label||"").toUpperCase(); if (t) tiers[t]=(tiers[t]||0)+1; }
    const tKeys = Object.keys(tiers), tTot = tKeys.reduce((s,k)=>s+tiers[k],0);
    if (tTot) {
      h += `<div class="tc-tier"><div class="tc-chart-h">Source tier breakdown</div>
        <div class="tc-tierbar">${tKeys.map(k=>`<span style="width:${(100*tiers[k]/tTot).toFixed(0)}%;background:${tcTierColor(k)}"></span>`).join("")}</div>
        <div class="tc-tierleg">${tKeys.map(k=>`<span><i style="background:${tcTierColor(k)}"></i>${k.replace(/_/g," ")} ${Math.round(100*tiers[k]/tTot)}%</span>`).join("")}</div></div>`;
    }
    if (cf.workout || cf.combine) h += `<div class="tc-tier"><div class="tc-chart-h">Contact flags</div>${contactBadges(key, team)}</div>`;
    h += `</div></div></div>`;
    return h;
  }

  // Panel 2 — This team's remaining picks: pool status + per-pick fit for the selected
  // player AND the best-fitting client at each pick ("when are they next / who might fit").
  function renderTcDraft(state, team, pk, pool, sel) {
    let h = `<div class="tc-panel" data-q="draft"><h4><span class="n">2</span> Picks &amp; Fit for This Team</h4>`;
    if (!pool) return h + `<div class="placeholder">No pool data for ${team}.</div></div>`;
    // player-mode: the placement insight moved out of the old strip (at-pick status + next landing)
    if (sel) {
      const here = tcPickFit(sel.c.comp, pk, state), land = tcNextLanding(state, team, sel.c.comp);
      h += `<div class="tc-fitline sm">
        <span>At <b>#${pk.overall}</b> <span class="tg ${here.cls}">${here.label}</span></span>
        <span class="tc-nextland">Next realistic landing <b>${land?`#${land.overall} · ${roundLabel(land.round)}`:'—'}</b></span></div>`;
    }
    h += `<div class="tc-kv"><span class="k">Available / spent</span><span class="v">${fmt$(pool.room)} <span class="tc-onpace">of ${fmt$(pool.pool)}</span></span></div>`;
    const pace = pool.overUnder>0?"OVER":pool.overUnder<0?"UNDER":"ON PACE";
    h += `<div class="tc-kv"><span class="k">Over / under vs slot</span><span class="v">${fmtOU(pool.overUnder)} <span class="tc-onpace">${pace}</span></span></div>`;
    const up = teamUpcoming(state, team);
    const remSlot = up.reduce((s,p)=>s+(p.slot>0?p.slot:0),0);
    // $ they can spend beyond paying every remaining pick at slot — the real over-slot cushion.
    const cushion = pool.room - remSlot;
    h += `<div class="tc-kv"><span class="k">Over-slot cushion</span><span class="v">${cushion>=0?"+":"−"}${fmtM(Math.abs(cushion))} <span class="tc-onpace">${cushion>=0?"to spend above slot":"must save vs slot"}</span></span></div>`;
    // Player mode: show the selected player's fit at each pick. Team mode: show who might fit.
    const selName = sel ? tcInitialName(sel.c.name).split(" ").slice(-1)[0] : "";
    h += `<table class="tc-upc"><thead><tr><th>Pick</th><th>Slot</th><th>${sel?selName+" fit":"Who might fit"}</th></tr></thead><tbody>`;
    h += up.slice(0,8).map(p=>{
      const cur = p.overall===pk.overall;
      let lastCol;
      if (sel) {
        const pf = tcPickFit(sel.c.comp, p, state);
        lastCol = `<span class="tg ${pf.cls}">${pf.label}</span>`;
      } else {
        const cand0 = tiClientsAt(p, state)[0];
        const cand = cand0 ? { c: cand0, f: fit(cand0.comp, team, cand0.key, state) } : null;
        lastCol = cand ? `<span class="tc-cdot" style="background:${intelColorHex(cand.c.key, team)};display:inline-block;vertical-align:middle;margin-right:4px"></span>${tcInitialName(cand.c.name).split(" ").slice(-1)[0]} <span style="color:var(--muted)">${cand.f.orgGrade}</span>` : "—";
      }
      return `<tr>
        <td class="${cur?'cur':''}">#${p.overall}${cur?'<span class="tc-cur-tag">Now</span>':''}</td>
        <td>${p.slot>0?fmtM(p.slot):"—"}</td>
        <td style="font-size:12px">${lastCol}</td></tr>`;

    h += `</tbody></table>`;
    h += `<div class="tc-kv" style="margin-top:6px"><span class="k">Total remaining (${up.length} picks)</span><span class="v">${fmtM(remSlot)}</span></div>`;
    return h + `</div>`;
  }

  // Q1 in team mode — org dev rank header + broad matrix of our clients' fit with this team.
  function renderTcMatrix(state, team, o, roster) {
    let h = `<div class="tc-panel" data-q="intel"><h4><span class="n">1</span> Team Intel — Client Fit Matrix</h4>`;
    h += `<div class="tc-fitline sm"><span>Org dev rank <b>${o.orgRank!=null?"#"+o.orgRank+" / 30":"—"}</b></span><span class="tc-nextland">${o.n||0} recent picks graded</span></div>`;

    h += top.map(x=>{
      const ti = teamInterest(x.c.key, team);
      const land = teamUpcoming(state, team).find(p=>tcPickFit(x.c.comp, p, state).reachOk);

        <td style="font-size:12px">${intelDot(x.c.key, team)} ${tcInitialName(x.c.name)}${x.inPlay?'<span class="tc-inplay">IN PLAY</span>':''}</td>
