  // Q3 Historical Team Habits — homegrown-by-level/tendencies + bonus posture + recent 1st-rounders;
  // profile-aware + projected signing $ for the selected player.
  function renderTcHabits(state, team, pk, pool, o, sel) {
    let h = `<div class="tc-panel" data-q="habits"><h4><span class="n">3</span> Historical Team Habits</h4>`;
    if (!o || o.orgRank==null) return h + `<div class="placeholder">No org profile for ${team}.</div></div>`;
    const dev = o.dev || {};
    // homegrown = drafted by this org & still with them (MLB StatsAPI bake)
    const hg = o.hgLevels;
    if (hg && hg.fortyManAll) {
      const ord = n => n + (n%100>=11 && n%100<=13 ? "th" : ["th","st","nd","rd"][n%10] || "th");
      const pct40 = Math.round(100*hg.fortyMan/hg.fortyManAll);
      const pctOrg = hg.orgAll ? Math.round(100*hg.total/hg.orgAll) : null;
      h += `<div class="tc-kv"><span class="k">40-man homegrown</span><span class="v">${hg.fortyMan} of ${hg.fortyManAll} <span class="hg-pct">· ${pct40}%${hg.rank40?` (${ord(hg.rank40)})`:""}</span></span></div>`;
      h += `<div class="tc-kv"><span class="k">Org homegrown</span><span class="v">${hg.total} of ${hg.orgAll}${pctOrg!=null?` <span class="hg-pct">· ${pctOrg}%${hg.rankOrg?` (${ord(hg.rankOrg)})`:""}</span>`:""}</span></div>`;
    } else {
      h += `<div class="tc-kv"><span class="k">Homegrown</span><span class="v">${o.homegrown!=null?`${o.homegrown} in system`:"—"}</span></div>`;
    }
    // Round-specific org habits: the team's actual 2018-25 picks in THIS round.
    // The slot tracker labels comp/PPI selections with the adjacent numeric round,
    // so special 2026 rounds (PPI, CB-A, SUP-2, 2C, 4C…) fold forward to the last
    // numeric round before them. Renamed franchises are aliased forward.
    const NAME_FWD = { "Cleveland Indians":"Cleveland Guardians", "Oakland Athletics":"Athletics" };
    let rd = String(pk.round);
    if (!/^\d+$/.test(rd)) {
      let last = "1";
      for (const p of state.picks) { if (/^\d+$/.test(String(p.round))) last = String(p.round); if (p.overall === pk.overall) break; }
      rd = last;
    }
    const myName = pk.teamName || "";
    const rdRows = DATA.slotHistory.length
      ? DATA.slotHistory.filter(r => (NAME_FWD[r.team]||r.team)===myName && String(r.round)===rd)
          .sort((a,b)=> (b.year-a.year) || (a.overall-b.overall))
      : null;   // null = tracker still loading
    const rdLbl = `round ${rd}`;
    let mixV = "…", hsV = "…", hsPctRd = null, leanPitcher = o.earlyPitcherPct!=null && o.earlyPitcherPct>=50, leanWhere = "early";
    if (rdRows) {
      if (rdRows.length) {
        const pN = rdRows.filter(r=>r.group==="P").length;
        const hsN = rdRows.filter(r=>r.level==="HS").length;
        const pPct = Math.round(100*pN/rdRows.length), hsPct = Math.round(100*hsN/rdRows.length);
        mixV = `${pPct}% P / ${100-pPct}% H <span class="hg-pct">· ${rdRows.length} picks</span>`;
        hsV = `${hsPct}% / ${100-hsPct}%`;
        if (rdRows.length >= 5) { hsPctRd = hsPct; leanPitcher = pPct >= 50; leanWhere = `in ${rdLbl}`; }
      } else { mixV = "—"; hsV = "—"; }
    }
    h += `<div class="tc-kv"><span class="k">P / H mix · ${rdLbl}</span><span class="v">${mixV}</span></div>`;
    h += `<div class="tc-kv"><span class="k">HS / College · ${rdLbl}</span><span class="v">${hsV}</span></div>`;
    h += `<div class="tc-kv"><span class="k">MLB-debut rate (dev)</span><span class="v">${dev.mlbDebut!=null?Math.round(dev.mlbDebut*100)+"%":"—"}</span></div>`;
    let postV = "…";
    if (rdRows) {
      const signed = rdRows.filter(r=>r.diff!=null);
      if (signed.length) {
        const overN = signed.filter(r=>r.diff>0).length;
        const avg = signed.reduce((s,r)=>s+r.diff,0)/signed.length;
        const posture = avg>=100000 ? `pays over slot in ${rdLbl}` : avg<=-100000 ? `pays under slot in ${rdLbl}` : `pays at slot in ${rdLbl}`;
        postV = `${Math.round(100*overN/signed.length)}% over · avg ${avg>=0?"+":""}${fmtM(avg)}<br><span style="color:var(--muted);font-weight:600">${signed.length} signings · ${posture}</span>`;
      } else postV = "—";
    }
    h += `<div class="tc-kv"><span class="k">Bonus posture · ${rdLbl}</span><span class="v" style="font-size:12px;text-align:right">${postV}</span></div>`;
    // Precedents — every pick this org made in this round across the DB years.
    // With a player selected, true money comps (same HS/College level + position
    // group) surface to the top; same-side P/H matches get the softer ≈ marker.
    if (rdRows && rdRows.length) {
      const tierOf = r => {
        if (!sel) return 0;
        const c = sel.c.comp;
        const lvl = c.level==="HS" ? "HS" : "College";
        if (r.level===lvl && r.group===(c.posGroup||posGroupOf(c.pos))) return 2;
        return isPitcher(c.pos)===(r.group==="P") ? 1 : 0;
      };
      const prec = [...rdRows].sort((a,b)=> (tierOf(b)-tierOf(a)) || (b.year-a.year) || (a.overall-b.overall));
      h += `<div class="tc-chart-h" style="margin-top:11px">Round ${rd} precedents <span style="font-weight:600;text-transform:none;letter-spacing:0">· 2018–25 · signing bonus${sel?' · $ = money comp':''}</span></div>`;
      h += prec.map(r=>{
        const tier = tierOf(r);
        const bonusCell = r.bonus!=null
          ? `${fmtM(r.bonus)}${r.diff!=null?` <span class="tg ${r.diff>0?'over':r.diff<0?'under':'fit'}" style="font-size:9px">${r.diff>0?"+":""}${fmtM(r.diff)}</span>`:""}`
          : `<span style="color:var(--muted);font-weight:600;font-size:11px">unsigned</span>`;
        const mark = tier===2 ? ' <span class="tc-inplay">$ COMP</span>'
                   : tier===1 ? ' <span class="tc-inplay" style="border-color:#3949ab;color:#3949ab">≈ profile</span>' : '';
        return `<div class="tc-kv"${tier===2?' style="background:#f2faf4;margin:0 -6px;padding-left:6px;padding-right:6px;border-radius:6px"':''}><span class="k" style="color:var(--ink)">'${String(r.year).slice(2)} · ${r.first?r.first[0]+". ":""}${r.last} <span style="color:var(--muted)">${r.pos} · #${r.overall}</span>${mark}</span><span class="v">${bonusCell}</span></div>`;
      }).join("");
    }
    if (sel) {
      const c = sel.c.comp, isHS = c.level==="HS", p = isPitcher(c.pos);
      const levPct = hsPctRd!=null ? (isHS ? hsPctRd : 100-hsPctRd) : (isHS ? o.hsPct : o.collegePct);
      const withLean = (p && leanPitcher) || (!p && !leanPitcher);
      const bonus = negBonus(c, pk.slot, pk.overall), ou = bonus - pk.slot;
      const last = tcInitialName(sel.c.name).split(" ").slice(-1)[0];
      const lb3 = bonusFor(sel.c.key);
      if (lb3) h += `<div class="tc-kv" style="margin-top:8px"><span class="k">Logged ${last} bonus (${lb3.kind})</span><span class="v">${fmtM(lb3.amount)}${lb3.pick?` <span class="tc-onpace">at #${lb3.pick}</span>`:""}</span></div>`;
      h += `<div class="tc-kv" ${lb3?'':'style="margin-top:8px"'}><span class="k">Projected ${last} bonus · ${team}</span><span class="v">${fmtM(bonus)} <span class="tg ${ou>0?'over':ou<0?'under':'fit'}">${ou>0?"over":ou<0?"under":"at"} slot</span></span></div>`;
      h += `<div class="tc-kv"><span class="k">Agent · market value</span><span class="v" style="font-size:12px">${c.agent||"—"} · ${fmt$(demandFor(c))}</span></div>`;
      h += `<div class="tc-hab-note">${last} is a ${isHS?"HS":"college"} ${p?"pitcher":"position player"}. ${team} takes ${levPct!=null?levPct+"%":"—"} ${isHS?"HS":"college"} and leans ${leanPitcher?"pitcher":"hitter"} ${leanWhere} — this profile ${withLean?"fits":"runs against"} their habit at this spot.</div>`;
    }
    return h + `</div>`;
  }

  // Q4 Pick Range History — real 2018-25 signings near this slot (draft-slot-tracker). Team mode:
  // who signed in this spot. Player mode: comps matching the client's profile and how they fared.
  function renderTcRangeHistory(state, team, pk, sel) {
    const lastName = sel ? tcInitialName(sel.c.name).split(" ").slice(-1)[0] : "";

    h += `<div class="tc-fitline sm"><span>Signings at <b>#${lo}${hi>lo?`–#${hi}`:""}</b>${pk.slot>0?` or <b>~${fmtM(pk.slot)}</b> money`:""}</span><span class="tc-nextland"><a href="${trackerUrl}" target="_blank" rel="noopener" style="color:var(--red);font-weight:800">full tracker ↗</a></span></div>`;
    if (!H.length) return h + `<div class="placeholder">Loading historical signings…</div></div>`;

      else header = "All in this spot";
      h += `<div class="tc-toggle"><button class="${useProfile?'on':''}" onclick="setTcRange('profile')">Same profile</button><button class="${!useProfile?'on':''}" onclick="setTcRange('all')">All in range</button></div>`;
      // projected outcome for our client at this pick (+ any logged bonus fact)
      const bonus = negBonus(c, pk.slot, pk.overall), ou = bonus - pk.slot;
      const lb4 = bonusFor(sel.c.key);
      if (lb4) h += `<div class="tc-kv"><span class="k">Logged bonus (${lb4.kind})</span><span class="v">${fmtM(lb4.amount)}${lb4.pick?` <span class="tc-onpace">at #${lb4.pick}</span>`:""}</span></div>`;
      h += `<div class="tc-kv"><span class="k">Projected ${lastName} bonus</span><span class="v">${fmtM(bonus)} <span class="tg ${ou>0?'over':ou<0?'under':'fit'}">${ou>0?"over":ou<0?"under":"at"} slot</span></span></div>`;
      h += `<div class="tc-kv"><span class="k">Agent · market value</span><span class="v" style="font-size:12px">${c.agent||"—"} · ${fmt$(demandFor(c))}</span></div>`;
    }
    let comps = slotComps(pk, filt);
    if (sel && filt && comps.length < 3) { comps = slotComps(pk, { level: filt.level }); header += " (widened)"; }
    const wd = comps.filter(r=>r.diff!=null), n = wd.length, overN = wd.filter(r=>r.diff>0).length;
    const avg = n ? wd.reduce((s,r)=>s+r.diff,0)/n : 0;
    if (n) {
      h += `<div class="tc-kv"><span class="k">${header}</span><span class="v">${n} signed · ${Math.round(100*overN/n)}% over slot</span></div>`;
      h += `<div class="tc-kv"><span class="k">Avg vs slot</span><span class="v">${avg>=0?"+":""}${fmtM(avg)}</span></div>`;
      h += `<table class="tc-upc"><thead><tr><th>Yr</th><th>Player</th><th>Bonus</th><th>vs slot</th></tr></thead><tbody>`;
      h += comps.slice(0,6).map(r=>`<tr>
        <td>'${String(r.year).slice(2)}</td>
        <td style="font-size:11px">${r.first?r.first[0]+". ":""}${r.last} <span style="color:var(--muted)">${r.pos}·#${r.overall}</span>${r._money?' <span style="color:#1a7f37;font-weight:800" title="qualifies by money — signed near this slot value">$</span>':''}</td>
        <td>${r.bonus!=null?fmtM(r.bonus):"—"}</td>
        <td>${r.diff!=null?`<span class="tg ${r.diff>0?'over':r.diff<0?'under':'fit'}">${r.diff>0?"+":""}${fmtM(r.diff)}</span>`:"—"}</td></tr>`).join("");
      h += `</tbody></table>`;
    } else {
      h += `<div class="placeholder">No comparable signings in this range.</div>`;
    }
    return h + `</div>`;
  }

  function renderDetail() {

  // ---------- state plumbing ----------
  function setState(s) {
    currentState = s;
    if (s) $("yearBadge").textContent = `${s.year} MLB DRAFT`;
    if (s && s.onClock) { if (s.onClock.overall !== timer.pick) setClockForPick(s.onClock); }
    else timer.pick = null;

  // Fire the ESPN-style ticker for any pick newly drafted since the last update (live or mock).
  // First state after load/mode-switch seeds silently so we don't replay the whole board.
  let announcedPicks = null;
  function detectNewPicks(s) {
    const drafted = s.picks.filter(p => p.isDrafted && p.player);
    if (announcedPicks === null) { announcedPicks = new Set(drafted.map(p => p.overall)); return; }
    drafted.filter(p => !announcedPicks.has(p.overall))
      .sort((a,b) => a.overall - b.overall)
      .forEach(p => { announcedPicks.add(p.overall); enqueueTicker(p); });
  }
  let tickerQueue = [], tickerShowing = false;
  function enqueueTicker(pick) { tickerQueue.push(pick); if (!tickerShowing) nextTicker(); }
  const REDUCE = window.matchMedia("(prefers-reduced-motion: reduce)");
  // Landing pulse survives the board's wholesale innerHTML re-renders: renderBoardGrid
  // re-applies .bc-land from these while the pulse is in flight.
  let landOverall = null, landUntil = 0;
  function landPulse(overall) {
    landOverall = overall; landUntil = Date.now() + 700;
    document.querySelector(`#boardList .bcard[data-overall="${overall}"]`)?.classList.add("bc-land");
    setTimeout(() => { if (landOverall === overall) landOverall = null; }, 700);
  }
  // Where the banner flies: the pick's board tile if visible, else the Board tab/button.
  function zapTarget(overall) {
    const tile = document.querySelector(`#boardList .bcard[data-overall="${overall}"]`);
    if (tile && tile.offsetParent) return { rect: tile.getBoundingClientRect(), isTile: true };
    const tab = document.body.classList.contains("mob")
      ? document.querySelector('#mtabs [data-view="board"]') : $("tabBoard");
    if (tab && tab.offsetParent) return { rect: tab.getBoundingClientRect(), isTile: false };
    return null;
  }
  // Fly/shrink the banner into the target via a body-parented fixed clone (immune to re-renders).
  function zapTicker(el, overall, done) {
    const inner = el.querySelector(".tk-inner"), tgt = zapTarget(overall);
    if (!inner || !tgt || REDUCE.matches) { el.classList.remove("show"); setTimeout(done, 420); return; }
    const src = inner.getBoundingClientRect(), r = tgt.rect;
    // clamp so a scrolled-off tile still pulls the banner in the right direction (no scroll hijack)
    const cx = Math.min(Math.max(r.left + r.width/2, 30), innerWidth - 30);
    const cy = Math.min(Math.max(r.top + r.height/2, 30), innerHeight - 30);
    const ghost = inner.cloneNode(true);
    ghost.id = "tickerZap";
    Object.assign(ghost.style, { left: src.left+"px", top: src.top+"px", width: src.width+"px", margin: "0", borderRadius: "12px" });
    document.body.appendChild(ghost);
    el.classList.remove("show"); el.style.visibility = "hidden";   // ghost carries the visual; ticker resets off-screen unseen
    const s = Math.max(.08, Math.min(r.width/src.width, r.height/src.height));
    const anim = ghost.animate([
      { transform: "translate(0,0) scale(1)", opacity: 1 },
      { opacity: 1, offset: .6 },
      { transform: `translate(${cx-(src.left+src.width/2)}px,${cy-(src.top+src.height/2)}px) scale(${s})`, opacity: 0 }
    ], { duration: 420, easing: "cubic-bezier(.4,0,.8,.4)" });
    anim.onfinish = anim.oncancel = () => { ghost.remove(); if (tgt.isTile) landPulse(overall); done(); };
  }
  function nextTicker() {
    const el = $("ticker"); if (!el) return;
    el.style.visibility = "";
    if (!tickerQueue.length) { tickerShowing = false; el.classList.remove("show"); return; }
    tickerShowing = true;
    const p = tickerQueue.shift();
    const key = normName(p.player||""), ours = DATA.clients.has(key), comp = DATA.compByName.get(key);
    const meta = comp ? `${comp.pos} · ${levelClass(comp).replace("College-","Col ")}` : (p.pos||"");
    const agency = comp && comp.agent ? comp.agent : "";
    // Facts only on the announcement — no model estimates. A bonus shows here only once
    // it's official or logged by the war room (the estimate lives in the entry form as a suggestion).
    const eb = effectiveBonus(p);
    const knownBonus = eb.bonus!=null && (p.bonus!=null || eb.src);
    el.innerHTML = `<div class="tk-inner ${ours?"sv":""}">
      <span class="tk-badge">PICK #${p.overall}</span>
      <span class="tk-team">${p.team||""}</span>
      <span class="tk-sel">selects</span>
      <span class="tk-player">${p.player||"—"}</span>
      ${meta?`<span class="tk-meta">${meta}</span>`:""}
      ${agency?`<span class="tk-agency">${agency}</span>`:""}
      ${knownBonus?`<span class="tk-bonus">${fmtM(eb.bonus)}${eb.src&&eb.src!=="confirmed"?" "+eb.src.slice(0,3):""}</span>`:""}
      ${ours?'<span class="tk-sv">SV CLIENT</span>':""}</div>`;
    el.classList.add("show");
    tickerCur = p;
    const burst = tickerQueue.length > 4;               // drain bursts (mock turbo) fast, no zap
    clearTimeout(tickerHoldTimer);
    if (burst) tickerHoldTimer = setTimeout(() => {
      tickerCur = null; el.classList.remove("show"); setTimeout(nextTicker, 420);
    }, 800);
    else tickerHoldTimer = setTimeout(advanceTicker, 1100);   // banner surfaces ~1s, then zaps to its tile
  }
  let tickerCur = null, tickerHoldTimer = 0;
  function advanceTicker() {                            // zap the current banner into its tile, move on
    const el = $("ticker"), p = tickerCur;
    if (!el || !p) return;
    tickerCur = null;
    zapTicker(el, p.overall, () => setTimeout(nextTicker, 100));
  }
  // Swipe the banner away early — flinging it sideways/down dismisses without the zap;
  // a small drag springs back and the zap fires shortly after. Touching pauses the hold.
  (function() {
    const el = $("ticker"); if (!el) return;
    let sx = 0, sy = 0, drag = false;
    el.addEventListener("pointerdown", e => {
      if (!tickerCur || !el.classList.contains("show")) return;
      drag = true; sx = e.clientX; sy = e.clientY;
      clearTimeout(tickerHoldTimer);
    });
    const move = e => {
      if (!drag) return;
      const inner = el.querySelector(".tk-inner"); if (!inner) return;
      const dx = e.clientX - sx, dy = Math.max(-10, e.clientY - sy);
      inner.style.transform = `translate(${dx}px,${dy}px)`;
      inner.style.opacity = Math.max(.3, 1 - (Math.abs(dx) + Math.max(0, dy)) / 260);
    };
    const up = e => {
      if (!drag) return; drag = false;
      const inner = el.querySelector(".tk-inner"); if (!inner) return;
      const dx = e.clientX - sx, dy = e.clientY - sy;
      if (Math.abs(dx) > 55 || dy > 40) {
        tickerCur = null;
        const a = inner.animate(
          [{ transform: inner.style.transform, opacity: inner.style.opacity || 1 },
           { transform: `translate(${dx*4}px,${Math.max(dy,0)*4 + 80}px)`, opacity: 0 }],
          { duration: 180, easing: "ease-in" });
        a.onfinish = a.oncancel = () => {
          el.classList.remove("show"); el.style.visibility = "hidden";

        };
      } else {
        inner.style.transform = ""; inner.style.opacity = "";
        if (tickerCur) tickerHoldTimer = setTimeout(advanceTicker, 600);
      }
    };
    window.addEventListener("pointermove", move);
    window.addEventListener("pointerup", up);
    window.addEventListener("pointercancel", up);
  })();
  const VIEWS = [["tabClients","viewClients","clients"],["tabBoard","viewBoard","board"],

  function renderActive() {

    if (cardPick!=null) {

    else if (VIEW==="board") {
      const ae = document.activeElement;   // don't wipe an open capture form while typing
      if (armed && ae && (ae.tagName==="INPUT" || ae.tagName==="SELECT")) return;
      renderBoard(currentState);
    }
    else renderBest();
  }
  function setView(v) { selected=null; VIEW=v; applyViewVis(); renderActive(); }

  // ---------- mock engine ----------
  // Seeds mock from live state if available, so the simulation picks up exactly where reality left off.
  async function seedFromLive() {
    if (mock.picks || mock.seeding) return;
    mock.seeding = true;
    try {
      const o = await loadOrder();
      if (lastLive && lastLive.picks && lastLive.picks.length) {
        // Start from live draft state — already-made picks stay made
        mock.picks = lastLive.picks.map(p => ({...p}));
      } else {
        // Pre-draft or no live data: blank skeleton
        mock.picks = o.picks.map(p => ({ ...p, isDrafted:false, isPass:false, player:null, playerId:null, school:null, schoolClass:null, bucket:"UNK", bonus:null, rank:null }));
      }
    } catch (e) { $("mockNote").textContent = "Couldn't load board — serve via a web server (vercel dev / python3 -m http.server)"; }
    mock.seeding = false;
  }
  function draftedKeySet() {
    const s = new Set();
    for (const p of mock.picks) if (p.isDrafted && p.player) s.add(normName(p.player));
    return s;
  }
  function availableComposite() {
    const drafted = draftedKeySet();
    return DATA.composite.filter(p => !drafted.has(p._key));
  }
  const jitterFor = (round) => { const r = parseInt(round,10)||1; return r<=1?3 : r<=4?6 : 10; };
  // Realistic board-disagreement variance (Gaussian), scaled by round — a #9 talent should have
  // genuine paths across a wide range (and small tails higher/lower), not collapse to his rank.
  function gaussian() { let u=0,v=0; while(!u)u=Math.random(); while(!v)v=Math.random(); return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }
  const sdFor = (round) => { const r = parseInt(round,10)||1; return r<=1?11 : r<=4?15 : 22; };
  // Per-team budget state from the current board (pool, committed charge, remaining slots).
  function teamBudget(team, currentOverall) {
    let pool=0, committed=0, slotsAfter=0, poolPicksAfter=0;
    for (const p of mock.picks) {
      if (p.team !== team) continue;
      const isPool = p.slot > 0;
      if (isPool) pool += p.slot;
      if (p.isDrafted) { if (p.bonus) committed += isPool ? p.bonus : Math.max(0, p.bonus - LATE_EXEMPT); }
      else if (isPool && p.overall !== currentOverall) { slotsAfter += p.slot; poolPicksAfter += 1; }
    }
    return { pool, committed, budget: pool*CUSHION, slotsAfter, poolPicksAfter };
  }
  // Budget-constrained pick: best affordable talent; unaffordable demand -> slides;
  // teams with spare money overpay (banking earlier funds over-slot later).
  // draftedKeys: optional pre-maintained Set of taken _keys (sims pass it so we skip
  // re-scanning + re-normalizing the whole board on every pick). Falls back to a fresh scan.
  function choosePick(pk, draftedKeys) {
    const team = pk.team;
    const drafted = draftedKeys || draftedKeySet();
    const all = DATA.composite.filter(c => !drafted.has(c._key));
    if (!all.length) return null;
    // hard manual ranges: anyone past their latest must be taken now (forced off the board)
    const overdue = all.filter(c => { const r=rangeOf(c); return r && r.hi && pk.overall >= r.hi; });
    if (overdue.length) {
      overdue.sort((a,b) => (rangeOf(a).hi-rangeOf(b).hi) || (a.rank-b.rank));
      return { comp: overdue[0], bonus: negBonus(overdue[0], pk.slot, pk.overall) };
    }
    // ...and anyone before their earliest isn't eligible yet
    const avail = all.filter(c => { const r=rangeOf(c); return !(r && r.lo && pk.overall < r.lo); }).slice(0, 60);
    if (!avail.length) return null;
    const tb = teamBudget(team, pk.overall);
    const headroom = tb.budget - tb.committed - ENG.RESERVE*tb.poolPicksAfter;
    const extra = (tb.budget - tb.committed - tb.slotsAfter) / (tb.pool || 1);
    const lamEff = Math.max(0.3, Math.min(ENG.LAMBDA*2, ENG.LAMBDA*(1 - ENG.BANK_K*extra)));
    const o = DATA.orgs[team] || {}; const lean = (o.earlyPitcherPct!=null?o.earlyPitcherPct:50)/100;
    const sd = sdFor(pk.round);
    const orgDevN = o.orgRank!=null ? (31 - o.orgRank)/30 : 0.5;   // org-review dev fit (subtle pull)
    let best=null, bestVal=-1e9, bestBonus=0;
    for (const c of avail) {
      const b = negBonus(c, pk.slot, pk.overall);
      if (pk.slot > 0 && b > headroom) continue;        // can't afford -> he slides
      // RANKINGS (talent, convex at top so elite picks are sticky) + MONEY + ORG + INTEL + VARIANCE
      let v = (350 - c.rank) + Math.max(0, (ENG.TOP_SPAN - c.rank)) * ENG.TOP_SEP - lamEff*(b/1e6);
      v += (isPitcher(c.pos) ? (lean-.5) : (.5-lean)) * ENG.POS_LEAN;
      if (pk.slot > 0 && b < pk.slot) v += spreadOf(team) * ENG.SAVE_W * ((pk.slot - b)/1e6);  // banking
      const nm = normName(c.name);
      if (DATA.clients.has(nm)) {                       // intel + org-dev pull (only where we have intel)
        const ti = teamInterest(nm, team);
        if (ti.strength>0) v += ti.strength * ENG.INTEREST_W + (orgDevN-0.5) * ENG.DEV_W;
      }
      v += gaussian() * sd;                             // board-disagreement spread (with tails)
      if (v > bestVal) { bestVal=v; best=c; bestBonus=b; }
    }
    if (!best) {                                        // nothing affordable -> cheapest available
      best = avail.reduce((a,c) => negBonus(c,pk.slot,pk.overall) < negBonus(a,pk.slot,pk.overall) ? c : a, avail[0]);
      bestBonus = negBonus(best, pk.slot, pk.overall);
    }
    // never let the resulting pool charge exceed the +5% ceiling
    const charge = pk.slot>0 ? bestBonus : Math.max(0, bestBonus - LATE_EXEMPT);
    const remain = Math.max(0, tb.budget - tb.committed);
    if (charge > remain) bestBonus -= (charge - remain);
    return { comp: best, bonus: bestBonus };
  }
  function applyPick(idx, choice) {
    const pk = mock.picks[idx]; pk.isDrafted = true;
    const comp = choice && choice.comp;
    if (comp) {
      pk.player=comp.name; pk.pos=comp.pos; pk.school=comp.school; pk.rank=comp.rank;
      pk.bucket = comp.level==="HS" ? "HS" : comp.level==="College" ? "4YR" : comp.level==="JUCO" ? "JUCO" : "UNK";
      pk.bonus = choice.bonus;
    } else { pk.player=`Pick ${pk.overall}`; pk.bucket="UNK"; pk.bonus=null; }
  }
  function autoPickOne() {
    const st = derive(mock.picks, mock.picks[0]?.year || 2026);
    if (!st.onClock) return false;
    applyPick(st.onClockIndex, choosePick(st.onClock)); return true;
  }
  window.draftManual = (name) => {
    if (MODE!=="mock" || mock.running || !mock.picks) return;
    const st = derive(mock.picks, 2026); if (!st.onClock) return;
    const comp = DATA.compByName.get(normName(name));
    applyPick(st.onClockIndex, comp ? { comp, bonus: negBonus(comp, st.onClock.slot, st.onClock.overall) } : null);
    mock.nextAt = 0; pushMock();
  };
  function pushMock() { setState(derive(mock.picks, mock.picks[0]?.year || 2026)); }

  function toggleRun() {
    mock.running = !mock.running;
    if (mock.running) {                                    // resume the pick-clock from where it was frozen
      if (timer.pick && timer.endsAt == null) timer.endsAt = Date.now() + (timer.remainingMs || 0);
      scheduleNext(true);
    } else if (timer.endsAt != null) {                     // pause -> freeze remaining time
      timer.remainingMs = Math.max(0, timer.endsAt - Date.now()); timer.endsAt = null;
    }
    $("btnRun").textContent = mock.running ? "⏸ Pause" : "▶ Start";
    $("btnRun").classList.toggle("primary", !mock.running);
    renderActive();
  }
  function stepOnce() { if (MODE==="mock" && mock.picks) { autoPickOne(); mock.nextAt=0; pushMock(); } }
  function resetMock() {
    mock.running=false; mock.picks=null; mock.nextAt=0; timer.pick=null;
    announcedPicks = null; tickerQueue = [];   // re-seed the ticker silently on the fresh board
    $("btnRun").textContent="▶ Start"; $("btnRun").classList.add("primary");
    seedFromLive().then(pushMock);
  }
  function onSpeed() { mock.speed = $("speed").value; mock.nextAt = 0; }
  const speedDelay = () => mock.speed==="turbo" ? 300 : 1200;
  function scheduleNext(force) {
    const st = derive(mock.picks, 2026);
    if (!st.onClock) { mock.nextAt = Infinity; return; }
    if (mock.speed==="realtime") mock.nextAt = timer.endsAt;
    else if (force || !mock.nextAt) mock.nextAt = Date.now() + speedDelay();
  }
  let lastPre = false;
  const isPreDraft = () => MODE==="live" && currentState && currentState.madeCount===0 && Date.now() < DRAFT_START;
  function updatePreDraft() {
    const pre = isPreDraft(), b = $("preBanner");
    if (b) {
      if (pre) { b.style.display = ""; b.innerHTML = `<span class="pulse"></span> 2026 MLB Draft begins in <b>${fmtCountdown(DRAFT_START-Date.now())}</b> &middot; Fri July 11 &middot; 1:30 PM ET`; }
      else b.style.display = "none";
    }
    if (pre) { const sp = document.getElementById("draftCountdown"); if (sp) sp.textContent = fmtCountdown(DRAFT_START-Date.now()); }
  }
  function tick() {
    renderCountdown();
    // keep the team-card countdown ticking without a full modal re-render
    if (cardPick!=null && timer.pick===cardPick && timer.endsAt!=null) {
      const el = $("tcClock"); if (el) el.textContent = fmtCountdown(timer.endsAt-Date.now());
    }
    const pre = isPreDraft();
    if (pre !== lastPre) { lastPre = pre; renderActive(); }   // flip to live the moment the draft starts
    updatePreDraft();
    if (MODE!=="mock" || !mock.running || !mock.picks) return;
    const st = derive(mock.picks, 2026);
    if (!st.onClock) { mock.running=false; $("btnRun").textContent="▶ Start"; $("btnRun").classList.add("primary"); pushMock(); return; }
    if (mock.speed==="instant") { while (autoPickOne()) {} mock.running=false; $("btnRun").textContent="✓ Done"; pushMock(); return; }
    if (!mock.nextAt) scheduleNext(true);
    if (Date.now() >= mock.nextAt) { autoPickOne(); scheduleNext(true); pushMock(); }
  }

  // ---------- live ----------
  async function pollLive() {
    if (MODE!=="live") return;
    try {
      const res = await fetch("/api/draft", { cache:"no-store" });
      if (!res.ok) throw new Error(res.status);
      lastLive = await res.json();
      if (MODE!=="live") return;   // switched to mock while the fetch was in flight — don't clobber mock state
      setState(derive(lastLive.picks, lastLive.year)); $("conn").className="dot live";
    } catch (e) {
      try { const o = await loadOrder(); if (MODE!=="live") return;
            setState(derive(o.picks.map(p=>({...p})), o.year)); $("conn").className="dot"; }
      catch (e2) { $("conn").className="dot err"; $("yearBadge").textContent="Couldn't load board — serve via vercel dev / python3 -m http.server"; }
    }
  }

  async function setMode(m) {
    MODE = m;
    timer.pick = null;   // reset the pick-clock on mode switch (don't carry a running live clock into mock)
    $("mLive").classList.toggle("on", m==="live"); $("mMock").classList.toggle("on", m==="mock");
    $("mockBar").classList.toggle("hidden", m!=="mock");
    $("conn").className = m==="mock" ? "dot" : "dot live";
    announcedPicks = null; tickerQueue = [];   // don't replay the board when switching modes
    if (m==="mock") {
      await seedFromLive(); pushMock();
    } else { pollLive(); }
  }

  // ---------- org-review hover tooltip (on fit grades) ----------
  function orgTipHtml(team) {
    const o = DATA.orgs[team];
    if (!o) return `<div class="ot-h">${team}</div><div style="color:#aaa">No org-review data.</div>`;
    const pct = (v) => v==null ? "—" : Math.round(v*100)+"%";
    const d = o.dev || {}, t = o.trends || {};
    const hs = (t.hsPos!=null||t.hsPitcher!=null) ? (t.hsPos||0)+(t.hsPitcher||0) : null;
    const col = (t.ncaaPos!=null||t.ncaaPitcher!=null) ? (t.ncaaPos||0)+(t.ncaaPitcher||0) : null;
    const arms = (t.ncaaPitcher!=null||t.hsPitcher!=null) ? (t.ncaaPitcher||0)+(t.hsPitcher||0) : null;
    const row = (k,v) => `<div class="ot-row"><span>${k}</span><b>${v}</b></div>`;
    let h = `<div class="ot-h">${team} · ${o.teamName||"org review"}</div>`;
    h += row("System rank", o.orgRank!=null ? "#"+o.orgRank : "—");
    if (Object.keys(d).length) {
      h += `<div class="ot-sec">Develops (drafted → MLB)</div>`;
      h += row("Reach MLB", pct(d.mlbDebut)) + row("Reach arbitration", pct(d.arb));
      if (d.posDebut!=null||d.pitDebut!=null) h += row("Pos / pitcher debut", pct(d.posDebut)+" / "+pct(d.pitDebut));
    }
    if (hs!=null) {
      h += `<div class="ot-sec">Draft mix ('21–25)</div>`;
      h += row("College / HS", pct(col)+" / "+pct(hs)) + row("Pitchers", pct(arms));
    }
    if (o.homegrown!=null) h += row("Homegrown (40-man)", o.homegrown);
    return h;
  }
  function initOrgTooltip() {
    const tip = document.getElementById("orgTip");
    document.addEventListener("mouseover", (e) => {
      const org = e.target.closest && e.target.closest("[data-org]");
      const dot = e.target.closest && e.target.closest("[data-intel-key]");
      if (org) tip.innerHTML = orgTipHtml(org.getAttribute("data-org"));
      else if (dot) tip.innerHTML = intelMsgHtml(dot.getAttribute("data-intel-key"), dot.getAttribute("data-intel-team"));
      else return;
      tip.style.display = "block";
    });
    document.addEventListener("mousemove", (e) => {
      if (tip.style.display !== "block") return;
      let x = e.clientX + 14, y = e.clientY + 16;
      if (x + tip.offsetWidth > innerWidth) x = e.clientX - tip.offsetWidth - 14;
      if (y + tip.offsetHeight > innerHeight) y = e.clientY - tip.offsetHeight - 16;
      tip.style.left = Math.max(6,x) + "px"; tip.style.top = Math.max(6,y) + "px";
    });
    document.addEventListener("mouseout", (e) => {
      if (e.target.closest && (e.target.closest("[data-org]") || e.target.closest("[data-intel-key]"))) tip.style.display = "none";
    });
  }

  // One-time backfill: ranges/medicals set before the shared-sync feature existed live only in
  // this browser. Push any the shared store lacks (gap-fill only — never overwrite a shared value)
  // so teammates see the same landing windows. No-op on browsers with nothing local to migrate.
  let _backfilled = false;
  function backfillLocalSettings() {
    if (_backfilled) return; _backfilled = true;
    for (const key of Object.keys(RANGES)) {
      const s = INTEL.byKey.get(key);
      if (s && s.window !== undefined) continue;                // already shared (as a strike window)
      const rg = RANGES[key];
      postIntel({ kind:"strike_window", player_name:clientName(key), window_lo:rg.lo||null, window_hi:rg.hi||null }, true);
    }
    for (const key of Object.keys(MEDICALS)) {
      const s = INTEL.byKey.get(key);
      if (s && s.medical !== undefined) continue;
      postIntel({ kind:"medical", player_name:clientName(key), note:MEDICALS[key] }, true);
    }
  }

  document.addEventListener("keydown", (e) => { if (e.key==="Escape" && cardPick!=null) closeTeamCard(); });

  // Mobile card: tap a module's numbered header to expand/collapse it (state in mPanelOpen,
  // so it survives the 3s re-renders and pick navigation). Card overlay only — not the dossier.
  $("teamCard").addEventListener("click", (e) => {
    if (!MOBILE.matches) return;
    const h4 = e.target.closest(".tc-panel[data-q] > h4"); if (!h4) return;
    const q = h4.parentElement.dataset.q;
    mPanelOpen[q] = !mPanelOpen[q];
    try { localStorage.setItem("dd:mPanels", JSON.stringify(mPanelOpen)); } catch (err) {}
    if (cardPick != null) renderTeamCard(currentState);
  });

  // Companion PWA: SW only caches static art/fonts — live data always hits the network.
  if ("serviceWorker" in navigator) { try { navigator.serviceWorker.register("/sw.js"); } catch (e) {} }

  (async () => {
    initOrgTooltip();
    applyTv();
    applyViewVis();   // sync tab/section classes (mobile boots into Board, not the HTML default)
    await loadStatic();
    try { await loadOrder(); } catch (e) {}   // slot table for demandFor() in all views
    await loadIntel().then(backfillLocalSettings);   // load shared intel, then migrate browser-only ranges/medicals
    loadSlotHistory();                                // historical draft-slot signings for the team card's Q4
    await loadPickInPlay();                           // sv-teamintel per-pick "in play" checkboxes
    pollLive();
    setInterval(pollLive, 3000);
    setInterval(loadIntel, 12000);            // refresh shared intel so the war room stays in sync
    setInterval(() => loadTeamIntel(true), 15000);   // re-pull teamintel colors/scores live
    setInterval(() => loadPickInPlay(true), 15000);  // re-pull per-pick in-play checkboxes
    setInterval(tick, 250);
  })();
</script>
